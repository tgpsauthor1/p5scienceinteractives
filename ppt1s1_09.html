<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ppt1s1_9</title>
  <style>
    :root {
      --bg: #fff8fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #d9467a;
      --accent-2: #8b5cf6;
      --accent-3: #14b8a6;
      --good: #0f766e;
      --bad: #b91c1c;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top right, rgba(217,70,122,0.10), transparent 32%),
        radial-gradient(circle at bottom left, rgba(20,184,166,0.10), transparent 28%),
        var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100%;
    }

    body {
      padding: 16px;
    }

    .app {
      max-width: 1020px;
      margin: 0 auto;
    }

    .top-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.82);
      border: 2px solid #f3d0de;
      border-radius: 18px;
      padding: 10px 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(217,70,122,0.08);
    }

    .demerit-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 40px;
    }

    .demerit-label {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .eggs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

        .egg {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid #f0a9bf;
      background:
        radial-gradient(circle at 50% 50%, #fffdfd 0 23%, #ffd8e7 24% 52%, #fff1f6 53% 100%);
      position: relative;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.65);
      transition: transform 0.2s ease, opacity 0.2s ease, filter 0.2s ease;
    }

    .egg::before {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d9467a;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.55);
    }

    .egg::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      top: 7px;
      left: 9px;
    }

    .egg.used {
      opacity: 0.3;
      transform: scale(0.94);
      filter: grayscale(0.18);
    }

    .status-note {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .shell {
      background: rgba(255,255,255,0.9);
      border: 2px solid #ead5df;
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      padding: 18px 22px 12px;
      border-bottom: 1px solid #f2d7e0;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,248,251,0.90));
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .progress {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 3px;
    }

    .instruction {
      margin-top: 12px;
      font-size: 1.4rem;
      line-height: 1.35;
      font-weight: 800;
      color: #7a1041;
      background: #fff1f6;
      border: 2px solid #f7bfd4;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .content {
      padding: 18px 22px 20px;
    }

    .question-card, .panel, .feedback, .footer {
      border-radius: 20px;
    }

    .question-card {
      background: #ffffff;
      border: 2px solid #e5dce2;
      padding: 18px;
      box-shadow: 0 8px 18px rgba(31,41,55,0.06);
    }

    .question-sentence {
      font-size: 1.18rem;
      line-height: 1.5;
      margin: 0 0 12px 0;
      font-weight: 600;
    }

    mark {
      background: #fff3a6;
      color: inherit;
      border-radius: 6px;
      padding: 0 3px;
    }

    .question-layout {
      display: grid;
      gap: 16px;
      align-items: start;
      grid-template-columns: 1.1fr 0.9fr;
    }

    .question-image {
      width: 100%;
      border-radius: 16px;
      border: 2px solid #e5dce2;
      background: #fff;
      display: block;
    }

    .mini-help {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.5;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      background: #fdf2f8;
      border: 2px solid #f8bfd4;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      font: inherit;
      border-radius: 16px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(1px); }

    .primary {
      background: linear-gradient(180deg, #e11d72, #c2185f);
      color: #fff;
      padding: 14px 20px;
      font-size: 1.04rem;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(193,24,95,0.24);
    }

    .secondary {
      background: #ffffff;
      color: var(--ink);
      border: 2px solid #d6d6e0;
      padding: 12px 16px;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .ghost {
      background: #f8fafc;
      color: var(--ink);
      border: 2px solid #dbe1ea;
      padding: 12px 16px;
      font-size: 0.96rem;
      font-weight: 700;
    }

    .choices {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .choice {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 2px solid #e1d6dc;
      border-radius: 18px;
      padding: 18px 16px;
      min-height: 92px;
      font-size: 1.08rem;
      font-weight: 700;
      line-height: 1.35;
      box-shadow: 0 8px 16px rgba(31,41,55,0.04);
    }

    .choice.selected {
      border-color: #d9467a;
      background: #fff1f6;
      box-shadow: 0 8px 18px rgba(217,70,122,0.14);
    }

    .choice.correct {
      border-color: #10b981;
      background: #ecfdf5;
    }

    .choice.wrong {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      font-size: 1.02rem;
      line-height: 1.45;
      font-weight: 700;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.good {
      background: #ecfdf5;
      border: 2px solid #99f6e4;
      color: #115e59;
    }
    .feedback.bad {
      background: #fef2f2;
      border: 2px solid #fecaca;
      color: #991b1b;
    }

    .diag-shell {
      background: linear-gradient(180deg, #ffffff 0%, #fffbfd 100%);
      border: 2px solid #e6d9df;
      border-radius: 22px;
      padding: 12px;
    }

    .svg-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .label-hit {
      cursor: pointer;
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.12s ease;
    }
    .label-hit:hover { transform: scale(1.03); }

    .screen-note {
      margin-top: 10px;
      font-size: 0.96rem;
      color: var(--muted);
      line-height: 1.45;
    }

    details.question-panel {
      margin-top: 18px;
      border: 2px solid #e4d9df;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    details.question-panel summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-weight: 800;
      background: #fff7fa;
      outline: none;
    }

    details.question-panel summary::-webkit-details-marker {
      display: none;
    }

    .question-panel-body {
      padding: 14px 16px 16px;
      border-top: 1px solid #eee3e8;
      display: grid;
      gap: 14px;
    }

    .question-panel-text {
      font-size: 1rem;
      line-height: 1.45;
      margin: 0;
    }

    .feedback-inline {
      margin-top: 10px;
    }

    .completion {
      text-align: center;
      padding: 8px 4px 6px;
    }

    .completion h2 {
      font-size: 1.8rem;
      margin: 6px 0 12px;
      color: #7a1041;
    }

    .completion p {
      font-size: 1.08rem;
      line-height: 1.5;
      max-width: 700px;
      margin: 0 auto;
      color: #374151;
    }

    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: #ecfdf5;
      border: 2px solid #99f6e4;
      font-weight: 800;
      color: #115e59;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,0.64);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .overlay.show { display: flex; }

    .overlay-card {
      width: min(520px, 100%);
      background: #fff;
      border-radius: 26px;
      padding: 26px 24px;
      text-align: center;
      box-shadow: 0 24px 54px rgba(0,0,0,0.28);
      border: 2px solid #f5c0d4;
    }

    .overlay-card h2 {
      margin: 8px 0 10px;
      font-size: 1.8rem;
      color: #7a1041;
    }

    .overlay-card p {
      margin: 0;
      font-size: 1.06rem;
      line-height: 1.5;
      color: #374151;
    }

    .small {
      font-size: 0.94rem;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .question-layout {
        grid-template-columns: 1fr;
      }
      .choices {
        grid-template-columns: 1fr;
      }
      .title-row {
        flex-direction: column;
      }
      .progress {
        padding-top: 0;
      }
      .instruction {
        font-size: 1.24rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-strip" aria-label="Top status bar">
      <div class="demerit-wrap">
        <div class="demerit-label">Careful clicks left</div>
        <div class="eggs" id="eggs" aria-live="polite"></div>
        <div class="status-note" id="demeritText"></div>
      </div>
      <div class="controls">
        <button class="secondary" id="speakBtn" type="button">Read this screen</button>
        <button class="secondary" id="toggleReadBtn" type="button" aria-pressed="false">Auto read: Off</button>
      </div>
    </div>

    <main class="shell" id="appShell" aria-live="polite">
      <div class="header">
        <div class="title-row">
          <h1 class="title" id="screenTitle">Loading...</h1>
          <div class="progress" id="progressText">Screen 1 of 7</div>
        </div>
        <div class="instruction" id="screenInstruction">Please wait.</div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="overlay" id="gameOverOverlay" aria-hidden="true">
    <div class="overlay-card">
      <div style="font-size:3rem;" aria-hidden="true">🥚</div>
      <h2>No fertilised eggs left</h2>
      <p>The whole interactive will restart in a moment. Read carefully and try again from the start.</p>
      <p class="small" id="restartCountdown" style="margin-top:10px;">Restarting...</p>
    </div>
  </div>

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderEggs() {
      eggsEl.innerHTML = '';
      const remaining = TOTAL_DEMERITS - state.demeritsUsed;
      for (let i = 0; i < TOTAL_DEMERITS; i++) {
        const egg = document.createElement('div');
        egg.className = 'egg' + (i < state.demeritsUsed ? ' used' : '');
        egg.setAttribute('aria-hidden', 'true');
        eggsEl.appendChild(egg);
      }
      demeritTextEl.textContent = `${remaining} left out of ${TOTAL_DEMERITS}`;
    }

    function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text.replace(/\s+/g, ' ').trim());
      utterance.rate = 0.95;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    function getTextContent(root) {
      return root.innerText || root.textContent || '';
    }

    function speakCurrentScreen() {
      const screen = screens[state.screenIndex];
      const liveText = [
        screen.title,
        screen.instruction,
        getTextContent(app)
      ].join(' ');
      speakText(liveText);
    }

    function setAutoRead(value) {
      state.autoRead = value;
      toggleReadBtn.textContent = `Auto read: ${value ? 'On' : 'Off'}`;
      toggleReadBtn.setAttribute('aria-pressed', value ? 'true' : 'false');
      if (value) {
        setTimeout(speakCurrentScreen, 120);
      } else if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    }

    function useDemerit() {
      if (state.gameOver) return;
      state.demeritsUsed += 1;
      renderEggs();
      if (state.demeritsUsed >= TOTAL_DEMERITS) {
        triggerGameOver();
      }
    }

    function triggerGameOver() {
      state.gameOver = true;
      overlayEl.classList.add('show');
      overlayEl.setAttribute('aria-hidden', 'false');
      if (state.autoRead) {
        speakText("No fertilised eggs left. The whole interactive will restart.");
      }
      let countdown = 2;
      restartCountdownEl.textContent = `Restarting in ${countdown}...`;
      const timer = setInterval(() => {
        countdown -= 1;
        if (countdown > 0) {
          restartCountdownEl.textContent = `Restarting in ${countdown}...`;
        } else {
          clearInterval(timer);
          restartInteractive();
        }
      }, 1000);
    }

    function restartInteractive() {
      state.screenIndex = 0;
      state.demeritsUsed = 0;
      state.gameOver = false;
      state.questionPanelOpen = false;
      state.screenSolved = false;
      overlayEl.classList.remove('show');
      overlayEl.setAttribute('aria-hidden', 'true');
      renderEggs();
      renderScreen();
    }

    function nextScreen() {
      if (state.screenIndex < screens.length - 1) {
        state.screenIndex += 1;
        state.screenSolved = false;
        renderScreen();
      }
    }

          <div class="question-panel-body">

    }

      details.addEventListener('toggle', () => {

        const summary = details.querySelector('summary');
        if (summary) {
          summary.textContent = details.open ? 'Hide original question' : 'Show original question';

        <path d="M468 470 L 698 470" fill="none" stroke="${lineColor(labels.bottom.id)}" stroke-width="3" stroke-linecap="round"></path>

        ${pill(labels.top.id, 698, 121, 92, 48, labels.top.text)}
        ${pill(labels.mid.id, 698, 221, 92, 48, labels.mid.text)}
        ${pill(labels.lower.id, 698, 266, 92, 48, labels.lower.text)}
        ${pill(labels.bottom.id, 698, 446, 92, 48, labels.bottom.text)}

        <text x="430" y="44" text-anchor="middle" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#6b7280">
          Female reproductive system
        </text>
      </svg>
      `;
    }

    function makeChoiceScreen(screenConfig) {
      const options = shuffle(screenConfig.options);
      let selectedId = null;
      let answered = false;

      app.innerHTML = `
        <div class="panel">
          <div class="choices" id="choices"></div>
          <div class="feedback" id="feedbackBox"></div>
          <div class="button-row">
            <button class="primary" id="nextBtn" type="button" disabled style="opacity:.55; cursor:not-allowed;">Next</button>
          </div>
        </div>
        ${screenConfig.includeQuestionPanel ? previousQuestionPanel() : ''}
      `;

      const choicesEl = document.getElementById('choices');
      const feedbackEl = document.getElementById('feedbackBox');
      const nextBtn = document.getElementById('nextBtn');

      function updateChoices() {
        choicesEl.innerHTML = '';
        options.forEach((opt) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'choice' +
            (selectedId === opt.id ? ' selected' : '') +
            (answered && opt.id === screenConfig.correctId ? ' correct' : '') +
            (answered && selectedId === opt.id && opt.id !== screenConfig.correctId ? ' wrong' : '');
          btn.innerHTML = screenConfig.renderOption ? screenConfig.renderOption(opt) : opt.label;
          btn.addEventListener('click', () => {
            if (state.gameOver) return;
            selectedId = opt.id;
            const isCorrect = opt.id === screenConfig.correctId;
            answered = true;
            feedbackEl.className = 'feedback show ' + (isCorrect ? 'good' : 'bad');
            feedbackEl.textContent = isCorrect ? screenConfig.correctFeedback : screenConfig.wrongFeedback;
            if (!isCorrect && screenConfig.useDemerit) {
              useDemerit();
            }
            updateChoices();
            if (isCorrect) {
              nextBtn.disabled = false;
              nextBtn.style.opacity = '1';
              nextBtn.style.cursor = 'pointer';
              state.screenSolved = true;
              if (state.autoRead) speakCurrentScreen();
            }
          });
          choicesEl.appendChild(btn);
        });
      }

      nextBtn.addEventListener('click', () => {
        if (!nextBtn.disabled) nextScreen();
      });

      updateChoices();
      attachQuestionPanelHandler();
    }

    function screenStart() {
      app.innerHTML = `
        <div class="question-card">
          <div class="question-layout">
            <div>
              <p class="question-sentence">The diagram below shows the female reproductive system.</p>
              <p class="question-sentence">${questionText.replace('fertilised egg', '<mark>fertilised egg</mark>').replace('develop', '<mark>develop</mark>')}</p>
              <div class="chips" aria-label="Highlighted key words">
                <div class="chip">fertilised egg</div>
                <div class="chip">develop</div>
              </div>
              <p class="mini-help">Look at the question and the diagram together. Then tap Start.</p>
              <div class="button-row">
                <button class="primary" id="startBtn" type="button">I have read it. Start.</button>
              </div>
            </div>
            <div>
              <img class="question-image" src="${originalImage}" alt="Original multiple-choice science question with a labelled diagram of the female reproductive system." />
            </div>
          </div>
        </div>
      `;
      document.getElementById('startBtn').addEventListener('click', nextScreen);
    }

    function screenDiagramSameLabels() {
      let selected = null;
      let answered = false;
      app.innerHTML = `
        <div class="diag-shell">
          <div class="svg-wrap" id="diagramArea"></div>
          <div class="feedback" id="feedbackBox"></div>
          <p class="screen-note">Tip: look for the middle organ where a baby grows.</p>
          <div class="button-row">
            <button class="primary" id="nextBtn" type="button" disabled style="opacity:.55; cursor:not-allowed;">Next</button>
          </div>
        </div>
        ${previousQuestionPanel()}
      `;

      const diagramArea = document.getElementById('diagramArea');
      const feedbackEl = document.getElementById('feedbackBox');
      const nextBtn = document.getElementById('nextBtn');

      function redraw() {
        diagramArea.innerHTML = cleanDiagramSVG({
          ariaLabel: 'Clean diagram of the female reproductive system with labels P, Q, R and S.',
          selected,
          feedback: answered,
          correctId: 'R',
          labels: {
            top: { id: 'P', text: 'P' },
            mid: { id: 'Q', text: 'Q' },
            lower: { id: 'R', text: 'R' },
            bottom: { id: 'S', text: 'S' }
          }
        });
        diagramArea.querySelectorAll('[data-label-id]').forEach(node => {
          const id = node.getAttribute('data-label-id');
          node.addEventListener('click', () => handleSelect(id));
          node.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              handleSelect(id);
            }
          });
        });
      }

      function handleSelect(id) {
        if (state.gameOver) return;
        selected = id;
        answered = true;
        const isCorrect = id === 'R';
        feedbackEl.className = 'feedback show ' + (isCorrect ? 'good' : 'bad');
        feedbackEl.textContent = isCorrect
          ? 'Correct. R points to the womb.'
          : 'Look again. Find the middle organ where a baby grows.';
        if (!isCorrect) {
          useDemerit();
        } else {
          nextBtn.disabled = false;
          nextBtn.style.opacity = '1';
          nextBtn.style.cursor = 'pointer';
          state.screenSolved = true;
          if (state.autoRead) speakCurrentScreen();
        }
        redraw();
      }

      nextBtn.addEventListener('click', () => {
        if (!nextBtn.disabled) nextScreen();
      });

      redraw();
      attachQuestionPanelHandler();
    }

    function screenTransferDiagram() {
      let selected = null;
      let answered = false;
      app.innerHTML = `
        <div class="diag-shell">
          <div class="svg-wrap" id="diagramArea"></div>
          <div class="feedback" id="feedbackBox"></div>
          <div class="button-row">
            <button class="primary" id="nextBtn" type="button" disabled style="opacity:.55; cursor:not-allowed;">Finish</button>
          </div>
        </div>
        ${previousQuestionPanel()}
      `;

      const diagramArea = document.getElementById('diagramArea');
      const feedbackEl = document.getElementById('feedbackBox');
      const nextBtn = document.getElementById('nextBtn');

      function redraw() {
        diagramArea.innerHTML = cleanDiagramSVG({
          ariaLabel: 'Clean diagram of the female reproductive system with labels A, B, C and D.',
          selected,
          feedback: answered,
          correctId: 'C',
          labels: {
            top: { id: 'A', text: 'A' },
            mid: { id: 'B', text: 'B' },
            lower: { id: 'C', text: 'C' },
            bottom: { id: 'D', text: 'D' }
          }
        });
        diagramArea.querySelectorAll('[data-label-id]').forEach(node => {
          const id = node.getAttribute('data-label-id');
          node.addEventListener('click', () => handleSelect(id));
          node.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              handleSelect(id);
            }
          });
        });
      }

      function handleSelect(id) {
        if (state.gameOver) return;
        selected = id;
        answered = true;
        const isCorrect = id === 'C';
        feedbackEl.className = 'feedback show ' + (isCorrect ? 'good' : 'bad');
        feedbackEl.textContent = isCorrect
          ? 'Yes. C shows the womb on this new diagram.'
          : 'Not quite. Find the womb again.';
        if (isCorrect) {
          nextBtn.disabled = false;
          nextBtn.style.opacity = '1';
          nextBtn.style.cursor = 'pointer';
          state.screenSolved = true;
          if (state.autoRead) speakCurrentScreen();
        }
        redraw();
      }

      nextBtn.addEventListener('click', () => {
        if (!nextBtn.disabled) nextScreen();
      });

      redraw();
      attachQuestionPanelHandler();
    }

    function screenCompletion() {
      app.innerHTML = `
        <div class="completion">
          <div class="badge">Nice work</div>
          <h2>You found the womb correctly.</h2>
          <p>You practised reading the question, recalling the key fact, matching the womb to the correct label, and checking the idea again on a new diagram.</p>
          <div class="button-row" style="justify-content:center; margin-top:20px;">
            <button class="primary" id="retryBtn" type="button">Retry activity</button>
          </div>
        </div>
      `;
      document.getElementById('retryBtn').addEventListener('click', restartInteractive);
    }

    const screens = [
      {
        title: 'Question 9',
        instruction: 'Read the question. Then tap Start.',
        render: screenStart
      },
      {
        title: 'What is the question asking?',
        instruction: 'Tap what you are finding.',
        render: () => makeChoiceScreen({
          includeQuestionPanel: true,
          useDemerit: true,
          correctId: 'development',
          correctFeedback: 'Yes. You are finding the place where the fertilised egg develops.',
          wrongFeedback: 'Not quite. This question is about where development happens.',
          options: [
            { id: 'development', label: 'where the fertilised egg develops' },
            { id: 'eggs-made', label: 'where eggs are made' },
            { id: 'fertilisation', label: 'where fertilisation happens' },
            { id: 'baby-leaves', label: 'where the baby leaves the body' }
          ]
        })
      },
      {
        title: 'Key science fact',
        instruction: 'Tap where a fertilised egg develops into a baby.',
        render: () => makeChoiceScreen({
          includeQuestionPanel: true,
          useDemerit: true,
          correctId: 'womb',
          correctFeedback: 'Yes. A fertilised egg develops in the womb.',
          wrongFeedback: 'Try again. Think about where a baby grows, not where eggs are made.',
          options: [
            { id: 'womb', label: 'womb' },
            { id: 'ovary', label: 'ovary' },
            { id: 'vagina', label: 'vagina' },
            { id: 'tube', label: 'fallopian tube' }
          ]
        })
      },
      {
        title: 'Match the fact to the diagram',
        instruction: 'Tap the label that points to the womb.',
        render: screenDiagramSameLabels
      },
      {
        title: 'Try the original question',
        instruction: 'Now answer the original question.',
        render: () => makeChoiceScreen({
          includeQuestionPanel: true,
          useDemerit: true,
          correctId: 'R',
          correctFeedback: 'Yes. R is the part where the fertilised egg develops.',
          wrongFeedback: 'Try again. First decide which label points to the womb.',
          renderOption: (opt) => `<span style="font-size:1.25rem;">${opt.label}</span>`,
          options: [
            { id: 'P', label: 'P' },
            { id: 'Q', label: 'Q' },
            { id: 'R', label: 'R' },
            { id: 'S', label: 'S' }
          ]
        })
      },
      {
        title: 'One more quick check',
        instruction: 'A baby grows in one part of the female reproductive system. Tap that label.',
        render: screenTransferDiagram
      },
      {
        title: 'Done',
        instruction: 'You have finished this interactive.',
        render: screenCompletion
      }
    ];

    function renderScreen() {
      const screen = screens[state.screenIndex];
      titleEl.textContent = screen.title;
      instructionEl.textContent = screen.instruction;
      progressEl.textContent = `Screen ${state.screenIndex + 1} of ${screens.length}`;
      app.innerHTML = '';
      screen.render();
      attachQuestionPanelHandler();
      if (state.autoRead) {
        setTimeout(speakCurrentScreen, 120);
      }
    }

    speakBtn.addEventListener('click', speakCurrentScreen);
    toggleReadBtn.addEventListener('click', () => setAutoRead(!state.autoRead));

    renderEggs();
    renderScreen();
  </script>
</body>
</html>
