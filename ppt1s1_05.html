<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt1s1_5</title>
<style>
  :root{
    --bg:#f6fbff;
    --panel:#ffffff;
    --ink:#16324f;
    --muted:#5a7184;
    --line:#c9dff1;
    --accent:#0f6cbf;
    --accent2:#f4b400;
    --good:#1b8a5a;
    --bad:#c5423f;
    --soft:#eaf5ff;
    --soft2:#fff8dd;
    --shadow:0 10px 28px rgba(22,50,79,.08);
    --radius:22px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#eef7ff 0%, #f8fcff 100%);
    color:var(--ink);
  }
  .app{
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    background:#ffffffee;
    backdrop-filter: blur(8px);
    border-bottom:1px solid var(--line);
    box-shadow:0 2px 10px rgba(22,50,79,.04);
  }
  .topbar-inner{
    max-width:1100px;
    margin:0 auto;
    padding:12px 16px;
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    font-weight:800;
    font-size:1.05rem;
    letter-spacing:.2px;
  }
  .demerit-strip{
    flex:1 1 360px;
    display:flex;
    align-items:center;
    gap:10px;
    min-width:260px;
  }
  .demerit-label{
    font-size:.95rem;
    font-weight:700;
    white-space:nowrap;
  }
  .pod-row{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    align-items:center;
  }
  .pod{
    width:24px;height:24px;border-radius:999px;
    border:2px solid #d4a019;
    background:radial-gradient(circle at 32% 32%, #ffe58f 0 32%, #f4b400 33% 100%);
    position:relative;
    opacity:.35;
  }
  .pod.active{opacity:1}
  .pod.lost{
    opacity:1;
    background:radial-gradient(circle at 32% 32%, #ffd8d7 0 32%, #f18b88 33% 100%);
    border-color:#cf5f5d;
  }
  .mini-note{font-size:.84rem;color:var(--muted)}
  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .toggle{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--soft);
    padding:8px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    font-weight:700;
    font-size:.95rem;
  }
  .switch{
    width:48px;height:28px;border-radius:999px;
    background:#b8cddd;
    position:relative;cursor:pointer; flex:none;
  }
  .switch .knob{
    position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.15); transition:.2s ease;
  }
  .switch.on{background:var(--good)}
  .switch.on .knob{left:23px}
  .shell{
    max-width:1100px;
    margin:0 auto;
    width:100%;
    padding:18px 16px 36px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px;
  }
  .screen-title{
    margin:0 0 6px 0;
    font-size:1.05rem;
    color:#35617b;
    font-weight:800;
    letter-spacing:.2px;
  }
  .instruction-row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .instruction{
    margin:0;
    font-size:1.75rem;
    line-height:1.15;
    font-weight:900;
    color:#0e4f8d;
    flex:1 1 420px;
  }
  .screen-read{
    border:none;
    background:var(--soft2);
    color:#7a5a00;
    font-weight:800;
    border-radius:14px;
    padding:12px 14px;
    cursor:pointer;
    font-size:1rem;
  }
  .lead{
    color:var(--muted);
    font-size:1rem;
    line-height:1.45;
    margin-top:10px;
  }
  .actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    margin-top:16px;
  }
  button{
    font:inherit;
  }
  .btn{
    border:none;
    background:var(--accent);
    color:#fff;
    padding:14px 18px;
    border-radius:16px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(15,108,191,.25);
  }
  .btn.secondary{
    background:#fff;
    color:var(--accent);
    border:2px solid #9ec8ee;
    box-shadow:none;
  }
  .btn[disabled]{
    opacity:.45;
    cursor:not-allowed;
    box-shadow:none;
  }
  .feedback{
    min-height:28px;
    font-weight:800;
    margin-top:14px;
    font-size:1rem;
  }
  .feedback.good{color:var(--good)}
  .feedback.bad{color:var(--bad)}
  .grid{
    display:grid;
    gap:14px;
  }
  .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}
  .choice-card, .pill, .blank, .slot, .method-card, .statement-card, .fruit-card{
    border:2px solid #cfe3f5;
    border-radius:18px;
    background:#fff;
    padding:14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
    min-height:70px;
  }
  .choice-card:hover, .pill:hover, .blank:hover, .slot:hover, .method-card:hover, .statement-card:hover, .fruit-card:hover{
    transform:translateY(-1px);
    border-color:#7cb6e5;
  }
  .choice-card.selected, .pill.selected, .method-card.selected, .statement-card.selected, .fruit-card.selected{
    border-color:var(--accent);
    background:#eef7ff;
    box-shadow:0 8px 20px rgba(15,108,191,.12);
  }
  .choice-card.correct, .statement-card.correct, .fruit-card.correct, .method-card.correct, .pill.correct, .blank.correct{
    border-color:var(--good);
    background:#eefbf4;
  }
  .choice-card.wrong, .statement-card.wrong, .fruit-card.wrong, .method-card.wrong, .pill.wrong, .blank.wrong{
    border-color:var(--bad);
    background:#fff2f2;
  }
  .small{
    font-size:.93rem;
    color:var(--muted);
  }
  .question-block{
    background:linear-gradient(180deg,#ffffff 0,#f7fbff 100%);
    border:1px solid #d5e8f8;
    border-radius:20px;
    padding:16px;
    margin-top:12px;
  }
  .question-layout{
    display:grid;
    grid-template-columns:minmax(280px, 1.1fr) minmax(240px, .9fr);
    gap:18px;
    align-items:center;
  }
  .highlight{
    background:#fff1a8;
    padding:0 .18em;
    border-radius:.25em;
    font-weight:800;
  }
  .question-panel details{
    border:1px solid #d3e6f8;
    border-radius:18px;
    background:#fbfdff;
    padding:10px 14px;
  }
  .question-panel summary{
    font-weight:800;
    cursor:pointer;
    color:#1b5d99;
  }
  .question-panel .inside{
    margin-top:12px;
  }
  .bubble{
    display:inline-block;
    padding:8px 12px;
    border-radius:999px;
    background:var(--soft2);
    color:#7a5a00;
    font-weight:800;
    font-size:.9rem;
    margin-right:8px;
    margin-top:8px;
  }
  .option-bank, .slot-row, .method-bank, .statement-bank{
    display:flex; flex-wrap:wrap; gap:10px;
  }
  .slot{
    min-width:200px;
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#f8fcff;
    cursor:default;
  }
  .slot.filled{
    border-style:solid;
    background:#eef7ff;
    cursor:pointer;
  }
  .blank{
    min-width:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#fbfdff;
  }
  .blank.filled{
    background:#eef7ff;
  }
  .method-row{
    border:1px solid #d9e9f7;
    border-radius:18px;
    padding:14px;
    background:#fcfeff;
  }
  .row-head{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:12px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:34px;
    height:34px;
    padding:0 10px;
    border-radius:999px;
    background:#e8f4ff;
    font-weight:800;
    color:#0e5fa3;
  }
  .fruit-head{
    display:flex;
    gap:12px;
    align-items:center;
  }
  .fruit-meta h4{margin:0 0 4px 0; font-size:1.08rem}
  .fruit-meta p{margin:0; color:var(--muted); line-height:1.35}
  .method-buttons{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
  }
  .method-btn{
    border:2px solid #cfe3f5;
    border-radius:16px;
    padding:12px 10px;
    background:#fff;
    font-weight:800;
    cursor:pointer;
    min-height:58px;
  }
  .method-btn.selected{
    background:#eef7ff;
    border-color:var(--accent);
  }
  .sort-wrap{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
    align-items:start;
  }
  .sort-col{
    background:#fbfdff;
    border:1px solid #d8e8f7;
    border-radius:20px;
    padding:14px;
  }
  .sort-col h4{margin:0 0 10px 0; font-size:1.05rem}
  .sort-item{
    margin-bottom:10px;
    border:2px solid #d3e6f8;
    border-radius:16px;
    padding:10px;
    background:#fff;
  }
  .choice-pair{
    display:flex;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .mini-btn{
    flex:1;
    min-width:120px;
    border:2px solid #cfe3f5;
    background:#fff;
    color:var(--ink);
    border-radius:14px;
    padding:11px;
    font-weight:800;
    cursor:pointer;
  }
  .mini-btn.selected{
    background:#eef7ff;
    border-color:var(--accent);
  }
  .method-bank .method-card{
    flex:1 1 170px;
    min-height:100px;
  }
  .statement-card{
    min-height:110px;
  }
  .anim-panel{
    background:#fbfdff;
    border:1px solid #d6e7f7;
    border-radius:20px;
    padding:10px;
  }
  .compare-controls{
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px;
  }
  .compare-btn{
    border:2px solid #cfe3f5;
    background:#fff;
    color:var(--ink);
    border-radius:14px;
    padding:12px 14px;
    font-weight:800;
    cursor:pointer;
  }
  .compare-btn.active{
    background:#eef7ff;
    border-color:var(--accent);
  }
  .center{
    text-align:center;
  }
  .completion{
    text-align:center;
    padding:24px;
  }
  .confidence{
    display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-top:16px;
  }
  .conf-btn{
    border:2px solid #cfe3f5;
    background:#fff;
    color:var(--ink);
    border-radius:18px;
    padding:16px 18px;
    font-weight:800;
    cursor:pointer;
    min-width:220px;
  }
  .gameover{
    position:fixed; inset:0;
    background:rgba(13,42,66,.65);
    display:none; align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .gameover.show{display:flex}
  .gameover-card{
    max-width:480px;
    width:100%;
    background:#fff;
    border-radius:24px;
    padding:24px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  .muted{color:var(--muted)}
  .seed-trail{
    animation: drift 3.2s linear infinite;
  }
  @keyframes drift{
    0%{transform:translateX(0) translateY(0)}
    25%{transform:translateX(18px) translateY(-8px)}
    50%{transform:translateX(38px) translateY(0)}
    75%{transform:translateX(58px) translateY(-5px)}
    100%{transform:translateX(78px) translateY(0)}
  }
  .water-flow{
    animation: wave 2.8s ease-in-out infinite;
  }
  @keyframes wave{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(24px)}
  }
  .burst{
    animation: burst 1.4s ease-out infinite;
  }
  @keyframes burst{
    0%{transform:translate(0,0); opacity:0}
    15%{opacity:1}
    100%{transform:translate(30px,-14px); opacity:0}
  }
  .bird-move{
    animation: fly 3.2s linear infinite;
  }
  @keyframes fly{
    0%{transform:translateX(0)}
    100%{transform:translateX(130px)}
  }
  @media (max-width: 860px){
    .grid.two,.grid.three,.grid.four,.question-layout,.sort-wrap{grid-template-columns:1fr}
    .instruction{font-size:1.5rem}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">Seed Dispersal Detective</div>
      <div class="demerit-strip">
        <div class="demerit-label">Lost seed pods:</div>
        <div class="pod-row" id="podRow"></div>
        <div class="mini-note" id="demeritNote"></div>
      </div>
      <div class="controls">
        <div class="toggle">
          <span>Read aloud</span>
          <div class="switch" id="readToggle" role="button" tabindex="0" aria-label="Toggle read aloud">
            <div class="knob"></div>
          </div>
          <span id="readLabel">Off</span>
        </div>
      </div>
    </div>
  </div>

  <div class="shell">
    <div id="screen" class="card"></div>
    <div id="questionPanel" class="question-panel"></div>
  </div>
</div>

<div class="gameover" id="gameover">
  <div class="gameover-card">
    <h2>All the seed pods drifted away.</h2>
    <p class="muted">The whole interactive will restart in a moment so you can try again carefully.</p>
  </div>
</div>

<script>
(function(){
  const screenEl = document.getElementById('screen');
  const panelEl = document.getElementById('questionPanel');
  const podRow = document.getElementById('podRow');
  const demeritNote = document.getElementById('demeritNote');
  const readToggle = document.getElementById('readToggle');
  const readLabel = document.getElementById('readLabel');
  const gameoverEl = document.getElementById('gameover');

  const app = {
    current: 0,
    questionPanelOpen: false,
    readAloud: false,
    feedback: '',
    feedbackType: '',
    maxDemerits: 5,
    usedDemerits: 0,
    currentScreenComplete: false,
    currentScreenSpeakText: '',
    states: {}
  };

  const fruitData = {
    water: {
      id: 'fruitWater',
      title: 'Fruit with waterproof cover and fibrous husk',
      short: 'waterproof cover + fibrous husk',
      method: 'water',
      svg: fruitSvg('water')
    },
    animal: {
      id: 'fruitAnimal',
      title: 'Fruit with juicy flesh and hard seed',
      short: 'juicy flesh + hard seed',
      method: 'animals',
      svg: fruitSvg('animal')
    },
    wind: {
      id: 'fruitWind',
      title: 'Light fruit with parachute-like structure',
      short: 'light + parachute-like structure',
      method: 'wind',
      svg: fruitSvg('wind')
    },
    split: {
      id: 'fruitSplit',
      title: 'Dry fruit wall with light seeds',
      short: 'dry fruit wall + pod',
      method: 'splitting / explosive action',
      svg: fruitSvg('split')
    }
  };

  const methodCards = [
    {id:'water', title:'Water', desc:'Can float on water and travel far.'},
    {id:'animals', title:'Animals', desc:'Can be carried when animals move.'},
    {id:'wind', title:'Wind', desc:'Light seeds can drift long distances.'},
    {id:'split', title:'Splitting / explosive action', desc:'Pods burst and throw seeds a short distance.'}
  ];

  function shuffle(arr){
    const copy = arr.slice();
    for(let i = copy.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function shuffledNotSame(arr, identityFn){
    let tries = 0;
    let out = shuffle(arr);
    while(tries < 20 && out.every((item, idx) => identityFn(item) === identityFn(arr[idx]))){
      out = shuffle(arr);
      tries++;
    }
    return out;
  }

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 1;
    utter.lang = 'en-SG';
    window.speechSynthesis.speak(utter);
  }

  function maybeAutoSpeak(){
    if(app.readAloud && app.currentScreenSpeakText){
      speak(app.currentScreenSpeakText);
    }
  }

  function updateReadToggle(){
    readToggle.classList.toggle('on', app.readAloud);
    readLabel.textContent = app.readAloud ? 'On' : 'Off';
  }

  function updateDemerits(){
    podRow.innerHTML = '';
    for(let i=0;i<app.maxDemerits;i++){
      const div = document.createElement('div');
      div.className = 'pod ' + (i < app.usedDemerits ? 'lost' : 'active');
      podRow.appendChild(div);
    }
    const remaining = app.maxDemerits - app.usedDemerits;
    demeritNote.textContent = remaining > 0
      ? remaining + ' chance' + (remaining === 1 ? '' : 's') + ' left'
      : 'Restarting...';
  }

  function addDemerit(){
    app.usedDemerits += 1;
    updateDemerits();
    if(app.usedDemerits >= app.maxDemerits){
      triggerRestart();
    }
  }

  function triggerRestart(){
    gameoverEl.classList.add('show');
    if('speechSynthesis' in window) window.speechSynthesis.cancel();
    setTimeout(() => {
      app.current = 0;
      app.questionPanelOpen = false;
      app.usedDemerits = 0;
      app.feedback = '';
      app.feedbackType = '';
      app.currentScreenComplete = false;
      app.currentScreenSpeakText = '';
      app.states = {};
      gameoverEl.classList.remove('show');
      updateDemerits();
      render();
    }, 2200);
  }

  function setFeedback(text, type){
    app.feedback = text;
    app.feedbackType = type;
    const box = screenEl.querySelector('.feedback');
    if(box){
      box.textContent = text;
      box.className = 'feedback ' + (type || '');
    }
    updateSpeakText();
    if(app.readAloud && text){
      speak(app.currentScreenSpeakText);
    }
  }

  function updateSpeakText(){
    const parts = [];
    const title = screenEl.querySelector('.screen-title');
    const instruction = screenEl.querySelector('.instruction');
    if(title) parts.push(title.textContent);
    if(instruction) parts.push(instruction.textContent);
    screenEl.querySelectorAll('[data-read]').forEach(el => {
      const tx = el.getAttribute('data-read');
      if(tx) parts.push(tx);
    });
    if(app.feedback) parts.push(app.feedback);
    app.currentScreenSpeakText = parts.join('. ');
  }

  function renderQuestionPanel(){
    if(app.current === 0){
      panelEl.innerHTML = '';
      return;
    }
    panelEl.innerHTML = `
      <details ${app.questionPanelOpen ? 'open' : ''} id="qp">
        <summary>Show the question again</summary>
        <div class="inside">
          <div class="question-block">
            <div class="question-layout">
              <div>
                <p data-read="The question says: Island A has plant X but no animals. Island B has no plants and animals. The islands are 5 kilometres apart. A few years later, plant X is found growing on island B on island B. Based on the characteristics of the fruits, which fruit is least likely to be from plant X?">
                  The diagram shows two islands, A and B. Island A has plant X but no animals while island B has no plants and animals. The islands are <span class="highlight">5 km</span> apart.
                  A few years later, plant X is <span class="highlight">found growing</span> on island B.
                  Based on the characteristics of the fruits, which fruit is <span class="highlight">least likely</span> to be from plant X?
                </p>
                <div class="bubble">Think about distance</div>
                <div class="bubble">Think about how the seed moves</div>
              </div>
              <div>${islandDiagramSVG()}</div>
            </div>
          </div>
        </div>
      </details>
    `;
    const qp = document.getElementById('qp');
    qp.addEventListener('toggle', () => {
      app.questionPanelOpen = qp.open;
    });
  }

  function makeShell(title, instruction, lead, bodyHtml, showNext=true){
    const nextDisabled = app.currentScreenComplete ? '' : 'disabled';
    screenEl.innerHTML = `
      <div class="screen-title">${title}</div>
      <div class="instruction-row">
        <h1 class="instruction">${instruction}</h1>
        <button class="screen-read" id="screenReadBtn">🔊 Read this screen</button>
      </div>
      ${lead ? `<div class="lead" data-read="${escapeAttr(lead)}">${lead}</div>` : ''}
      <div class="body">${bodyHtml}</div>
      <div class="feedback ${app.feedbackType || ''}">${app.feedback || ''}</div>
      <div class="actions">
        ${showNext ? `<button class="btn" id="nextBtn" ${nextDisabled}>Next</button>` : ``}
      </div>
    `;
    document.getElementById('screenReadBtn').addEventListener('click', () => speak(app.currentScreenSpeakText));
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn){
      nextBtn.addEventListener('click', () => {
        if(!app.currentScreenComplete) return;
        app.current += 1;
        app.feedback = '';
        app.feedbackType = '';
        app.currentScreenComplete = false;
        render();
      });
    }
  }

  function finishStep(msg){
    app.currentScreenComplete = true;
    setFeedback(msg, 'good');
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn) nextBtn.disabled = false;
  }

  function wrongAttempt(msg, countDemerit=true){
    if(countDemerit) addDemerit();
    setFeedback(msg, 'bad');
  }

  function escapeAttr(text){
    return String(text).replace(/"/g,'&quot;');
  }

  function ensureState(key, fallback){
    if(!(key in app.states)){
      app.states[key] = typeof fallback === 'function' ? fallback() : fallback;
    }
    return app.states[key];
  }

  function render(){
    updateReadToggle();
    updateDemerits();
    renderQuestionPanel();
    const fn = screens[app.current];
    if(fn){
      fn();
      updateSpeakText();
      maybeAutoSpeak();
    }
  }

  readToggle.addEventListener('click', () => {
    app.readAloud = !app.readAloud;
    updateReadToggle();
    if(app.readAloud) maybeAutoSpeak();
    else if('speechSynthesis' in window) window.speechSynthesis.cancel();
  });
  readToggle.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();

  function screen8(){
    const items = ensureState('s8items', () => {
      const arr = [
        {id:'pod', text:'dry fruit wall / pod'},
        {id:'method', text:'splitting / explosive action'},
        {id:'short', text:'seeds move only a short distance'},
        {id:'gap', text:'cannot reach island B 5 km away'},
        {id:'least', text:'least likely'}
      ];
      let out = shuffle(arr);
      while(out.map(x=>x.id).join('|') === arr.map(x=>x.id).join('|')){
        out = shuffle(arr);
      }
      return out;
    });
    const state = ensureState('s8', {slots:[null,null,null,null,null], attempt:0});
    makeShell(
      'Screen 8',
      'Build the reasoning chain.',
      'Put the ideas in order to show why the dry pod fruit is the least likely answer.',
      `
      <div class="slot-row" style="margin-bottom:12px">
        ${state.slots.map((slot, idx) => `
          <div class="slot ${slot ? 'filled' : ''}" data-slot="${idx}" data-read="${slot ? escapeAttr(slot.text) : 'empty slot'}">${slot ? slot.text : 'Tap a filled box to remove it'}</div>
        `).join('')}
      </div>
      <div class="option-bank">
        ${items.filter(item => !state.slots.find(s => s && s.id === item.id)).map(item => `
          <div class="pill" data-id="${item.id}" data-read="${escapeAttr(item.text)}">${item.text}</div>
        `).join('')}
      </div>
      <div class="actions"><button class="btn secondary" id="checkS8">Check</button></div>
      `
    );
    screenEl.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        const firstEmpty = state.slots.findIndex(s => !s);
        if(firstEmpty === -1) return;
        const item = items.find(i => i.id === pill.dataset.id);
        state.slots[firstEmpty] = item;
        render();
      });
    });
    screenEl.querySelectorAll('.slot.filled').forEach(slot => {
      slot.addEventListener('click', () => {
        const idx = Number(slot.dataset.slot);
        state.slots[idx] = null;
        render();
      });
    });
    document.getElementById('checkS8').addEventListener('click', () => {
      const correct = ['pod','method','short','gap','least'];
      const student = state.slots.map(s => s ? s.id : null);
      if(correct.every((id, idx) => student[idx] === id)){
        finishStep('Yes. Pod → splitting → short distance → cannot cross 5 km → least likely.');
      }else{
        state.attempt += 1;
        wrongAttempt(state.attempt === 1
          ? 'Start with the fruit feature, then the method, then the distance idea.'
          : 'This chain should end with why it is least likely.');
      }
    });
  }
