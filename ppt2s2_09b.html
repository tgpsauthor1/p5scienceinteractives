<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt2s2_9b_v2</title>
<style>
  :root{
    --bg:#eef7ff;
    --panel:#ffffff;
    --ink:#17324d;
    --muted:#60758a;
    --line:#c9dcec;
    --brand:#1f6fb2;
    --brand2:#0d8bd6;
    --accent:#ffd166;
    --good:#1f8f5f;
    --bad:#c53939;
    --soft-good:#e8f8ef;
    --soft-bad:#fdeeee;
    --soft-info:#fff7dc;
    --shadow:0 10px 28px rgba(18,56,91,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Trebuchet MS","Verdana",system-ui,sans-serif;background:linear-gradient(180deg,#f7fbff 0%, var(--bg) 100%);color:var(--ink)}
  .app-shell{max-width:1000px;margin:0 auto;padding:18px 16px 28px}
  .top-strip{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:14px}
  .tracker-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
  .brand-title{font-weight:900;color:var(--brand);font-size:1.05rem}
  .progress-pill{background:#edf6ff;border:1px solid #cce4fb;border-radius:999px;padding:8px 12px;font-weight:800}
  .tracker-label{font-weight:800;color:var(--muted)}
  .drops{display:flex;gap:8px;align-items:center}
  .drop{width:20px;height:28px;position:relative;display:inline-block;background:linear-gradient(180deg,#7dc0ff 0%, #2a8fe7 100%);border:2px solid #176bb1;border-bottom-left-radius:16px;border-bottom-right-radius:16px;border-top-left-radius:16px;transform:rotate(45deg)}
  .drop::after{content:"";position:absolute;inset:4px;border-radius:12px;background:rgba(255,255,255,.25)}
  .drop.empty{opacity:.25;filter:grayscale(1)}
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
  .toggle-wrap{display:flex;align-items:center;gap:8px;background:#f4f8fc;border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-weight:800}
  .toggle{appearance:none;width:46px;height:28px;border-radius:999px;background:#cad7e5;position:relative;border:none;cursor:pointer}
  .toggle::after{content:"";position:absolute;width:22px;height:22px;top:3px;left:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.16)}
  .toggle:checked{background:#6dc18e}
  .toggle:checked::after{left:21px}
  button{font:inherit}
  .btn{border:none;border-radius:14px;padding:13px 18px;font-weight:900;cursor:pointer;min-height:48px;transition:transform .06s ease, opacity .2s ease, background .2s ease}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{background:#185e97}
  .btn-secondary{background:#eef5fb;color:var(--ink);border:1px solid var(--line)}
  .btn-secondary:hover{background:#e4effa}
  .btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
  .screen-card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:20px 18px 18px;box-shadow:var(--shadow)}
  .screen-title{font-size:1.55rem;font-weight:900;color:var(--brand);margin:0 0 8px 0}
  .instruction{font-size:1.18rem;line-height:1.35;font-weight:900;margin:0 0 14px 0;background:#edf7ff;border:2px solid #cae3fb;border-radius:16px;padding:12px 14px}
  .subtle{color:var(--muted);margin-top:-6px;margin-bottom:14px;font-size:.98rem}
  .feedback{margin-top:14px;border-radius:16px;padding:12px 14px;font-weight:800;display:none}
  .feedback.good{display:block;background:var(--soft-good);border:2px solid #b8e3ca;color:#15593b}
  .feedback.bad{display:block;background:var(--soft-bad);border:2px solid #efc2c2;color:#812626}
  .action-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;margin-top:16px}
  .question-block{border:1px solid var(--line);background:#fbfdff;border-radius:18px;padding:14px}
  .question-block p{margin:0 0 10px 0;line-height:1.45}
  .hl{background:#fff1a8;box-shadow: inset 0 -0.45em 0 #fff1a8;border-radius:4px;padding:0 2px}
  .diagram-wrap{margin-top:14px;background:linear-gradient(180deg,#f7fcff 0%,#eef7ff 100%);border:1px solid var(--line);border-radius:18px;padding:14px;overflow:hidden}
  .diagram-caption{color:var(--muted);font-size:.95rem;margin-bottom:8px}
  .scan-wrap{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
  .scan-wrap img{width:100%;max-width:620px;border:1px solid var(--line);border-radius:12px;display:block;margin:10px auto 0;background:#fff}
  .question-panel-wrap{margin-top:12px}
  .question-panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow)}
  .panel-toggle{margin-top:14px}
  .choice-grid,.bank-wrap{display:grid;gap:12px}
  .choice-grid.two{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
  .choice-grid.three{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
  .choice-card,.bank-card{background:#fff;border:2px solid #cfe0ee;border-radius:18px;padding:14px;min-height:72px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:1.03rem;font-weight:900;cursor:pointer;transition:.14s;line-height:1.3}
  .choice-card:hover,.bank-card:hover{transform:translateY(-1px);border-color:#8fc0ec;background:#f7fbff}
  .choice-card.selected,.bank-card.selected{background:#e8f4ff;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(32,121,208,.12)}
  .choice-card.correct,.bank-card.correct{background:var(--soft-good);border-color:#70c995}
  .choice-card.wrong,.bank-card.wrong{background:var(--soft-bad);border-color:#e39191}
  .columns{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .compare-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}
  .compare-card h3{margin:0 0 10px 0;color:var(--brand)}
  .compare-list{display:grid;gap:10px;margin-top:10px}
  .compare-item{background:#f7fbff;border:1px solid #d5e7f6;border-radius:14px;padding:10px 12px;font-weight:800}
  .compare-item.changed{background:#fff6da;border-color:#f1dd8d}
  .diagram-note{text-align:center;color:var(--muted);font-size:.96rem;margin-top:8px}
  .summary-list{display:grid;gap:10px;margin-top:12px}
  .summary-pill{background:#f7fbff;border:1px solid var(--line);border-radius:999px;padding:10px 12px;font-weight:800}
  .summary-box{background:linear-gradient(180deg,#f7fcff 0%,#edf7ff 100%);border:2px solid #cae3fb;border-radius:18px;padding:16px}
  .callout{background:#fff6d8;border:1px solid #f1df90;border-radius:16px;padding:12px 14px;font-weight:800;color:#6a5300;margin-top:12px}
  .explain-box{background:#fff7dc;border:2px solid #f1df90;border-radius:16px;padding:12px 14px;font-weight:800;color:#695100;margin-bottom:12px}
  .footer-note{margin-top:14px;font-size:.93rem;color:var(--muted)}
  .overlay{position:fixed;inset:0;background:rgba(10,34,59,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:1000}
  .overlay.show{display:flex}
  .overlay-card{width:min(430px,100%);background:#fff;border-radius:24px;padding:22px;text-align:center;box-shadow:0 18px 36px rgba(0,0,0,.20)}
  .overlay-card h2{margin:0 0 10px 0;color:var(--brand)}
  .countdown{font-size:2rem;font-weight:900;color:#e15c5c;margin-top:10px}
  @media (max-width:700px){
    .screen-card{padding:18px 14px 16px}
    .screen-title{font-size:1.35rem}
    .instruction{font-size:1.08rem}
    .choice-card,.bank-card{min-height:64px}
    .brand-title{width:100%}
  }
</style>
</head>

<div class="app-shell">
  <div class="top-strip">
    <div class="tracker-wrap">
      <div class="brand-title">Fair test constants challenge</div>

  <main id="mainMount"></main>

</div>

    <p>You used all 5 chances in the teaching part, so the whole activity will restart.</p>

</div>

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function shuffledNotExact(arr, exactIds) {
    if (arr.length <= 1) return [...arr];
    let out = shuffle(arr);
    let tries = 0;
    while (JSON.stringify(out.map(x => x.id)) === JSON.stringify(exactIds) && tries < 20) {
      out = shuffle(arr);
      tries++;
    }
    return out;
  }

  }

  function readableTextFromDOM() {
    const title = document.querySelector(".screen-title")?.textContent || "";
    const instruction = document.querySelector(".instruction")?.textContent || "";
    const content = [...document.querySelectorAll(".readable")].map(el => el.textContent.trim()).filter(Boolean).join(". ");
    const feedback = document.querySelector(".feedback")?.textContent?.trim() || "";
    return [title, instruction, content, feedback].filter(Boolean).join(". ");
  }

  function maybeSpeak() {
    if (state.pendingSpeech && state.readAloud) speak(readableTextFromDOM());
    state.pendingSpeech = false;
  }

  function renderQuestionPanel() {
    const mount = document.getElementById("panelMount");
    if (state.screen === 1) {
      mount.innerHTML = "";
      return;
    }
    mount.innerHTML = `
      <button type="button" class="btn btn-secondary panel-toggle" id="togglePanelBtn">
        ${state.panelOpen ? "Hide question panel" : "Show question panel"}
      </button>
      ${state.panelOpen ? panelQuestionHTML : ""}
    `;
    document.getElementById("togglePanelBtn").addEventListener("click", () => {
      state.panelOpen = !state.panelOpen;
      render();
    });
  }

  function containerMiniDiagram() {
    return `
      <div class="diagram-wrap readable">
        <div class="diagram-caption">Cleaner recap of the experiment setup</div>
        <svg viewBox="0 0 740 240" role="img" aria-label="Three containers with different exposed water surface areas">
          <line x1="36" y1="188" x2="704" y2="188" stroke="#133857" stroke-width="8" />
          <path d="M 92 48 L 92 178 L 166 178 L 166 48" fill="none" stroke="#123a5e" stroke-width="4.5" stroke-linecap="round"></path>
          <rect x="100" y="82" width="58" height="96" fill="#8ec7ff" opacity="0.88"></rect>
          <line x1="100" y1="82" x2="158" y2="82" stroke="#ffcf4a" stroke-width="7" stroke-linecap="round"></line>
          <text x="129" y="220" text-anchor="middle" font-size="28" font-weight="900" fill="#17324d">A</text>

          <path d="M 254 118 L 254 178 L 474 178 L 474 118" fill="none" stroke="#123a5e" stroke-width="4.5" stroke-linecap="round"></path>
          <rect x="262" y="150" width="204" height="28" fill="#8ec7ff" opacity="0.88"></rect>
          <line x1="262" y1="150" x2="466" y2="150" stroke="#ffcf4a" stroke-width="7" stroke-linecap="round"></line>
          <text x="364" y="220" text-anchor="middle" font-size="28" font-weight="900" fill="#17324d">B</text>

          <path d="M 538 96 L 538 178 L 658 178 L 658 96" fill="none" stroke="#123a5e" stroke-width="4.5" stroke-linecap="round"></path>
          <rect x="546" y="124" width="104" height="54" fill="#8ec7ff" opacity="0.88"></rect>
          <line x1="546" y1="124" x2="650" y2="124" stroke="#ffcf4a" stroke-width="7" stroke-linecap="round"></line>
          <text x="598" y="220" text-anchor="middle" font-size="28" font-weight="900" fill="#17324d">C</text>
        </svg>
        <div class="diagram-note">Yellow lines show the exposed water surfaces.</div>
      </div>
    `;
  }

  function comparisonVisual() {
    return `
      <div class="columns readable">
        <div class="compare-card">
          <h3>Fair test setup</h3>
          <div class="compare-list">
            <div class="compare-item">All three containers are made of <strong>plastic</strong>.</div>
            <div class="compare-item">Different exposed surface areas of water.</div>
            <div class="compare-item">150 ml of water at the start.</div>
            <div class="compare-item">Same classroom and ceiling fan.</div>
          </div>
        </div>
        <div class="compare-card">
          <h3>Not a fair test</h3>
          <div class="compare-list">
            <div class="compare-item changed">Container A is plastic, B is metal, C is glass.</div>
            <div class="compare-item">Different exposed surface areas of water.</div>
            <div class="compare-item">150 ml of water at the start.</div>
            <div class="compare-item">Same classroom and ceiling fan.</div>
          </div>
        </div>
      </div>
      <div class="diagram-note readable">Only the exposed surface area should change. The highlighted line shows an extra change.</div>
    `;
  }

  function renderSingleChoiceScreen(cfg) {
    const store = getStore(cfg.key, () => ({ options: shuffledNotExact(cfg.options, cfg.options.map(o => o.id)), selected:null, solved:false, feedback:null }));
    const cards = store.options.map(opt => {
      let cls = "choice-card";
      if (store.selected === opt.id) cls += " selected";
      if (store.solved && opt.id === cfg.correctId) cls += " correct";
      if (store.feedback?.type === "bad" && store.selected === opt.id && opt.id !== cfg.correctId) cls += " wrong";
      return `<button type="button" class="${cls}" data-option="${opt.id}">${escapeHTML(opt.label)}</button>`;
    }).join("");

    document.getElementById("mainMount").innerHTML = `
      <section class="screen-card">
        <h1 class="screen-title">${cfg.title}</h1>
        <div class="instruction">${cfg.instruction}</div>
        ${cfg.subtle ? `<div class="subtle readable">${cfg.subtle}</div>` : ""}
        ${cfg.extraHTML || ""}
        <div class="choice-grid ${cfg.cols || 'two'}">${cards}</div>
        ${store.feedback ? `<div class="feedback ${store.feedback.type}">${store.feedback.text}</div>` : ""}
        <div class="action-row">
          <button class="btn btn-primary" id="nextBtn" type="button" ${store.solved ? "" : "disabled"}>Next</button>
        </div>
      </section>
    `;

    document.querySelectorAll("[data-option]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (cfg.locked) return;
        const pick = btn.getAttribute("data-option");
        store.selected = pick;
        if (pick === cfg.correctId) {
          store.solved = true;
          store.feedback = {type:"good", text:cfg.good};
        } else {
          const ended = loseDemerit();
          store.feedback = {type:"bad", text:cfg.bad};
          if (ended) return;
        }
        state.pendingSpeech = true;
        render();
      });
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      if (!store.solved) return;
      state.screen += 1;
      state.pendingSpeech = true;
      render();
    });
  }

  function renderMultiSelectScreen(cfg) {
    const store = getStore(cfg.key, () => ({ options: shuffledNotExact(cfg.options, cfg.correctIds), selected:[], solved:false, feedback:null }));
    const selectedSet = new Set(store.selected);
    const cards = store.options.map(opt => {
      let cls = "bank-card";
      if (selectedSet.has(opt.id)) cls += " selected";
      if (store.solved && cfg.correctIds.includes(opt.id)) cls += " correct";
      if (store.feedback?.type === "bad" && selectedSet.has(opt.id) && !cfg.correctIds.includes(opt.id)) cls += " wrong";
      return `<button type="button" class="${cls}" data-option="${opt.id}">${escapeHTML(opt.label)}</button>`;
    }).join("");

    document.getElementById("mainMount").innerHTML = `
      <section class="screen-card">
        <h1 class="screen-title">${cfg.title}</h1>
        <div class="instruction">${cfg.instruction}</div>
        ${cfg.explain ? `<div class="explain-box readable">${cfg.explain}</div>` : ""}
        ${cfg.subtle ? `<div class="subtle readable">${cfg.subtle}</div>` : ""}
        ${cfg.extraHTML || ""}
        <div class="bank-wrap">${cards}</div>
        ${store.feedback ? `<div class="feedback ${store.feedback.type}">${store.feedback.text}</div>` : ""}
        <div class="action-row">
          <button class="btn btn-secondary" id="checkBtn" type="button">Check</button>
          <button class="btn btn-primary" id="nextBtn" type="button" ${store.solved ? "" : "disabled"}>Next</button>
        </div>
      </section>
    `;

    document.querySelectorAll("[data-option]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (store.solved) return;
        const id = btn.getAttribute("data-option");
        if (selectedSet.has(id)) store.selected = store.selected.filter(x => x !== id);
        else store.selected = [...store.selected, id];
        state.pendingSpeech = false;
        render();
      });
    });

    document.getElementById("checkBtn").addEventListener("click", () => {
      if (store.solved) return;
      const sortedSel = [...store.selected].sort();
      const sortedCorrect = [...cfg.correctIds].sort();
      if (JSON.stringify(sortedSel) === JSON.stringify(sortedCorrect)) {
        store.solved = true;
        store.feedback = {type:"good", text:cfg.good};
      } else {
        const ended = loseDemerit();
        store.feedback = {type:"bad", text:cfg.bad};
        if (ended) return;
      }
      state.pendingSpeech = true;
      render();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      if (!store.solved) return;
      state.screen += 1;
      state.pendingSpeech = true;
      render();
    });
  }

  function renderFinalTwoScreen() {
    const options = [
      {id:"materialPrecise", label:"The material of the containers is the same."},
      {id:"tempPrecise", label:"The temperature of the water at the start is the same."},
      {id:"typePrecise", label:"The same type of water is used."},
      {id:"durationPrecise", label:"The experiment is carried out for the same duration."}
    ];
    const validIds = options.map(o => o.id);
    const store = getStore("finalTwo", () => ({ options: shuffledNotExact(options, validIds), selected:[], solved:false, feedback:null }));
    const selectedSet = new Set(store.selected);
    const cards = store.options.map(opt => {
      let cls = "bank-card";
      if (selectedSet.has(opt.id)) cls += " selected";
      if (store.solved && selectedSet.has(opt.id)) cls += " correct";
      return `<button type="button" class="${cls}" data-option="${opt.id}">${escapeHTML(opt.label)}</button>`;
    }).join("");

    document.getElementById("mainMount").innerHTML = `
      <section class="screen-card">
        <h1 class="screen-title">Answer question 9(b)</h1>
        <div class="instruction">Choose <strong>any two</strong> precise answers that Rosy can write for question 9(b).</div>
        <div class="subtle readable">This question needs two answers only, but both answers must be precise enough for the mark scheme.</div>
        <div class="bank-wrap">${cards}</div>
        ${store.feedback ? `<div class="feedback ${store.feedback.type}">${store.feedback.text}</div>` : ""}
        <div class="action-row">
          <button class="btn btn-secondary" id="checkBtn" type="button">Check</button>
          <button class="btn btn-primary" id="nextBtn" type="button" ${store.solved ? "" : "disabled"}>Next</button>
        </div>
      </section>
    `;

    document.querySelectorAll("[data-option]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (store.solved) return;
        const id = btn.getAttribute("data-option");
        if (selectedSet.has(id)) {
          store.selected = store.selected.filter(x => x !== id);
        } else {
          if (store.selected.length >= 2) return;
          store.selected = [...store.selected, id];
        }
        state.pendingSpeech = false;
        render();
      });
    });

    document.getElementById("checkBtn").addEventListener("click", () => {
      if (store.solved) return;
      if (store.selected.length !== 2) {
        const ended = loseDemerit();
        store.feedback = {type:"bad", text:"Question 9(b) asks for two answers, so select exactly two precise constants."};
        if (ended) return;
        state.pendingSpeech = true;
        render();
        return;
      }
      if (store.selected.every(id => validIds.includes(id))) {
        store.solved = true;
        store.feedback = {type:"good", text:"Yes. Any two of these accepted precise constants can earn the mark."};
      } else {
        const ended = loseDemerit();
        store.feedback = {type:"bad", text:"Choose from the accepted precise constants only."};
        if (ended) return;
      }
      state.pendingSpeech = true;
      render();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      if (!store.solved) return;
      state.screen += 1;
      state.pendingSpeech = true;
      render();
    });
  }

  function render() {
    updateTopStrip();
    renderQuestionPanel();
    const mount = document.getElementById("mainMount");

    if (state.screen === 1) {
      mount.innerHTML = `
        <section class="screen-card">
          <h1 class="screen-title">Read the question</h1>
          <div class="instruction">Read the question first. Then tap <strong>I have read it</strong>.</div>
          ${questionIntroHTML}
          <div class="scan-wrap">
            <strong>Worksheet scan</strong>
            <img src="${originalScan}" alt="Original worksheet question">
          </div>
          <div class="action-row">
            <button class="btn btn-primary" id="startBtn" type="button">I have read it</button>
          </div>
        </section>
      `;
      document.getElementById("startBtn").addEventListener("click", () => {
        state.screen = 2;
        state.pendingSpeech = true;
        render();
      });
    }

    if (state.screen === 2) {
      renderSingleChoiceScreen({
        key:"changedVariable",
        title:"Find the changed variable",
        instruction:"Tap what Rosy changed on purpose in this experiment.",
        subtle:"A constant must stay the same. The changed variable does not stay the same.",
        extraHTML: containerMiniDiagram(),
        cols:"two",
        options:[
          {id:"changed", label:"Exposed surface area of water"},
          {id:"measured", label:"Amount of water left at the end of the experiment"},
          {id:"material", label:"Material of the container"},
          {id:"type", label:"Type of water"}
        ],
        correctId:"changed",
        good:"Yes. Rosy changed the exposed surface area of water on purpose.",
        bad:"That is not the changed variable. Look for the thing Rosy wanted to test on purpose."
      });
    }

    if (state.screen === 3) {
      renderSingleChoiceScreen({
        key:"measuredVariable",
        title:"Find the measured variable",
        instruction:"Tap the exact result that Rosy measured.",
        subtle:"Use the full wording, not a short vague label.",
        cols:"two",
        options:[
          {id:"measured", label:"Amount of water left at the end of the experiment"},
          {id:"changed", label:"Exposed surface area of water"},
          {id:"temp", label:"Temperature"},
          {id:"amountStart", label:"150 ml of water at the start"}
        ],
        correctId:"measured",
        good:"Yes. The measured variable is the amount of water left at the end of the experiment.",
        bad:"Not quite. Choose the result Rosy recorded at the end."
      });
    }

    if (state.screen === 4) {
      renderMultiSelectScreen({
        key:"alreadyGiven",
        title:"What does the question already tell you?",
        instruction:"Select the conditions that the question already tells you were kept the same.",
        explain:"These conditions are <strong>already given in the question</strong>. That means you do <strong>not</strong> need to write them as your two answers for 9(b).",
        subtle:"Pick only the conditions that were already stated by the question.",
        correctIds:["sameClassroom","fanOn","amountStart"],
        options:[
          {id:"sameClassroom", label:"The containers are in the same classroom."},
          {id:"fanOn", label:"The ceiling fan is switched on for the test."},
          {id:"amountStart", label:"Each container starts with 150 ml of water."},
          {id:"material", label:"The containers are made of the same material."},
          {id:"type", label:"The same type of water is used."},
          {id:"measured", label:"The amount of water left at the end is the same."}
        ],
        good:"Good. These are already told to you by the question, so they are not the two extra answers you need to write.",
        bad:"Check the wording again. Choose only the conditions the question already states."
      });
    }

    if (state.screen === 5) {
      renderSingleChoiceScreen({
        key:"unfairExtraChange",
        title:"Spot the extra change",
        instruction:"Trial B is not a fair test. Tap the extra thing that changed in Trial B.",
        subtle:"Only the exposed surface area should change. Nothing else should change.",
        extraHTML: comparisonVisual(),
        cols:"two",
        options:[
          {id:"material", label:"The material of the containers changed."},
          {id:"surface", label:"The exposed surface area changed."},
          {id:"result", label:"The amount of water left at the end changed."},
          {id:"classroom", label:"The classroom changed."}
        ],
        correctId:"material",
        good:"Yes. Trial B changes the container material as well, so the comparison is unfair.",
        bad:"Look for the extra change in Trial B, not the thing that was meant to change in the original test."
      });
    }

    if (state.screen === 6) {
      renderMultiSelectScreen({
        key:"notConstants",
        title:"Do not choose these as your answers",
        instruction:"Select the options that are <strong>not</strong> good answers for 9(b) because they are not the two other constants you need to state.",
        explain:"Some options are wrong because they are the <strong>changed variable</strong> or the <strong>measured result</strong>, not constants.",
        correctIds:["changed","measured"],
        options:[
          {id:"changed", label:"Exposed surface area of water"},
          {id:"measured", label:"Amount of water left at the end of the experiment"},
          {id:"material", label:"Material of the container"},
          {id:"duration", label:"Duration of the experiment"}
        ],
        good:"Yes. These are not the two other constants: one is the changed variable and one is the measured result.",
        bad:"Pick the options that are wrong because they are not constants at all."
      });
    }

    if (state.screen === 7) {
      renderMultiSelectScreen({
        key:"stillDoNotWrite",
        title:"Do not repeat what the question already gave",
        instruction:"Select the options that you should not write because the question already told you them.",
        explain:"Question 9(b) asks for <strong>two other variables</strong>. So do not repeat the conditions that were already given.",
        correctIds:["sameClassroom","amountStart","fanOn"],
        options:[
          {id:"sameClassroom", label:"Same classroom"},
          {id:"amountStart", label:"150 ml of water at the start"},
          {id:"fanOn", label:"Ceiling fan switched on"},
          {id:"material", label:"Material of the container"},
          {id:"tempStart", label:"Temperature of the water at the start"},
          {id:"type", label:"Type of water"}
        ],
        good:"Good. These were already given by the question, so they are not the two extra answers to supply here.",
        bad:"Choose the conditions already told to you by the question."
      });
    }

    if (state.screen === 8) {
      renderMultiSelectScreen({
        key:"fourPossible",
        title:"Now find the four possible accepted answers",
        instruction:"Select the four possible constants that can be accepted as answers for 9(b).",
        explain:"Now you are choosing from the <strong>remaining</strong> answer pool only.",
        subtle:"Avoid vague labels like <strong>temperature</strong> and <strong>time</strong>.",
        correctIds:["material","tempStart","type","duration"],
        options:[
          {id:"material", label:"Material of the container"},
          {id:"tempStart", label:"Temperature of the water at the start"},
          {id:"type", label:"Type of water"},
          {id:"duration", label:"Duration of the experiment"},
          {id:"tempVague", label:"Temperature"},
          {id:"timeVague", label:"Time"}
        ],
        good:"Yes. These four are the accepted possible answers for this item.",
        bad:"Some choices are still too vague. Pick the four accepted possible answers only."
      });
    }

    if (state.screen === 9) {
      renderMultiSelectScreen({
        key:"preciseWordings",
        title:"Make the wording precise",
        instruction:"Select the precise answer wordings that are good enough for the mark scheme.",
        explain:"A short label helps you think, but the final answer should say clearly what must stay the same.",
        correctIds:["materialPrecise","tempPrecise","typePrecise","durationPrecise"],
        options:[
          {id:"materialPrecise", label:"The material of the containers is the same."},
          {id:"tempPrecise", label:"The temperature of the water at the start is the same."},
          {id:"typePrecise", label:"The same type of water is used."},
          {id:"durationPrecise", label:"The experiment is carried out for the same duration."},
          {id:"tempVague", label:"The temperature is the same."},
          {id:"timeVague", label:"The time is the same."},
          {id:"waterVague", label:"The water is the same."},
          {id:"resultWrong", label:"The amount of water left at the end is the same."}
        ],
        good:"Good. These precise wordings are clear enough for the accepted answers.",
        bad:"Some selected wordings are still too vague or they describe the result instead of a constant."
      });
    }

    if (state.screen === 10) {
      renderFinalTwoScreen();
    }

    if (state.screen === 11) {
      mount.innerHTML = `
        <section class="screen-card">
          <h1 class="screen-title">Completed</h1>
          <div class="instruction">You have finished question 9(b).</div>
          <div class="summary-box readable">
            <p><strong>Accepted constants for this item:</strong></p>
            <div class="summary-list">
              <div class="summary-pill">The material of the containers is the same.</div>
              <div class="summary-pill">The temperature of the water at the start is the same.</div>
              <div class="summary-pill">The same type of water is used.</div>
              <div class="summary-pill">The experiment is carried out for the same duration.</div>
            </div>
            <div class="callout">These are constants because they stay the same while only the changed variable is changed.</div>
          </div>
          <div class="footer-note readable">You did not need to repeat conditions the question had already told you, such as 150 ml at the start or same classroom.</div>
          <div class="action-row">
            <button class="btn btn-secondary" id="restartBtn" type="button">Restart activity</button>
          </div>
        </section>
      `;
      document.getElementById("restartBtn").addEventListener("click", resetActivity);
    }

    renderQuestionPanel();
    updateTopStrip();
    maybeSpeak();
  }

  document.getElementById("readToggle").addEventListener("change", (e) => {
    state.readAloud = e.target.checked;
    state.pendingSpeech = state.readAloud;
    if (!state.readAloud && "speechSynthesis" in window) window.speechSynthesis.cancel();
    render();
  });

  document.getElementById("readNowBtn").addEventListener("click", () => {
    speak(readableTextFromDOM());
  });

  render();
})();
</script>
</body>
</html>
