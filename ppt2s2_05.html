<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt2s2_05</title>
<style>
  :root {
    --bg: #eef6ff;
    --panel: #ffffff;
    --ink: #15324b;
    --muted: #5c7286;
    --blue: #2f78d4;
    --blue-dark: #1d5fb7;
    --ice: #dff3ff;
    --ice-2: #eefaff;
    --good: #1f8f5f;
    --good-soft: #e7f8ef;
    --bad: #b43b3b;
    --bad-soft: #fff0f0;
    --warn: #ffb84d;
    --shadow: 0 12px 30px rgba(21, 50, 75, 0.12);
    --radius: 20px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, #f7fcff 0%, #eef6ff 45%, #e6f0fb 100%);
    min-height: 100vh;
  }

  .app {
    max-width: 1080px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .topbar {
    background: linear-gradient(135deg, #d8ecff, #f3fbff);
    border: 3px solid #b3d8ff;
    border-radius: 22px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }

  .topbar-grid {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 14px;
    align-items: center;
  }

  .demerit-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    align-items: center;
  }

  .demerit-title {
    font-weight: 800;
    font-size: 1.05rem;
  }

  .snowflakes {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .flake {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 1.35rem;
    background: #ffffff;
    border: 2px solid #9dc8f6;
    box-shadow: inset 0 0 0 3px #f5fbff;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .flake.lost {
    opacity: 0.35;
    transform: scale(0.9);
    filter: grayscale(0.1);
  }

  .small-note {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.8);
    border: 2px solid #cae5ff;
    border-radius: 16px;
    padding: 8px 12px;
  }

  .switch {
    position: relative;
    width: 58px;
    height: 32px;
    display: inline-block;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    inset: 0;
    cursor: pointer;
    background: #b5cae2;
    border-radius: 999px;
    transition: 0.25s;
  }

  .slider::before {
    content: "";
    position: absolute;
    width: 24px;
    height: 24px;
    left: 4px;
    top: 4px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.16);
    transition: 0.25s;
  }

  .switch input:checked + .slider {
    background: var(--blue);
  }

  .switch input:checked + .slider::before {
    transform: translateX(26px);
  }

  button {
    font: inherit;
  }

  .speak-btn, .restart-btn, .next-btn, .primary-btn, .secondary-btn, .check-btn {
    border: none;
    border-radius: 16px;
    padding: 14px 18px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, opacity 0.14s ease;
  }

  .speak-btn, .secondary-btn {
    background: #ffffff;
    color: var(--ink);
    border: 2px solid #c6def6;
  }

  .restart-btn {
    background: #fff5e6;
    color: #805100;
    border: 2px solid #ffd38b;
  }

  .primary-btn, .next-btn, .check-btn {
    background: var(--blue);
    color: white;
    box-shadow: 0 8px 16px rgba(47, 120, 212, 0.22);
  }

  .primary-btn:hover, .next-btn:hover, .check-btn:hover,
  .secondary-btn:hover, .restart-btn:hover, .speak-btn:hover {
    transform: translateY(-1px);
  }

  .speak-btn:disabled, .next-btn:disabled, .check-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .screen-card {
    background: var(--panel);
    border-radius: 28px;
    padding: 22px;
    box-shadow: var(--shadow);
    border: 3px solid #d9ebff;
  }

  .screen-meta {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .screen-tag {
    background: #edf6ff;
    border: 2px solid #cfe6ff;
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 700;
    color: var(--blue-dark);
  }

  .screen-title {
    font-size: clamp(1.25rem, 2.4vw, 1.6rem);
    font-weight: 900;
    margin: 0;
  }

  .instruction {
    font-size: clamp(1.65rem, 3.25vw, 2.25rem);
    line-height: 1.18;
    font-weight: 900;
    margin: 12px 0 20px;
    color: #12385e;
  }

  .subtitle {
    font-size: 1.06rem;
    color: var(--muted);
    margin: -8px 0 16px;
  }

  .question-box {
    background: linear-gradient(135deg, #f5fbff, #ffffff);
    border: 3px solid #cfe6ff;
    border-radius: 24px;
    padding: 18px;
  }

  .question-text {
    font-size: 1.12rem;
    line-height: 1.55;
  }

  mark {
    background: #fff1a8;
    color: inherit;
    padding: 0.05em 0.2em;
    border-radius: 6px;
  }

  .intro-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 18px;
    align-items: start;
  }

  .screenshot {
    width: 100%;
    border-radius: 18px;
    border: 3px solid #d2e6fb;
    box-shadow: 0 8px 20px rgba(21, 50, 75, 0.08);
    background: white;
  }

  .action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  .option-grid {
    display: grid;
    gap: 14px;
  }

  .option-grid.two-col {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .option-card {
    border: 3px solid #cfe2f6;
    background: linear-gradient(180deg, #ffffff, #f8fbff);
    border-radius: 20px;
    padding: 18px 18px;
    min-height: 84px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1.12rem;
    font-weight: 700;
    line-height: 1.35;
    cursor: pointer;
    user-select: none;
  }

  .option-card.selected,
  .state-box.selected,
  .process-pill.selected {
    border-color: var(--blue);
    background: #e9f3ff;
    box-shadow: inset 0 0 0 2px rgba(47, 120, 212, 0.1);
  }

  .option-card.correct,
  .state-box.correct,
  .process-pill.correct {
    border-color: var(--good);
    background: var(--good-soft);
  }

  .option-card.wrong,
  .state-box.wrong,
  .process-pill.wrong {
    border-color: var(--bad);
    background: var(--bad-soft);
  }

  .diagram-panel {
    background: linear-gradient(180deg, #f7fcff, #ffffff);
    border: 3px solid #cfe6ff;
    border-radius: 24px;
    padding: 16px;
  }

  .diagram-wrap {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
    aspect-ratio: 7 / 3.7;
  }

  .diagram-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .state-box {
    position: absolute;
    border: 3px solid #b7d8f8;
    border-radius: 16px;
    background: white;
    color: var(--ink);
    font-weight: 800;
    line-height: 1.2;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 8px;
  }

  .state-box.clickable {
    cursor: pointer;
  }

  .state-box.steam {
    left: 2%;
    top: 29%;
    width: 18%;
    height: 22%;
  }

  .state-box.ice {
    left: 37%;
    top: 2%;
    width: 18%;
    height: 22%;
  }

  .state-box.water {
    left: 37%;
    top: 53%;
    width: 18%;
    height: 22%;
  }

  .state-box.vapour {
    right: 2%;
    top: 29%;
    width: 22%;
    height: 22%;
  }

  .process-pill {
    position: absolute;
    min-width: 56px;
    min-height: 46px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 3px solid #b7d8f8;
    background: white;
    color: var(--ink);
    font-weight: 900;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(21, 50, 75, 0.08);
  }

  .process-pill[data-process="M"] { left: 21%; top: 55%; }
  .process-pill[data-process="N"] { left: 43.4%; top: 28%; }
  .process-pill[data-process="O"] { left: 53.5%; top: 28%; }
  .process-pill[data-process="P"] { left: 74%; top: 55%; }

  .hint-row {
    display: flex;
    justify-content: flex-start;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .help-box {
    margin-top: 12px;
    background: #f8fcff;
    border: 2px dashed #b7d8f8;
    border-radius: 16px;
    padding: 12px 14px;
    color: var(--ink);
    font-weight: 600;
  }

  .feedback {
    margin-top: 18px;
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 1.02rem;
    line-height: 1.45;
    font-weight: 700;
    border: 2px solid #d1e5fb;
    background: #f8fbff;
    min-height: 64px;
  }

  .feedback.good {
    background: var(--good-soft);
    border-color: #b7e7ca;
    color: #17553b;
  }

  .feedback.bad {
    background: var(--bad-soft);
    border-color: #f2c2c2;
    color: #8e2f2f;
  }

  .question-panel {
    margin-top: 24px;
    background: #fcfeff;
    border: 3px solid #d9ebff;
    border-radius: 20px;
    overflow: hidden;
  }

  .question-toggle {
    width: 100%;
    background: #f2f9ff;
    border: none;
    border-bottom: 2px solid #d9ebff;
    padding: 16px 18px;
    font-weight: 800;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    cursor: pointer;
  }

  .question-panel-body {
    padding: 18px;
    display: none;
  }

  .question-panel.open .question-panel-body {
    display: block;
  }

  .question-panel.open .question-toggle {
    background: #eaf5ff;
  }

  .question-mini-text {
    font-size: 1rem;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .footer-note {
    margin-top: 18px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 31, 49, 0.7);
    display: none;
    place-items: center;
    padding: 16px;
    z-index: 50;
  }

  .overlay.show {
    display: grid;
  }

  .overlay-card {
    max-width: 520px;
    width: 100%;
    background: white;
    border-radius: 24px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 18px 36px rgba(0,0,0,0.22);
    border: 4px solid #d7ebff;
  }

  .overlay-card h2 {
    margin-top: 0;
    font-size: 2rem;
  }

  .overlay-card p {
    font-size: 1.1rem;
    line-height: 1.5;
  }

  .transfer-diagram {
    background: linear-gradient(180deg, #f7fcff, #ffffff);
    border: 3px solid #cfe6ff;
    border-radius: 24px;
    padding: 16px;
  }

  .transfer-wrap {
    position: relative;
    max-width: 720px;
    margin: 0 auto;
    aspect-ratio: 8 / 3.5;
  }

  .transfer-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .transfer-state {
    position: absolute;
    width: 22%;
    height: 28%;
    border: 3px solid #b7d8f8;
    border-radius: 16px;
    background: white;
    font-weight: 900;
    display: grid;
    place-items: center;
  }

  .transfer-state.solid { left: 4%; top: 30%; }
  .transfer-state.liquid { left: 38%; top: 6%; }
  .transfer-state.gas { right: 4%; top: 30%; }

  .transfer-pill {
    position: absolute;
    min-width: 58px;
    min-height: 46px;
    border-radius: 999px;
    border: 3px solid #b7d8f8;
    background: white;
    font-weight: 900;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(21, 50, 75, 0.08);
  }

  .transfer-pill.selected { border-color: var(--blue); background: #e9f3ff; }
  .transfer-pill.correct { border-color: var(--good); background: var(--good-soft); }
  .transfer-pill.wrong { border-color: var(--bad); background: var(--bad-soft); }

  .transfer-pill[data-process="Q"] { left: 23%; top: 12%; }
  .transfer-pill[data-process="R"] { left: 57%; top: 12%; }
  .transfer-pill[data-process="S"] { left: 49%; top: 49%; }

  .done-wrap {
    text-align: center;
    padding: 16px 8px 4px;
  }

  .done-icon {
    font-size: 4rem;
    margin-bottom: 6px;
  }

  @media (max-width: 860px) {
    .topbar-grid {
      grid-template-columns: 1fr;
    }
    .intro-grid {
      grid-template-columns: 1fr;
    }
    .option-grid.two-col {
      grid-template-columns: 1fr;
    }
    .screen-card {
      padding: 18px;
    }
  }

  @media (max-width: 640px) {
    .app {
      padding: 14px 12px 28px;
    }
    .instruction {
      font-size: 1.6rem;
    }
    .process-pill, .transfer-pill {
      min-width: 52px;
      min-height: 42px;
      font-size: 0.95rem;
    }
    .state-box, .transfer-state {
      font-size: 0.95rem;
    }
    .speak-btn, .restart-btn, .next-btn, .primary-btn, .secondary-btn, .check-btn {
      width: 100%;
    }
    .action-row {
      flex-direction: column;
      align-items: stretch;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-grid">
      <div class="demerit-wrap">
        <div>
          <div class="demerit-title">Keep your snowflakes from melting.</div>
          <div class="small-note" id="demeritNote"></div>
        </div>
        <div class="snowflakes" id="snowflakes" aria-live="polite"></div>
      </div>

      <div class="toggle-group">
        <span><strong>Read-aloud</strong></span>
        <label class="switch" aria-label="Toggle read-aloud">
          <input type="checkbox" id="speechToggle" />
          <span class="slider"></span>
        </label>
        <span id="speechLabel">Off</span>
      </div>

      <div class="hint-row">
        <button class="speak-btn" id="speakBtn" disabled>🔊 Read this screen</button>
        <button class="restart-btn" id="restartBtn">↺ Restart</button>
      </div>
    </div>
  </div>

  <main id="appMain" aria-live="polite"></main>
</div>

<div class="overlay" id="gameOverOverlay" aria-hidden="true">
  <div class="overlay-card">
    <h2>All the snowflakes melted!</h2>
    <p>Take a fresh breath. The whole interactive will restart in a moment so you can try again carefully.</p>
    <p><strong>Restarting…</strong></p>
  </div>
</div>

  function shuffleArray(items) {
    const arr = items.slice();
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function ensureScreenState(screen) {
    if (!state.screenState[screen.id]) {
      const entry = {
        answered: false,
        feedbackType: "",
        feedbackText: "",
        selected: screen.type.includes('multi') ? [] : null,
        attempts: 0,
        checked: false,
        showExact: false,
        order: screen.options ? getShuffledOrder(screen) : null
      };
      state.screenState[screen.id] = entry;
    }
  }

  function getShuffledOrder(screen) {
    const items = screen.options.slice();
    let arr = shuffleArray(items);
    let safety = 0;
    const originalOrder = items.map(x => x.id).join('|');
    while (safety < 20) {
      const correctIndex = arr.findIndex(x => x.correct);
      const sameOrder = arr.map(x => x.id).join('|') === originalOrder;
      if (correctIndex !== 0 && !sameOrder) break;
      arr = shuffleArray(items);
      safety++;
    }
    return arr.map(x => x.id);
  }

  function getOrderedOptions(screen) {
    ensureScreenState(screen);
    const order = state.screenState[screen.id].order || screen.options.map(x => x.id);
    return order.map(id => screen.options.find(opt => opt.id === id));
  }

  function bindScreenEvents(screen) {
    const speakBtn = document.getElementById('speakBtn');
    speakBtn.onclick = () => speakCurrentScreen();

  function bindSingleScreen(screen) {
    document.querySelectorAll('[data-option-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const st = state.screenState[screen.id];
        st.selected = btn.dataset.optionId;
        st.checked = true;
        const chosen = screen.options.find(o => o.id === st.selected);
        if (chosen.correct) {
          st.answered = true;
          st.feedbackType = 'good';
          st.feedbackText = screen.correctFeedback;
        } else {
          applyDemeritIfNeeded(screen);
          st.feedbackType = 'bad';
          st.feedbackText = screen.wrongFeedback;
        }
        render();
      });
    });
  }

  function bindMultiScreen(screen) {
    document.querySelectorAll('[data-option-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const st = state.screenState[screen.id];
        const id = btn.dataset.optionId;
        if (st.selected.includes(id)) {
          st.selected = st.selected.filter(x => x !== id);
        } else {
          st.selected = [...st.selected, id];
        }
        st.checked = false;
        render();
      });
    });

    const checkBtn = document.getElementById('checkBtn');
    if (checkBtn) {
      checkBtn.addEventListener('click', () => {
        const st = state.screenState[screen.id];
        st.checked = true;
        const correctIds = screen.options.filter(o => o.correct).map(o => o.id).sort().join('|');
        const selectedIds = st.selected.slice().sort().join('|');
        if (correctIds === selectedIds) {
          st.answered = true;
          st.showExact = true;
          st.feedbackType = 'good';
          st.feedbackText = screen.correctFeedback;
        } else {
          st.attempts += 1;
          applyDemeritIfNeeded(screen);
          st.feedbackType = 'bad';
          st.feedbackText = st.attempts >= 2 ? screen.wrongFeedback2 : screen.wrongFeedback1;
          st.showExact = st.attempts >= 2;
        }
        render();
      });
    }
  }

  function applyDemeritIfNeeded(screen) {
    if (!screen.demerit) return;

  function showGameOver() {
    window.speechSynthesis.cancel();

    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden', 'false');
    if (state.restartTimer) clearTimeout(state.restartTimer);
    state.restartTimer = setTimeout(() => {
      overlay.classList.remove('show');
      overlay.setAttribute('aria-hidden', 'true');
      resetInteractive();
    }, 1800);
  }

  function resetInteractive() {
    window.speechSynthesis.cancel();
    if (state.restartTimer) clearTimeout(state.restartTimer);
    state.screenIndex = 0;
    state.questionOpen = false;
    state.helpOpen = false;
    state.demeritsLeft = state.demeritsMax;
    state.screenState = {};
    document.getElementById('gameOverOverlay').classList.remove('show');
    document.getElementById('gameOverOverlay').setAttribute('aria-hidden', 'true');
    render();
  }

  function currentSpeechText() {
    const screen = screens[state.screenIndex];
    const st = state.screenState[screen.id] || {};
    if (screen.speech) return screen.speech.join(' ');

    if (screen.type === 'single') {
      const options = getOrderedOptions(screen).map(o => o.text).join('. ');
      return `${screen.title}. ${screen.instruction}. ${screen.subtitle || ''}. Options: ${options}. ${st.feedbackText || ''}`;
    }

    if (screen.type === 'multi') {
      const options = getOrderedOptions(screen).map(o => o.text).join('. ');
      return `${screen.title}. ${screen.instruction}. ${screen.subtitle || ''}. Options: ${options}. ${st.feedbackText || ''}`;
    }

    if (screen.type === 'diagram-state-multi') {
      return `${screen.title}. ${screen.instruction}. Boxes shown are Steam, Ice, Water, and Water vapour. ${st.feedbackText || ''}`;
    }

    if (screen.type === 'diagram-process-single' || screen.type === 'diagram-process-multi') {
      return `${screen.title}. ${screen.instruction}. The diagram shows Steam, Ice, Water, and Water vapour, with process labels M, N, O, and P. ${st.feedbackText || ''}`;
    }

    if (screen.type === 'transfer-process-single') {
      return `${screen.title}. ${screen.instruction}. The mini-diagram shows Solid, Liquid, and Gas, with process labels Q, R, and S. ${st.feedbackText || ''}`;
    }

    return `${screen.title}. ${screen.instruction}.`;
  }

  function speakCurrentScreen() {
    if (!state.readAloud || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(currentSpeechText());
    utter.rate = 0.95;
    utter.pitch = 1;
    window.speechSynthesis.speak(utter);
  }

  document.getElementById('speechToggle').addEventListener('change', (e) => {
    state.readAloud = e.target.checked;
    if (!state.readAloud) {
      window.speechSynthesis.cancel();
    }
    updateTopbar();
  });

  render();
})();
</script>
</body>
</html>
