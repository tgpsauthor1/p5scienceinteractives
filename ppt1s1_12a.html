<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt1s1_12a</title>
<style>
  :root {
    --bg: #eef8ff;
    --panel: #ffffff;
    --ink: #17324d;
    --muted: #5b7086;
    --line: #c8ddee;
    --accent: #0b78d1;
    --accent-2: #27a77a;
    --warn: #d94b4b;
    --soft-warn: #ffe8e8;
    --soft-good: #e7fbf2;
    --shadow: 0 12px 28px rgba(18, 58, 95, 0.12);
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #f5fbff 0%, #ebf7ff 100%);
    color: var(--ink);
  }
  body {
    padding: 16px;
  }
  .app {
    max-width: 1040px;
    margin: 0 auto;
  }
  .top-shell {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(90deg, #0c6fca, #2ca1ff);
    color: white;
  }
  .topbar h1 {
    margin: 0;
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1.1;
  }
  .progress {
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
  }
  .audio-tools {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .audio-tools button {
    border: 0;
    background: rgba(255,255,255,0.18);
    color: white;
    font-weight: 700;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 15px;
    cursor: pointer;
  }
  .audio-tools button:hover {
    background: rgba(255,255,255,0.28);
  }
  .demerit-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: #f7fcff;
    border-bottom: 2px solid var(--line);
  }
  .demerit-label {
    font-weight: 800;
    font-size: 16px;
    color: var(--ink);
  }
  .breeze-track {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .breeze-pill {
    min-width: 82px;
    text-align: center;
    padding: 10px 12px;
    border-radius: 999px;
    background: #ddf3ff;
    border: 2px solid #9ed4ff;
    font-weight: 800;
    color: #0f5f9f;
  }
  .breeze-pill.lost {
    background: #f1f4f6;
    border-color: #d3dbe2;
    color: #8d99a4;
    text-decoration: line-through;
  }
  .demerit-note {
    color: var(--muted);
    font-size: 14px;
    font-weight: 700;
  }
  .main-card {
    background: var(--panel);
    margin-top: 16px;
    border: 2px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .instruction {
    margin: 0 0 12px;
    font-size: clamp(28px, 4vw, 40px);
    line-height: 1.1;
    font-weight: 900;
    color: #0e3a62;
  }
  .support-line {
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .screen-grid {
    display: grid;
    gap: 18px;
  }
  .two-col {
    grid-template-columns: 1.1fr 0.9fr;
    align-items: start;
  }
  .panel {
    background: #fafdff;
    border: 2px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
  }
  .panel h2, .panel h3 {
    margin-top: 0;
  }
  .question-text {
    font-size: 18px;
    line-height: 1.6;
  }
  mark {
    background: #fff1a8;
    padding: 0 0.18em;
    border-radius: 6px;
  }
  .source-image {
    width: 100%;
    border: 2px solid var(--line);
    border-radius: 18px;
    background: white;
    display: block;
  }
  .option-grid {
    display: grid;
    gap: 12px;
    margin-top: 10px;
  }
  .option-grid.cols-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .option-btn, .choice-card, .chip-btn, .control-btn, .blank-btn {
    width: 100%;
    border: 2px solid var(--line);
    border-radius: 18px;
    background: white;
    padding: 16px;
    text-align: left;
    font-size: 20px;
    line-height: 1.35;
    color: var(--ink);
    cursor: pointer;
    font-weight: 700;
  }
  .option-btn:hover, .choice-card:hover, .chip-btn:hover, .control-btn:hover, .blank-btn:hover {
    border-color: #87c0ef;
    transform: translateY(-1px);
  }
  .option-btn.selected, .choice-card.selected, .blank-btn.active {
    border-color: var(--accent);
    background: #eef8ff;
    box-shadow: 0 0 0 4px rgba(11, 120, 209, 0.08);
  }
  .option-btn.correct, .choice-card.correct {
    border-color: var(--accent-2);
    background: var(--soft-good);
  }
  .option-btn.wrong, .choice-card.wrong {
    border-color: var(--warn);
    background: var(--soft-warn);
  }
  .feedback {
    min-height: 70px;
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 18px;
    font-size: 18px;
    line-height: 1.4;
    font-weight: 800;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.good {
    background: var(--soft-good);
    border: 2px solid #9cd9be;
    color: #115e44;
  }
  .feedback.bad {
    background: var(--soft-warn);
    border: 2px solid #efb4b4;
    color: #8b1f1f;
  }
  .nav-row {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .nav-row .control-btn {
    width: auto;
    min-width: 140px;
    text-align: center;
    padding: 14px 18px;
    font-size: 18px;
  }
  .primary {
    background: linear-gradient(90deg, #0c78d1, #2a9df4);
    color: white;
    border-color: #0c78d1;
  }
  .primary:disabled, .ghost:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none !important;
  }
  .ghost {
    background: white;
    color: var(--ink);
  }
  .question-toggle {
    margin-top: 18px;
  }
  .question-toggle button {
    width: auto;
  }
  .question-panel {
    margin-top: 12px;
    display: none;
  }
  .question-panel.open {
    display: block;
  }
  .small {
    font-size: 15px;
    color: var(--muted);
    font-weight: 700;
  }
  .badge {
    display: inline-block;
    padding: 8px 12px;
    border-radius: 999px;
    background: #ebf7ff;
    border: 2px solid #b7def9;
    font-weight: 800;
    margin: 0 8px 8px 0;
  }
  .mini-note {
    font-size: 17px;
    line-height: 1.45;
    font-weight: 700;
    color: var(--muted);
  }
  .diagram-card {
    background: #fbfeff;
    border: 2px solid var(--line);
    border-radius: 20px;
    padding: 10px;
  }
  .diagram-card svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .compare-box {
    display: grid;
    gap: 14px;
  }
  .compare-box.two {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .statement-grid {
    display: grid;
    gap: 12px;
  }
  .statement-item {
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 19px;
    font-weight: 700;
    background: white;
    cursor: pointer;
  }
  .statement-item.selected {
    border-color: var(--accent);
    background: #eef8ff;
  }
  .statement-item.correct {
    border-color: var(--accent-2);
    background: var(--soft-good);
  }
  .statement-item.wrong {
    border-color: var(--warn);
    background: var(--soft-warn);
  }
  .builder-wrap {
    display: grid;
    gap: 12px;
  }
  .target-slots {
    display: grid;
    gap: 10px;
  }
  .slot {
    border: 2px dashed #a8cde7;
    min-height: 64px;
    border-radius: 18px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    font-size: 19px;
    font-weight: 800;
    background: #f8fcff;
  }
  .slot.filled {
    border-style: solid;
    border-color: var(--accent);
    background: #eef8ff;
  }
  .bank-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }
  .chip-btn {
    text-align: center;
  }
  .sentence-frame {
    font-size: 24px;
    line-height: 1.7;
    font-weight: 800;
    background: #fafdff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 18px;
  }
  .blank-btn {
    display: inline-flex;
    width: auto;
    min-width: 140px;
    justify-content: center;
    text-align: center;
    margin: 4px 6px;
    vertical-align: middle;
  }
  .blank-btn.filled {
    background: #eef8ff;
    border-color: var(--accent);
  }
  .blank-btn.empty {
    color: #487296;
  }
  .current-blank {
    margin: 10px 0 0;
    font-size: 18px;
    color: var(--muted);
    font-weight: 800;
  }
  .guess-box {
    display: grid;
    gap: 14px;
  }
  .guess-frame {
    font-size: 24px;
    line-height: 1.8;
    font-weight: 800;
    background: #fafdff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 18px;
  }
  .guess-word {
    display: inline-block;
    min-width: 88px;
    padding: 6px 10px;
    margin: 0 4px;
    border-radius: 12px;
    background: #eef8ff;
    border: 2px solid #b7d8f1;
    text-align: center;
  }
  .guess-word.current {
    background: #fff8dd;
    border-color: #f0d56c;
  }
  .guess-word.done {
    background: var(--soft-good);
    border-color: #9cd9be;
  }
  .guess-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .guess-row input {
    flex: 1 1 240px;
    font-size: 22px;
    padding: 14px 16px;
    border-radius: 16px;
    border: 2px solid var(--line);
  }
  .guess-help {
    font-size: 18px;
    font-weight: 800;
    color: var(--muted);
  }
  .summary-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .summary-chips span {
    padding: 10px 14px;
    border-radius: 999px;
    background: #eef8ff;
    border: 2px solid #b9dbf4;
    font-weight: 800;
    font-size: 18px;
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(14, 40, 63, 0.62);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 30;
  }
  .overlay.show {
    display: flex;
  }
  .overlay-card {
    max-width: 520px;
    width: 100%;
    background: white;
    border-radius: 24px;
    padding: 24px;
    border: 3px solid #d6e8f7;
    box-shadow: 0 18px 32px rgba(0,0,0,0.18);
    text-align: center;
  }
  .overlay-card h2 {
    font-size: 36px;
    margin: 0 0 12px;
  }
  .overlay-card p {
    font-size: 20px;
    font-weight: 700;
    color: var(--muted);
    margin: 0;
    line-height: 1.5;
  }
  .legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .legend .badge {
    margin: 0;
  }
  .vis-note {
    margin-top: 10px;
    font-size: 17px;
    color: var(--muted);
    font-weight: 700;
  }
  .petal-card-title {
    font-size: 20px;
    font-weight: 900;
    margin: 0 0 8px;
  }
  @media (max-width: 860px) {
    .two-col, .compare-box.two {
      grid-template-columns: 1fr;
    }
    .topbar {
      grid-template-columns: 1fr;
    }
    .audio-tools {
      justify-content: flex-start;
    }
    body {
      padding: 10px;
    }
    .instruction {
      font-size: 30px;
    }
    .option-grid.cols-2 {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-shell">
    <div class="topbar">
      <h1>Wind or animal pollination?</h1>
      <div class="progress" id="progressText">Screen 1 of 12</div>
      <div class="audio-tools">
        <button id="toggleAudioBtn" type="button">Read-aloud: Off</button>
        <button id="readNowBtn" type="button">Read this screen</button>
      </div>
    </div>
    <div class="demerit-row">
      <div class="demerit-label">Breezes left:</div>
      <div class="breeze-track" id="breezeTrack"></div>
      <div class="demerit-note" id="demeritNote"></div>
    </div>
  </div>

  <div class="main-card" id="appCard"></div>
</div>

<div class="overlay" id="restartOverlay">
  <div class="overlay-card">
    <h2>Out of breezes!</h2>
    <p>You used all the breezes in the teaching part. The whole interactive is restarting so you can try again carefully.</p>
  </div>
</div>

const questionPanelHTML = `
  <div class="panel">
    <div class="question-text">
      <p><strong>Question:</strong> Based on the diagram above, is flower A likely to be pollinated by animals or wind? Give a reason to support your answer.</p>
      <p><strong>Context from the source:</strong> Flower A grows in a cold climate. Very few insects and small animals are found to live there. Yet, every year, flower A blooms and numerous fruits are formed.</p>
    </div>
    <img class="source-image" src="${ORIGINAL_IMAGE}" alt="Original question diagram of flower A" />
  </div>
`;

const state = {
  screenIndex: 0,
  demeritsMax: 0,
  demeritsLeft: 0,
  questionPanelOpen: false,
  readAloudOn: false,
  audioEnabledOnce: false,
  screenState: {},
  restartTimer: null
};

function countTeachingChecks() {
  return screenDefinitions.filter(s => s.applyDemerit).length;
}

function makeScreenState(screen) {
  const base = {
    completed: false,
    feedback: "",
    feedbackType: "",
    optionOrder: null,
    selectedId: null,
    multiSelected: [],
    lastChecked: false,
    builtOrder: [],
    orderBank: null,
    blankOrder: null,
    blanks: {},
    activeBlank: 0,
    blankWrongCount: 0,
    playedAnimation: false,
    guessIndex: 0,
    guessReveals: [1,1,1],
    guessSolved: ["", "", ""],
    guessInput: ""
  };
  if (screen.options) {
    base.optionOrder = shuffleCopy(screen.options);
  }
  if (screen.type === "order") {
    base.orderBank = shuffleUntil(screen.pieces, items => items.map(i => i.id).join("|") !== screen.correctOrder.join("|"));
  }
  if (screen.type === "blanks") {
    base.blankOrder = shuffleCopy(screen.options);
    screen.blanks.forEach((b, idx) => base.blanks[b.id] = null);
    base.activeBlank = 0;
  }
  return base;
}

function resetApp() {
  clearTimeout(state.restartTimer);
  state.screenIndex = 0;
  state.demeritsMax = Math.floor(countTeachingChecks() / 2);
  state.demeritsLeft = state.demeritsMax;
  state.questionPanelOpen = false;
  state.screenState = {};
  screenDefinitions.forEach(screen => {
    state.screenState[screen.id] = makeScreenState(screen);
  });
  document.getElementById("restartOverlay").classList.remove("show");
  render();
}

function shuffleCopy(arr) {
  const copy = arr.map(item => ({ ...item }));
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function shuffleUntil(arr, conditionFn) {
  let tries = 0;
  let copy = shuffleCopy(arr);
  while (!conditionFn(copy) && tries < 20) {
    copy = shuffleCopy(arr);
    tries++;
  }
  return copy;
}

function currentScreen() {
  return screenDefinitions[state.screenIndex];
}

function currentLocal() {
  return state.screenState[currentScreen().id];
}

function applyDemeritIfNeeded(screen) {
  if (!screen.applyDemerit) return;
  state.demeritsLeft = Math.max(0, state.demeritsLeft - 1);
  if (state.demeritsLeft === 0) {
    triggerRestart();
  }
}

function triggerRestart() {
  speechSynthesis.cancel();
  const overlay = document.getElementById("restartOverlay");
  overlay.classList.add("show");
  state.restartTimer = setTimeout(() => {
    resetApp();
  }, 1800);
}

function setFeedback(local, text, type) {
  local.feedback = text;
  local.feedbackType = type;
}

function updateDemeritRow() {
  const track = document.getElementById("breezeTrack");
  const note = document.getElementById("demeritNote");
  track.innerHTML = "";
  for (let i = 0; i < state.demeritsMax; i++) {
    const pill = document.createElement("div");
    pill.className = "breeze-pill" + (i < state.demeritsLeft ? "" : " lost");
    pill.textContent = i < state.demeritsLeft ? "🍃 Breeze" : "🍃 Used";
    track.appendChild(pill);
  }
  note.textContent = `${state.demeritsLeft} of ${state.demeritsMax} breezes left. Guess-the-word and the transfer check do not use breezes.`;
}

function render() {
  updateDemeritRow();
  document.getElementById("progressText").textContent = `Screen ${state.screenIndex + 1} of ${screenDefinitions.length}`;
  document.getElementById("toggleAudioBtn").textContent = `Read-aloud: ${state.readAloudOn ? "On" : "Off"}`;
  const app = document.getElementById("appCard");
  const screen = currentScreen();
  const local = currentLocal();
  const prevDisabled = state.screenIndex === 0;
  const nextDisabled = !local.completed || state.screenIndex === screenDefinitions.length - 1;
  let html = `
    <h2 class="instruction">${escapeHTML(screen.instruction)}</h2>
    <div class="support-line">${escapeHTML(screen.support)}</div>
    ${renderScreenBody(screen, local)}
    ${renderFeedback(local)}
    ${screen.id !== "finish" ? `
      <div class="nav-row">
        <button class="control-btn ghost" id="prevBtn" ${prevDisabled ? "disabled" : ""}>Back</button>
        <button class="control-btn primary" id="nextBtn" ${nextDisabled ? "disabled" : ""}>Next</button>
      </div>` : ""}
    ${state.screenIndex > 0 ? renderQuestionToggle() : ""}
  `;
  app.innerHTML = html;
  bindScreenEvents(screen, local);
  window.scrollTo({ top: 0, behavior: "smooth" });
  if (state.readAloudOn && state.audioEnabledOnce) {
    speakCurrentScreen();
  }
}

function renderFeedback(local) {
  if (!local.feedback) return "";
  return `<div class="feedback show ${local.feedbackType}">${escapeHTML(local.feedback)}</div>`;
}

function renderQuestionToggle() {
  return `
    <div class="question-toggle">
      <button class="control-btn ghost" id="toggleQuestionBtn">${state.questionPanelOpen ? "Hide question and source" : "Show question and source"}</button>
      <div class="question-panel ${state.questionPanelOpen ? "open" : ""}" id="questionPanel">${questionPanelHTML}</div>
    </div>
  `;
}

function renderScreenBody(screen, local) {
  switch (screen.type) {
    case "intro":
      return renderIntro(local);
    case "single":
      return renderSingle(screen, local);
    case "multi":
      return renderMulti(screen, local);
    case "order":
      return renderOrder(screen, local);
    case "blanks":
      return renderBlanks(screen, local);
    case "guess":
      return renderGuess(screen, local);
    case "finish":
      return renderFinish();
    default:
      return "<p>Screen type not found.</p>";
  }
}

    visualHTML = `

      <div class="vis-note">The hanging anthers sit outside the flower, where moving air can shake pollen off more easily.</div>

  if (screen.visual === "transfer") {
    visualHTML = `

        <button class="choice-card ${local.selectedId === "flower_x" ? "selected" : ""}" data-choice-id="flower_x">

  }
  const options = local.optionOrder.map(opt => {
    const classes = ["option-btn"];
    if (local.selectedId === opt.id) classes.push("selected");
    if (local.completed && opt.id === screen.correctId) classes.push("correct");
    if (local.feedbackType === "bad" && local.selectedId === opt.id && opt.id !== screen.correctId) classes.push("wrong");
    return `<button class="${classes.join(" ")}" data-option-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  return `
    <div class="screen-grid">
      ${visualHTML}
      ${screen.visual === "transfer" ? "" : `<div class="option-grid">${options}</div>`}
    </div>
  `;
}

function renderMulti(screen, local) {
  const options = local.optionOrder.map(opt => {
    const chosen = local.multiSelected.includes(opt.id);
    const classes = ["statement-item"];
    if (chosen) classes.push("selected");
    if (local.lastChecked) {
      const shouldBe = screen.correctIds.includes(opt.id);
      if (chosen && shouldBe) classes.push("correct");
      if (chosen && !shouldBe) classes.push("wrong");
      if (!chosen && shouldBe && local.feedbackType === "bad") classes.push("correct");
    }
    return `<button class="${classes.join(" ")}" data-multi-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  return `
    <div class="screen-grid">
      <div class="statement-grid">${options}</div>
      <div class="nav-row" style="margin-top:0;">
        <button class="control-btn ghost" id="checkMultiBtn">Check</button>
      </div>
    </div>
  `;
}

function renderOrder(screen, local) {
  const slots = screen.correctOrder.map((_, idx) => {
    const itemId = local.builtOrder[idx];
    const item = screen.pieces.find(p => p.id === itemId);
    return `<button class="slot ${item ? "filled" : ""}" data-built-index="${idx}">
      ${item ? escapeHTML(item.text) + ' <span class="small" style="margin-left:8px;">Tap to remove</span>' : "Tap an option below to fill this step"}
    </button>`;
  }).join("");
  const bankItems = local.orderBank.filter(item => !local.builtOrder.includes(item.id)).map(item =>
    `<button class="chip-btn" data-bank-id="${item.id}">${escapeHTML(item.text)}</button>`
  ).join("");
  return `
    <div class="screen-grid">
      <div class="diagram-card">
        <div class="nav-row" style="margin:0 0 10px;">
          <button class="control-btn ghost" id="playAnimBtn">Play</button>

        <div id="animArea">${animatedFlower(local.playedAnimation)}</div>
      </div>
      <div class="builder-wrap">
        <div class="target-slots">${slots}</div>
        <div class="bank-grid">${bankItems}</div>
        <div class="nav-row" style="margin-top:0;">
          <button class="control-btn ghost" id="checkOrderBtn">Check</button>
        </div>
      </div>
    </div>
  `;
}

function renderBlanks(screen, local) {
  const parts = [];
  let blankCounter = 0;
  screen.sentenceParts.forEach((part, idx) => {
    if (part === null) {
      const blank = screen.blanks[blankCounter];
      const chosenId = local.blanks[blank.id];
      const chosen = screen.options.find(opt => opt.id === chosenId);
      const isActive = local.activeBlank === blankCounter;
      parts.push(`<button class="blank-btn ${chosen ? "filled" : "empty"} ${isActive ? "active" : ""}" data-blank-index="${blankCounter}">
        ${chosen ? escapeHTML(chosen.text) : blank.placeholder}
      </button>`);
      blankCounter++;
    } else {
      parts.push(escapeHTML(part));
    }
  });
  const options = local.blankOrder.map(opt => {
    const selectedSomewhere = Object.values(local.blanks).includes(opt.id);
    return `<button class="chip-btn ${selectedSomewhere ? "selected" : ""}" data-fill-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  return `
    <div class="screen-grid">
      <div class="sentence-frame">${parts.join("")}</div>
      <div class="current-blank">Now choose a word for <strong>Blank ${local.activeBlank + 1}</strong>.</div>
      <div class="bank-grid">${options}</div>
      <div class="nav-row" style="margin-top:0;">
        <button class="control-btn ghost" id="checkBlanksBtn">Check</button>
      </div>
    </div>
  `;
}

function renderGuess(screen, local) {
  const words = screen.words.map((w, idx) => {
    if (local.guessSolved[idx]) return `<span class="guess-word done">${escapeHTML(local.guessSolved[idx])}</span>`;
    if (idx === local.guessIndex) {
      const reveal = local.guessReveals[idx];
      const shown = w.answer.slice(0, reveal) + "_".repeat(Math.max(0, w.answer.length - reveal));
      return `<span class="guess-word current">${escapeHTML(shown)}</span>`;
    }
    return `<span class="guess-word">_____</span>`;
  });
  const frame = `
    Flower A is pollinated by ${words[0]} because its anthers hang out of the flower, so pollen grains are easily shaken free and carried by the wind, and its ${words[1]} stigma can catch ${words[2]} grains floating in the air.
  `;
  const done = local.completed;
  return `
    <div class="guess-box">
      <div class="guess-frame">${frame}</div>
      ${done ? `<div class="summary-chips"><span>wind</span><span>feathery</span><span>pollen</span></div>` : `
        <div class="guess-help">Current word: <strong>${screen.words[local.guessIndex].key}</strong> — start with the letters shown.</div>

          <input id="guessInput" type="text" autocomplete="off" spellcheck="false" placeholder="Type the whole word" value="${escapeAttr(local.guessInput)}" />

        </div>
      `}
    </div>
  `;
}

function bindScreenEvents(screen, local) {
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (prevBtn) prevBtn.addEventListener("click", () => {
    if (state.screenIndex > 0) {
      state.screenIndex--;
      render();
    }
  });
  if (nextBtn) nextBtn.addEventListener("click", () => {
    if (local.completed && state.screenIndex < screenDefinitions.length - 1) {
      state.screenIndex++;
      render();
    }
  });

  const toggleQ = document.getElementById("toggleQuestionBtn");
  if (toggleQ) {
    toggleQ.addEventListener("click", () => {
      state.questionPanelOpen = !state.questionPanelOpen;
      render();
    });
  }

  if (screen.type === "intro") {
    document.getElementById("readDoneBtn").addEventListener("click", () => {
      local.completed = true;
      setFeedback(local, "Good. Now find the clue that rules one option out first.", "good");
      render();
    });
  }

  if (screen.type === "single" && screen.visual !== "transfer") {
    document.querySelectorAll("[data-option-id]").forEach(btn => {
      btn.addEventListener("click", () => handleSingleChoice(screen, local, btn.dataset.optionId));
    });
  }

  if (screen.type === "single" && screen.visual === "transfer") {
    document.querySelectorAll("[data-choice-id]").forEach(btn => {
      btn.addEventListener("click", () => handleSingleChoice(screen, local, btn.dataset.choiceId));
    });
  }

  if (screen.type === "multi") {
    document.querySelectorAll("[data-multi-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.multiId;
        if (local.multiSelected.includes(id)) {
          local.multiSelected = local.multiSelected.filter(x => x !== id);
        } else {
          local.multiSelected = [...local.multiSelected, id];
        }
        render();
      });
    });
    document.getElementById("checkMultiBtn").addEventListener("click", () => {
      local.lastChecked = true;
      const chosen = [...local.multiSelected].sort().join("|");
      const correct = [...screen.correctIds].sort().join("|");
      if (chosen === correct) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        applyDemeritIfNeeded(screen);
        setFeedback(local, screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "order") {
    document.getElementById("playAnimBtn").addEventListener("click", () => {
      local.playedAnimation = true;
      render();
    });
    document.querySelectorAll("[data-bank-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (local.builtOrder.length < screen.correctOrder.length) {
          local.builtOrder.push(btn.dataset.bankId);
          setFeedback(local, "", "");
          render();
        }
      });
    });
    document.querySelectorAll("[data-built-index]").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = Number(btn.dataset.builtIndex);
        if (local.builtOrder[idx]) {
          local.builtOrder.splice(idx, 1);
          render();
        }
      });
    });
    document.getElementById("checkOrderBtn").addEventListener("click", () => {
      if (local.builtOrder.length !== screen.correctOrder.length) {
        setFeedback(local, "Build all three steps first.", "bad");
        render();
        return;
      }
      const answer = local.builtOrder.join("|");
      const correct = screen.correctOrder.join("|");
      if (answer === correct) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        applyDemeritIfNeeded(screen);
        setFeedback(local, screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "blanks") {
    document.querySelectorAll("[data-blank-index]").forEach(btn => {
      btn.addEventListener("click", () => {
        local.activeBlank = Number(btn.dataset.blankIndex);
        render();
      });
    });
    document.querySelectorAll("[data-fill-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        const fillId = btn.dataset.fillId;
        const blank = screen.blanks[local.activeBlank];
        local.blanks[blank.id] = fillId;
        if (local.activeBlank < screen.blanks.length - 1) {
          local.activeBlank += 1;
        }
        setFeedback(local, "", "");
        render();
      });
    });
    document.getElementById("checkBlanksBtn").addEventListener("click", () => {
      const allFilled = screen.blanks.every(b => !!local.blanks[b.id]);
      if (!allFilled) {
        setFeedback(local, "Fill both blanks first.", "bad");
        render();
        return;
      }
      const correct = screen.blanks.every(b => local.blanks[b.id] === b.answerId);
      if (correct) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        local.blankWrongCount += 1;
        applyDemeritIfNeeded(screen);
        setFeedback(local, local.blankWrongCount === 1 ? screen.firstWrongFeedback : screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "guess") {
    const input = document.getElementById("guessInput");
    if (input) {
      input.addEventListener("input", e => {
        local.guessInput = e.target.value;
      });
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("checkGuessBtn").click();
        }
      });
    }
    const btn = document.getElementById("checkGuessBtn");
    if (btn) {
      btn.addEventListener("click", () => {
        const idx = local.guessIndex;
        const target = screen.words[idx].answer.toLowerCase();
        const typed = (local.guessInput || "").trim().toLowerCase();
        if (typed === target) {
          local.guessSolved[idx] = screen.words[idx].answer;
          local.guessInput = "";
          if (idx < screen.words.length - 1) {
            local.guessIndex += 1;
            setFeedback(local, "Yes. Now retrieve the next word.", "good");
          } else {
            local.completed = true;
            setFeedback(local, screen.correctFeedback, "good");
          }
        } else {
          local.guessReveals[idx] = Math.min(screen.words[idx].answer.length, local.guessReveals[idx] + 1);
          setFeedback(local, "Not yet. Here is one more letter to help you retrieve it.", "bad");
        }
        render();
      });
    }
  }

  if (screen.type === "finish") {
    document.getElementById("finishBtn").addEventListener("click", () => {
      speechSynthesis.cancel();
      const btn = document.getElementById("finishBtn");
      btn.textContent = "Done";
      btn.disabled = true;
    });
    document.getElementById("restartBtn").addEventListener("click", () => resetApp());
  }
}

function handleSingleChoice(screen, local, id) {
  local.selectedId = id;
  if (id === screen.correctId) {
    local.completed = true;
    setFeedback(local, screen.correctFeedback, "good");
  } else {
    applyDemeritIfNeeded(screen);
    setFeedback(local, screen.wrongFeedback, "bad");
  }
  render();
}

            <line x1="-8" y1="8" x2="-24" y2="4" stroke="#f4a000" stroke-width="4"/>
          </g>
          <g transform="translate(42,42)">
            <line x1="0" y1="0" x2="16" y2="0" stroke="#f4a000" stroke-width="4"/>
            <line x1="8" y1="-8" x2="24" y2="-4" stroke="#f4a000" stroke-width="4"/>
            <line x1="8" y1="8" x2="24" y2="4" stroke="#f4a000" stroke-width="4"/>
          </g>
        </g>
      </svg>
    `;
  }
  return `
    <svg viewBox="0 0 240 220" aria-label="Flower with large petals and enclosed anthers">
      <rect x="0" y="0" width="240" height="220" fill="#ffffff"/>
      <g transform="translate(120 126)">
        <ellipse cx="-28" cy="-22" rx="34" ry="54" fill="#ffd2dd" stroke="#b55b78" stroke-width="3"/>
        <ellipse cx="28" cy="-22" rx="34" ry="54" fill="#ffd2dd" stroke="#b55b78" stroke-width="3"/>
        <ellipse cx="0" cy="-42" rx="28" ry="48" fill="#ffdcea" stroke="#b55b78" stroke-width="3"/>
        <path d="M0,-58 C-12,-18 -12,30 0,76 C12,30 12,-18 0,-58" fill="#fff6fb" stroke="#7c5064" stroke-width="3"/>
        <ellipse cx="0" cy="-6" rx="8" ry="18" fill="#7c5064"/>
        <ellipse cx="0" cy="34" rx="16" ry="10" fill="#d88b2d"/>
      </g>
    </svg>
  `;
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function escapeAttr(str) {
  return escapeHTML(str ?? "");
}

function collectReadAloudText() {
  const screen = currentScreen();
  const local = currentLocal();
  const bits = [screen.instruction, screen.support];
  if (screen.type === "intro") {
    bits.push("Question. Based on the diagram above, is flower A likely to be pollinated by animals or wind? Give a reason to support your answer.");
    bits.push("Clue already given. Very few insects and small animals are found there.");
  }
  if (screen.options) {
    const order = local.optionOrder || [];
    order.forEach(opt => bits.push(opt.text));
  }
  if (screen.type === "multi") {
    (local.optionOrder || []).forEach(opt => bits.push(opt.text));
  }
  if (screen.type === "order") {
    bits.push("Build this chain. Exposed anthers let pollen shake free. The wind carries the pollen. The feathery stigma catches the pollen.");
  }
  if (screen.type === "blanks") {
    screen.options.forEach(opt => bits.push(opt.text));
  }
  if (screen.type === "guess") {
    bits.push("Retrieve the words wind, feathery, and pollen one at a time.");
  }
  if (local.feedback) bits.push(local.feedback);
  return bits.join(". ");
}

function speakCurrentScreen() {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(collectReadAloudText());
  utter.rate = 0.96;
  utter.pitch = 1;
  utter.volume = 1;
  window.speechSynthesis.speak(utter);
}

document.getElementById("toggleAudioBtn").addEventListener("click", () => {
  state.readAloudOn = !state.readAloudOn;
  state.audioEnabledOnce = true;
  render();
});

document.getElementById("readNowBtn").addEventListener("click", () => {
  state.audioEnabledOnce = true;
  speakCurrentScreen();
});

resetApp();
</script>
