<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt1s1_12b</title>
<style>
  :root {
    --bg: #eef8ff;
    --panel: #ffffff;
    --ink: #17324d;
    --muted: #5b7086;
    --line: #c8ddee;
    --accent: #0b78d1;
    --accent-2: #27a77a;
    --warn: #d94b4b;
    --soft-warn: #ffe8e8;
    --soft-good: #e7fbf2;
    --shadow: 0 12px 28px rgba(18, 58, 95, 0.12);
    --radius: 20px;
    --pollen: #f0a000;
    --flower: #506f8c;
    --petal-fill: #f6fbff;
    --fruit: #e4842a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(180deg, #f5fbff 0%, #ebf7ff 100%);
    color: var(--ink);
  }
  body { padding: 16px; }
  .app { max-width: 1040px; margin: 0 auto; }
  .top-shell {
    background: var(--panel);
    border: 2px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 14px 18px;
    background: linear-gradient(90deg, #0c6fca, #2ca1ff);
    color: white;
  }
  .topbar h1 {
    margin: 0;
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1.1;
  }
  .progress {
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
  }
  .audio-tools {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .audio-tools button {
    border: 0;
    background: rgba(255,255,255,0.18);
    color: white;
    font-weight: 700;
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 15px;
    cursor: pointer;
  }
  .audio-tools button:hover { background: rgba(255,255,255,0.28); }
  .demerit-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: #f7fcff;
    border-bottom: 2px solid var(--line);
  }
  .demerit-label {
    font-weight: 800;
    font-size: 16px;
  }
  .breeze-track {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .breeze-pill {
    padding: 10px 14px;
    border-radius: 999px;
    border: 2px solid #f3b16f;
    background: #fff6ea;
    font-weight: 800;
    color: #9a5c17;
    min-width: 112px;
    text-align: center;
  }
  .breeze-pill.lost {
    background: #f1f4f7;
    color: #74879a;
    border-color: #d6e1eb;
  }
  .demerit-note {
    color: var(--muted);
    font-size: 14px;
  }
  .card {
    padding: 18px;
  }
  .section-tag {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 999px;
    background: #edf7ff;
    color: #0a67b9;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .instruction {
    margin: 0 0 8px;
    font-size: clamp(28px, 4vw, 38px);
    line-height: 1.12;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .support-line {
    font-size: 20px;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 700;
  }
  .screen-grid {
    display: grid;
    gap: 18px;
  }
  .two-col {
    grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
  }
  .two-col-wide {
    grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
  }
  .panel, .diagram-card, .builder-wrap, .guess-box, .compare-box, .statement-grid, .option-grid, .sentence-block {
    border: 2px solid var(--line);
    border-radius: 18px;
    background: white;
    padding: 16px;
  }
  .question-text p {
    margin: 0 0 12px;
    font-size: 19px;
    line-height: 1.5;
  }
  mark {
    background: #fff5a8;
    padding: 0 4px;
    border-radius: 6px;
  }
  .source-image {
    width: 100%;
    display: block;
    border-radius: 16px;
    border: 1px solid #d9e4ef;
    background: white;
  }
  .legend, .summary-chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .badge, .summary-chips span {
    padding: 10px 12px;
    border-radius: 999px;
    font-weight: 800;
    background: #edf7ff;
    color: #0a67b9;
  }
  .summary-chips span { background: #f0fbf6; color: #1f7a56; }
  .option-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: 1fr;
  }
  .option-btn, .statement-item, .chip-btn, .slot, .blank-btn, .choice-card {
    width: 100%;
    border: 2px solid var(--line);
    border-radius: 18px;
    background: #ffffff;
    color: var(--ink);
    padding: 16px 18px;
    text-align: left;
    font-size: 21px;
    line-height: 1.35;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .option-btn:hover, .statement-item:hover, .chip-btn:hover, .slot:hover, .blank-btn:hover, .choice-card:hover {
    transform: translateY(-1px);
    border-color: #8ec5ee;
    box-shadow: 0 8px 18px rgba(18,58,95,0.08);
  }
  .option-btn.selected, .statement-item.selected, .choice-card.selected, .blank-btn.active {
    border-color: var(--accent);
    background: #eef8ff;
  }
  .option-btn.correct, .statement-item.correct, .choice-card.correct { border-color: var(--accent-2); background: var(--soft-good); }
  .option-btn.wrong, .statement-item.wrong, .choice-card.wrong { border-color: var(--warn); background: var(--soft-warn); }
  .statement-grid {
    display: grid;
    gap: 14px;
  }
  .vis-note {
    margin-top: 10px;
    font-size: 18px;
    font-weight: 700;
    color: var(--muted);
  }
  .diagram-card svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .subhead {
    font-size: 18px;
    font-weight: 800;
    color: #0a67b9;
    margin: 0 0 10px;
  }
  .callout {
    display: inline-block;
    background: #fff6ea;
    color: #9a5c17;
    border: 2px solid #f2cb97;
    border-radius: 14px;
    padding: 10px 12px;
    font-weight: 800;
    margin-top: 10px;
  }
  .builder-wrap {
    display: grid;
    gap: 12px;
  }
  .target-slots {
    display: grid;
    gap: 12px;
  }
  .slot {
    min-height: 78px;
    display: flex;
    align-items: center;
  }
  .slot.filled { background: #eef8ff; border-color: #8ec5ee; }
  .bank-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr;
  }
  .chip-btn {
    text-align: center;
    font-size: 19px;
  }
  .chip-btn.selected { opacity: 0.55; }
  .sentence-block {
    font-size: 24px;
    line-height: 1.7;
    font-weight: 700;
  }
  .blank-btn {
    display: inline-flex;
    width: auto;
    min-width: 160px;
    align-items: center;
    justify-content: center;
    margin: 0 4px;
    padding: 12px 14px;
    vertical-align: middle;
  }
  .blank-btn.empty { color: #6b8298; background: #f7fbff; }
  .blank-btn.filled { background: #eef8ff; }
  .current-blank {
    font-size: 18px;
    font-weight: 700;
    color: var(--muted);
  }
  .guess-box {
    display: grid;
    gap: 14px;
  }
  .guess-frame {
    font-size: 26px;
    line-height: 1.65;
    font-weight: 800;
  }
  .guess-word {
    display: inline-block;
    min-width: 96px;
    padding: 8px 10px;
    margin: 0 4px;
    border-radius: 14px;
    border: 2px dashed #c1d6e8;
    background: #f8fbfe;
    text-align: center;
  }
  .guess-word.current { border-style: solid; border-color: #8ec5ee; background: #eef8ff; }
  .guess-word.done { border-style: solid; border-color: #8ad7b2; background: #ebfbf4; }
  .guess-help {
    font-size: 18px;
    color: var(--muted);
    font-weight: 700;
  }
  .guess-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .guess-row input {
    flex: 1 1 240px;
    min-height: 56px;
    font-size: 24px;
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 12px 14px;
    font-weight: 800;
  }
  .feedback {
    display: none;
    margin-top: 16px;
    padding: 16px 18px;
    border-radius: 18px;
    font-size: 20px;
    font-weight: 800;
    line-height: 1.4;
  }
  .feedback.show { display: block; }
  .feedback.good { background: var(--soft-good); border: 2px solid #a8e1c8; color: #1f7a56; }
  .feedback.bad { background: var(--soft-warn); border: 2px solid #f1b4b4; color: #9e2d2d; }
  .nav-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .control-btn {
    border: 0;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
  }
  .control-btn.primary {
    background: var(--accent);
    color: white;
  }
  .control-btn.ghost {
    background: #edf7ff;
    color: var(--ink);
    border: 2px solid var(--line);
  }
  .control-btn:disabled {
    opacity: 0.48;
    cursor: not-allowed;
  }
  .question-toggle {
    margin-top: 16px;
  }
  .question-panel {
    display: none;
    margin-top: 12px;
  }
  .question-panel.open { display: block; }
  .compare-box {
    display: grid;
    gap: 14px;
  }
  .compare-box.two {
    grid-template-columns: repeat(2, minmax(0,1fr));
  }
  .small {
    font-size: 16px;
    color: var(--muted);
    font-weight: 700;
  }
  .anim-btn-row {
    display: flex;
    justify-content: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .restart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 30, 48, 0.76);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .restart-overlay.show { display: flex; }
  .restart-box {
    max-width: 520px;
    width: 100%;
    background: white;
    border-radius: 24px;
    padding: 24px;
    border: 2px solid #d9e7f2;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .restart-box h3 {
    font-size: 30px;
    margin: 0 0 12px;
  }
  .restart-box p {
    font-size: 20px;
    margin: 0;
    line-height: 1.5;
  }
  .faint-label {
    font-size: 17px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .pollen-move.played .dust1 { animation: drift1 2s ease-in-out forwards; }
  .pollen-move.played .dust2 { animation: drift2 2s ease-in-out forwards; }
  .pollen-move.played .dust3 { animation: drift3 2s ease-in-out forwards; }
  .pollen-move.played .fruit-grow { animation: fruitGrow 2s ease-in-out forwards; transform-origin: center; }
  .pollen-move.played .hint-arrow { animation: fadeArrow 2s ease-in-out forwards; }
  @keyframes drift1 {
    0% { transform: translate(0,0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(-142px, 4px); opacity: 1; }
  }
  @keyframes drift2 {
    0% { transform: translate(0,0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(-150px, 10px); opacity: 1; }
  }
  @keyframes drift3 {
    0% { transform: translate(0,0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translate(-156px, 0px); opacity: 1; }
  }
  @keyframes fruitGrow {
    0% { transform: scale(0.8); opacity: 0.25; }
    100% { transform: scale(1.06); opacity: 1; }
  }
  @keyframes fadeArrow {
    0% { opacity: 0; }
    15% { opacity: 1; }
    100% { opacity: 1; }
  }
  @media (max-width: 860px) {
    body { padding: 10px; }
    .topbar { grid-template-columns: 1fr; }
    .two-col, .two-col-wide, .compare-box.two { grid-template-columns: 1fr; }
    .instruction { font-size: clamp(26px, 7vw, 36px); }
    .support-line { font-size: 18px; }
    .guess-frame { font-size: 22px; }
    .sentence-block { font-size: 22px; }
    .option-btn, .statement-item, .chip-btn, .slot, .blank-btn, .choice-card { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-shell">
    <div class="topbar">
      <h1>Flower A can still form a fruit</h1>
      <div class="progress" id="progressText">Screen 1 of 12</div>
      <div class="audio-tools">
        <button id="toggleAudioBtn" type="button">Read-aloud: Off</button>
        <button id="readNowBtn" type="button">Read this screen</button>
      </div>
    </div>
    <div class="demerit-row">
      <div class="demerit-label">🌸 Petals left</div>
      <div class="breeze-track" id="breezeTrack"></div>
      <div class="demerit-note" id="demeritNote"></div>
    </div>
    <div class="card" id="appCard"></div>
  </div>
</div>

<div class="restart-overlay" id="restartOverlay" aria-hidden="true">
  <div class="restart-box">
    <h3>All petals used</h3>
    <p>The whole interactive will restart now. Slow down, look carefully, and try again.</p>
  </div>
</div>

  <div class="panel">

    </div>

  </div>
`;

const state = {
  screenIndex: 0,
  demeritsMax: 0,
  demeritsLeft: 0,
  questionPanelOpen: false,
  readAloudOn: false,
  audioEnabledOnce: false,
  screenState: {},
  restartTimer: null
};

function countTeachingChecks() {
  return screenDefinitions.filter(s => s.applyDemerit).length;
}

function shuffleCopy(arr) {
  const copy = arr.map(item => ({ ...item }));
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function shuffleUntil(arr, conditionFn) {
  let tries = 0;
  let copy = shuffleCopy(arr);
  while (!conditionFn(copy) && tries < 60) {
    copy = shuffleCopy(arr);
    tries++;
  }
  return copy;
}

function makeScreenState(screen) {
  const base = {
    completed: false,
    feedback: "",
    feedbackType: "",
    optionOrder: null,
    selectedId: null,
    multiSelected: [],
    lastChecked: false,
    builtOrder: [],
    orderBank: null,
    blankOrder: null,
    blanks: {},
    activeBlank: 0,
    blankWrongCount: 0,
    playedAnimation: false,
    guessIndex: 0,
    guessReveals: [],
    guessSolved: [],
    guessInput: ""
  };
  if (screen.options) base.optionOrder = shuffleCopy(screen.options);
  if (screen.type === "order") {
    base.orderBank = shuffleUntil(screen.pieces, items => items.map(i => i.id).join("|") !== screen.correctOrder.join("|"));
  }
  if (screen.type === "blanks") {
    base.blankOrder = shuffleCopy(screen.options);
    screen.blanks.forEach(b => base.blanks[b.id] = null);
  }
  if (screen.type === "guess") {
    base.guessReveals = screen.words.map(() => 1);
    base.guessSolved = screen.words.map(() => "");
  }
  return base;
}

function resetApp() {
  clearTimeout(state.restartTimer);
  state.screenIndex = 0;
  state.demeritsMax = Math.floor(countTeachingChecks() / 2);
  state.demeritsLeft = state.demeritsMax;
  state.questionPanelOpen = false;
  state.screenState = {};
  screenDefinitions.forEach(screen => {
    state.screenState[screen.id] = makeScreenState(screen);
  });
  document.getElementById("restartOverlay").classList.remove("show");
  render();
}

function currentScreen() {
  return screenDefinitions[state.screenIndex];
}

function currentLocal() {
  return state.screenState[currentScreen().id];
}

function setFeedback(local, text, type) {
  local.feedback = text;
  local.feedbackType = type;
}

function applyDemeritIfNeeded(screen) {
  if (!screen.applyDemerit) return;
  state.demeritsLeft = Math.max(0, state.demeritsLeft - 1);
  if (state.demeritsLeft === 0) triggerRestart();
}

function triggerRestart() {
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
  const overlay = document.getElementById("restartOverlay");
  overlay.classList.add("show");
  state.restartTimer = setTimeout(() => {
    resetApp();
  }, 1800);
}

function updateDemeritRow() {
  const track = document.getElementById("breezeTrack");
  const note = document.getElementById("demeritNote");
  track.innerHTML = "";
  for (let i = 0; i < state.demeritsMax; i++) {
    const pill = document.createElement("div");
    pill.className = "breeze-pill" + (i < state.demeritsLeft ? "" : " lost");
    pill.textContent = i < state.demeritsLeft ? "🌸 Petal" : "🌸 Used";
    track.appendChild(pill);
  }
  note.textContent = `${state.demeritsLeft} of ${state.demeritsMax} petals left. Guess-the-word and the transfer check do not use petals.`;
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function escapeAttr(str) {
  return escapeHTML(str ?? "");
}

function render() {
  updateDemeritRow();
  document.getElementById("progressText").textContent = `Screen ${state.screenIndex + 1} of ${screenDefinitions.length}`;
  document.getElementById("toggleAudioBtn").textContent = `Read-aloud: ${state.readAloudOn ? "On" : "Off"}`;
  const app = document.getElementById("appCard");
  const screen = currentScreen();
  const local = currentLocal();
  const prevDisabled = state.screenIndex === 0;
  const nextDisabled = !local.completed || state.screenIndex === screenDefinitions.length - 1;
  app.innerHTML = `
    <div class="section-tag">${escapeHTML(screen.section || "")}</div>
    <h2 class="instruction">${escapeHTML(screen.instruction)}</h2>
    <div class="support-line">${escapeHTML(screen.support)}</div>
    ${renderScreenBody(screen, local)}
    ${renderFeedback(local)}
    ${screen.id !== "finish" ? `
      <div class="nav-row">
        <button class="control-btn ghost" id="prevBtn" ${prevDisabled ? "disabled" : ""}>Back</button>
        <button class="control-btn primary" id="nextBtn" ${nextDisabled ? "disabled" : ""}>Next</button>
      </div>` : ""}
    ${state.screenIndex > 0 ? renderQuestionToggle() : ""}
  `;
  bindScreenEvents(screen, local);
  window.scrollTo({ top: 0, behavior: "smooth" });
  if (state.readAloudOn && state.audioEnabledOnce) speakCurrentScreen();
}

function renderFeedback(local) {
  if (!local.feedback) return "";
  return `<div class="feedback show ${local.feedbackType}">${escapeHTML(local.feedback)}</div>`;
}

function renderQuestionToggle() {
  return `
    <div class="question-toggle">
      <button class="control-btn ghost" id="toggleQuestionBtn">${state.questionPanelOpen ? "Hide question and source" : "Show question and source"}</button>
      <div class="question-panel ${state.questionPanelOpen ? "open" : ""}" id="questionPanel">${questionPanelHTML}</div>
    </div>
  `;
}

function renderScreenBody(screen, local) {
  switch (screen.type) {
    case "intro": return renderIntro(local);
    case "single": return renderSingle(screen, local);
    case "singleAnim": return renderSingleAnim(screen, local);
    case "multi": return renderMulti(screen, local);
    case "order": return renderOrder(screen, local);
    case "blanks": return renderBlanks(screen, local);
    case "guess": return renderGuess(screen, local);
    case "finish": return renderFinish();
    default: return "<p>Screen type not found.</p>";
  }
}

function renderSingle(screen, local) {
  let visualHTML = "";

        <div class="callout">The highlighted anthers are the male parts. They produce pollen.</div>
      </div>

  } else if (screen.visual === "transfer") {
    // unused here
  }
  const options = local.optionOrder.map(opt => {
    const classes = ["option-btn"];
    if (local.selectedId === opt.id) classes.push("selected");
    if (local.completed && opt.id === screen.correctId) classes.push("correct");
    if (local.feedbackType === "bad" && local.selectedId === opt.id && opt.id !== screen.correctId) classes.push("wrong");
    return `<button class="${classes.join(" ")}" data-option-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  return `
    <div class="screen-grid ${visualHTML ? "two-col-wide" : ""}">

function renderMulti(screen, local) {
  const options = local.optionOrder.map(opt => {
    const chosen = local.multiSelected.includes(opt.id);
    const classes = ["statement-item"];
    if (chosen) classes.push("selected");
    if (local.lastChecked) {
      const shouldBe = screen.correctIds.includes(opt.id);
      if (chosen && shouldBe) classes.push("correct");
      if (chosen && !shouldBe) classes.push("wrong");
      if (!chosen && shouldBe && local.feedbackType === "bad") classes.push("correct");
    }
    return `<button class="${classes.join(" ")}" data-multi-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  let visual = "";
  if (screen.visual === "female") {
    visual = `
      <div class="diagram-card">
        <div class="subhead">Female parts still on flower A</div>
        ${flowerDiagram("female")}
        <div class="callout">The stigma can receive pollen. The ovary is the female part linked to fruit formation.</div>
      </div>
    `;
  }
  return `
    <div class="screen-grid ${visual ? "two-col-wide" : ""}">
      ${visual}
      <div>
        <div class="statement-grid">${options}</div>
        <div class="nav-row" style="margin-top:12px;">

function renderOrder(screen, local) {
  const slots = screen.correctOrder.map((_, idx) => {
    const itemId = local.builtOrder[idx];
    const item = screen.pieces.find(p => p.id === itemId);
    return `<button class="slot ${item ? "filled" : ""}" data-built-index="${idx}">
      ${item ? escapeHTML(item.text) + ' <span class="small" style="margin-left:8px;">Tap to remove</span>' : "Tap a chunk below to fill this step"}
    </button>`;
  }).join("");
  const bankItems = local.orderBank.filter(item => !local.builtOrder.includes(item.id)).map(item =>
    `<button class="chip-btn" data-bank-id="${item.id}">${escapeHTML(item.text)}</button>`
  ).join("");
  return `
    <div class="screen-grid">
      <div class="builder-wrap">
        <div class="target-slots">${slots}</div>
        <div class="bank-grid">${bankItems}</div>
        <div class="nav-row" style="margin-top:0;">
          <button class="control-btn ghost" id="checkOrderBtn">Check</button>
        </div>
      </div>
    </div>
  `;
}

function renderBlanks(screen, local) {
  const parts = [];
  let blankCounter = 0;
  screen.sentenceParts.forEach(part => {
    if (part === null) {
      const blank = screen.blanks[blankCounter];
      const chosenId = local.blanks[blank.id];
      const chosen = screen.options.find(opt => opt.id === chosenId);
      const isActive = local.activeBlank === blankCounter;
      parts.push(`<button class="blank-btn ${chosen ? "filled" : "empty"} ${isActive ? "active" : ""}" data-blank-index="${blankCounter}">
        ${chosen ? escapeHTML(chosen.text) : blank.placeholder}
      </button>`);
      blankCounter++;
    } else {
      parts.push(escapeHTML(part));
    }
  });
  const options = local.blankOrder.map(opt => {
    const selectedSomewhere = Object.values(local.blanks).includes(opt.id);
    return `<button class="chip-btn ${selectedSomewhere ? "selected" : ""}" data-fill-id="${opt.id}">${escapeHTML(opt.text)}</button>`;
  }).join("");
  return `
    <div class="screen-grid">
      <div class="sentence-block">${parts.join("")}</div>
      <div class="current-blank">Now choose a word for <strong>Blank ${local.activeBlank + 1}</strong>.</div>
      <div class="bank-grid">${options}</div>
      <div class="nav-row" style="margin-top:0;">
        <button class="control-btn ghost" id="checkBlanksBtn">Check</button>
      </div>
    </div>
  `;
}

function renderGuess(screen, local) {
  const spans = screen.words.map((w, idx) => {
    if (local.guessSolved[idx]) return `<span class="guess-word done">${escapeHTML(local.guessSolved[idx])}</span>`;
    if (idx === local.guessIndex) {
      const reveal = local.guessReveals[idx];
      const shown = w.answer.slice(0, reveal) + "_".repeat(Math.max(0, w.answer.length - reveal));
      return `<span class="guess-word current">${escapeHTML(shown)}</span>`;
    }
    return `<span class="guess-word">_____</span>`;
  });
  const frameParts = [...screen.sentenceParts];
  let out = "";
  let wi = 0;
  frameParts.forEach(part => {
    if (part === null) {
      out += spans[wi++];
    } else {
      out += escapeHTML(part);
    }
  });
  return `
    <div class="guess-box">
      <div class="guess-frame">${out}</div>
      ${local.completed ? `
        <div class="summary-chips"><span>pollen</span><span>flower</span></div>
      ` : `
        <div class="guess-help">Current word: <strong>${screen.words[local.guessIndex].key}</strong> — start with the letters shown.</div>
        <div class="guess-row">
          <input id="guessInput" type="text" autocomplete="off" spellcheck="false" placeholder="Type the whole word" value="${escapeAttr(local.guessInput)}" />
          <button class="control-btn ghost" id="checkGuessBtn">Check word</button>
        </div>
      `}
    </div>
  `;
}

function bindScreenEvents(screen, local) {
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (prevBtn) prevBtn.addEventListener("click", () => {
    if (state.screenIndex > 0) {
      state.screenIndex--;
      render();
    }
  });
  if (nextBtn) nextBtn.addEventListener("click", () => {
    if (local.completed && state.screenIndex < screenDefinitions.length - 1) {
      state.screenIndex++;
      render();
    }
  });

  const toggleQ = document.getElementById("toggleQuestionBtn");
  if (toggleQ) {
    toggleQ.addEventListener("click", () => {
      state.questionPanelOpen = !state.questionPanelOpen;
      render();
    });
  }

  if (screen.type === "intro") {
    document.getElementById("readDoneBtn").addEventListener("click", () => {
      local.completed = true;
      setFeedback(local, "Good. First, work out what changed in flower A.", "good");
      render();
    });
  }

  if (screen.type === "single") {
    document.querySelectorAll("[data-option-id]").forEach(btn => {
      btn.addEventListener("click", () => handleSingleChoice(screen, local, btn.dataset.optionId));
    });
  }

  if (screen.type === "singleAnim") {
    document.getElementById("playAnimBtn").addEventListener("click", () => {
      local.playedAnimation = true;
      render();
    });
    document.querySelectorAll("[data-option-id]").forEach(btn => {
      btn.addEventListener("click", () => handleSingleChoice(screen, local, btn.dataset.optionId));
    });
  }

  if (screen.type === "multi") {
    document.querySelectorAll("[data-multi-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        const id = btn.dataset.multiId;
        if (local.multiSelected.includes(id)) {
          local.multiSelected = local.multiSelected.filter(x => x !== id);
        } else {
          local.multiSelected = [...local.multiSelected, id];
        }
        render();
      });
    });
    document.getElementById("checkMultiBtn").addEventListener("click", () => {
      local.lastChecked = true;
      const chosen = [...local.multiSelected].sort().join("|");
      const correct = [...screen.correctIds].sort().join("|");
      if (chosen === correct) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        applyDemeritIfNeeded(screen);
        setFeedback(local, screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "order") {
    document.querySelectorAll("[data-bank-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (local.builtOrder.length < screen.correctOrder.length) {
          local.builtOrder.push(btn.dataset.bankId);
          setFeedback(local, "", "");
          render();
        }
      });
    });
    document.querySelectorAll("[data-built-index]").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = Number(btn.dataset.builtIndex);
        if (local.builtOrder[idx]) {
          local.builtOrder.splice(idx, 1);
          render();
        }
      });
    });
    document.getElementById("checkOrderBtn").addEventListener("click", () => {
      if (local.builtOrder.length !== screen.correctOrder.length) {
        setFeedback(local, `Build all ${screen.correctOrder.length} chunks first.`, "bad");
        render();
        return;
      }
      if (local.builtOrder.join("|") === screen.correctOrder.join("|")) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        applyDemeritIfNeeded(screen);
        setFeedback(local, screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "blanks") {
    document.querySelectorAll("[data-blank-index]").forEach(btn => {
      btn.addEventListener("click", () => {
        local.activeBlank = Number(btn.dataset.blankIndex);
        render();
      });
    });
    document.querySelectorAll("[data-fill-id]").forEach(btn => {
      btn.addEventListener("click", () => {
        const fillId = btn.dataset.fillId;
        const blank = screen.blanks[local.activeBlank];
        local.blanks[blank.id] = fillId;
        if (local.activeBlank < screen.blanks.length - 1) local.activeBlank += 1;
        setFeedback(local, "", "");
        render();
      });
    });
    document.getElementById("checkBlanksBtn").addEventListener("click", () => {
      const allFilled = screen.blanks.every(b => !!local.blanks[b.id]);
      if (!allFilled) {
        setFeedback(local, `Fill all ${screen.blanks.length} blanks first.`, "bad");
        render();
        return;
      }
      const correct = screen.blanks.every(b => local.blanks[b.id] === b.answerId);
      if (correct) {
        local.completed = true;
        setFeedback(local, screen.correctFeedback, "good");
      } else {
        local.blankWrongCount += 1;
        applyDemeritIfNeeded(screen);
        setFeedback(local, local.blankWrongCount === 1 ? screen.firstWrongFeedback : screen.wrongFeedback, "bad");
      }
      render();
    });
  }

  if (screen.type === "guess") {
    const input = document.getElementById("guessInput");
    if (input) {
      input.addEventListener("input", e => { local.guessInput = e.target.value; });
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("checkGuessBtn").click();
        }
      });
    }
    const btn = document.getElementById("checkGuessBtn");
    if (btn) btn.addEventListener("click", () => {
      const wordDef = screen.words[local.guessIndex];
      const guess = (local.guessInput || "").trim().toLowerCase();
      if (guess === wordDef.answer.toLowerCase()) {
        local.guessSolved[local.guessIndex] = wordDef.answer;
        local.guessInput = "";
        if (local.guessIndex < screen.words.length - 1) {
          local.guessIndex += 1;
        } else {
          local.completed = true;
          setFeedback(local, screen.doneFeedback, "good");
        }
      } else {
        local.guessReveals[local.guessIndex] = Math.min(wordDef.answer.length, local.guessReveals[local.guessIndex] + 1);
        setFeedback(local, "Not yet. More letters are shown now. Try again.", "bad");
      }
      render();
    });
  }

  if (screen.type === "finish") {
    document.getElementById("finishBtn").addEventListener("click", () => {
      alert("You have finished this interactive.");
    });
    document.getElementById("restartBtn").addEventListener("click", () => resetApp());
  }
}

function handleSingleChoice(screen, local, optionId) {
  local.selectedId = optionId;
  if (optionId === screen.correctId) {
    local.completed = true;
    setFeedback(local, screen.correctFeedback, "good");
  } else {
    applyDemeritIfNeeded(screen);
    setFeedback(local, screen.wrongFeedback, "bad");
  }
  render();
}

function collectReadAloudText() {
  const screen = currentScreen();
  const local = currentLocal();
  const bits = [screen.instruction, screen.support];
  if (screen.id === "intro") {
    bits.push("Question. If all the anthers from flower A are removed, will flower A still be able to turn into a fruit? Explain your answer.");
  }
  if (screen.options) {
    (local.optionOrder || []).forEach(opt => bits.push(opt.text));
  }
  if (screen.type === "multi") {
    bits.push("Choose the female parts that still matter.");
  }
  if (screen.type === "blanks") {
    screen.options.forEach(opt => bits.push(opt.text));
  }
  if (screen.type === "guess") {
    bits.push("Retrieve the words pollen and flower one at a time.");
  }
  if (local.feedback) bits.push(local.feedback);
  return bits.join(". ");
}

function speakCurrentScreen() {
  if (!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(collectReadAloudText());
  utter.rate = 0.96;
  utter.pitch = 1;
  utter.volume = 1;
  window.speechSynthesis.speak(utter);
}

document.getElementById("toggleAudioBtn").addEventListener("click", () => {
  state.readAloudOn = !state.readAloudOn;
  state.audioEnabledOnce = true;
  render();
});

document.getElementById("readNowBtn").addEventListener("click", () => {
  state.audioEnabledOnce = true;
  speakCurrentScreen();
});

resetApp();
