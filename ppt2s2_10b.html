<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt2s2_10b</title>
<style>
  :root {
    --bg: #f4f8ff;
    --card: #ffffff;
    --ink: #16324f;
    --muted: #54708b;
    --line: #d8e4f1;
    --accent: #2f7de1;
    --accent-2: #6dd3ff;
    --good: #1b8f4d;
    --bad: #c53a3a;
    --warn: #f0b429;
    --mist: #e8f4fb;
    --cool: #d7efff;
    --shadow: 0 10px 28px rgba(22, 50, 79, 0.10);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: linear-gradient(180deg, #f7fbff 0%, #eef5ff 100%);
    color: var(--ink);
    font-family: "Segoe UI", Arial, sans-serif;
  }

  body { min-height: 100vh; }

  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 18px;
  }

  .topbar {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 16px 18px;
    margin-bottom: 16px;
  }

  .toprow {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 14px;
    align-items: center;
    margin-bottom: 14px;
  }

  .title {
    font-size: clamp(24px, 3vw, 34px);
    font-weight: 800;
    letter-spacing: 0.2px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 16px;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #f6fbff;
    border: 2px solid var(--line);
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: 700;
  }

  .toggle input {
    width: 20px;
    height: 20px;
  }

  .speak-btn {
    border: 0;
    background: var(--accent);
    color: white;
    padding: 12px 16px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
  }

  .demerits-wrap {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .demerits-label {
    font-weight: 800;
    font-size: 18px;
  }

  .demerits {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .life {
    width: 48px;
    height: 18px;
    border-radius: 999px;
    background: #d9e7f5;
    border: 2px solid #c4d8ee;
    overflow: hidden;
    position: relative;
  }

  .life::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #ffd166 0%, #ff7b54 100%);
  }

  .life.used::after {
    background: #b8c8d9;
  }

  .screen {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 24px;
    box-shadow: var(--shadow);
    padding: 22px;
  }

  .screen-count {
    display: inline-block;
    font-weight: 800;
    font-size: 14px;
    color: white;
    background: var(--accent);
    border-radius: 999px;
    padding: 6px 10px;
    margin-bottom: 14px;
  }

  .instruction {
    font-size: clamp(26px, 3vw, 36px);
    line-height: 1.2;
    font-weight: 900;
    margin-bottom: 18px;
    color: #0f2f51;
  }

  .content-grid {
    display: grid;
    grid-template-columns: 1.05fr 0.95fr;
    gap: 18px;
    align-items: start;
  }

  .panel {
    background: #fbfdff;
    border: 2px solid var(--line);
    border-radius: 22px;
    padding: 16px;
  }

  .panel h3 {
    margin: 0 0 12px 0;
    font-size: 22px;
  }

  .question-card {
    background: #fffdf8;
    border: 2px solid #f2deb1;
    border-radius: 20px;
    padding: 16px;
    font-size: 22px;
    line-height: 1.5;
  }

  .highlight {
    background: #fff1b8;
    padding: 0 4px;
    border-radius: 8px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .option {
    width: 100%;
    text-align: left;
    border: 2px solid #cfe0ef;
    background: #ffffff;
    border-radius: 18px;
    padding: 16px 18px;
    font-size: 22px;
    line-height: 1.35;
    font-weight: 700;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
  }

  .option:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 6px 18px rgba(47, 125, 225, 0.12);
  }

  .option.selected {
    border-color: var(--accent);
    background: #eef6ff;
  }

  .option.correct {
    border-color: var(--good);
    background: #edf9f2;
  }

  .option.wrong {
    border-color: var(--bad);
    background: #fff1f1;
  }

  .feedback {
    min-height: 72px;
    margin-top: 14px;
    border-radius: 18px;
    padding: 14px 16px;
    font-size: 20px;
    line-height: 1.4;
    font-weight: 700;
    border: 2px solid #dce8f4;
    background: #f9fcff;
  }

  .feedback.good {
    background: #edf9f2;
    border-color: #b7e3c7;
    color: #145b31;
  }

  .feedback.bad {
    background: #fff2f2;
    border-color: #f0c1c1;
    color: #8b2424;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
  }

  .nav button {
    border: 0;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .prev-btn {
    background: #ddeaf7;
    color: var(--ink);
  }

  .next-btn {
    background: var(--accent);
    color: white;
  }

  .next-btn:disabled {
    background: #9fb9d7;
    cursor: not-allowed;
  }

  .support-toggle { margin-top: 16px; }

  .support-btn {
    border: 2px solid #cfe0ef;
    background: #ffffff;
    color: var(--ink);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .support-panel {
    margin-top: 12px;
    background: #f8fbff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }

  .support-panel img {
    width: 100%;
    border-radius: 14px;
    border: 2px solid #d7e4f1;
    display: block;
  }

  .support-panel p {
    font-size: 18px;
    line-height: 1.45;
    margin: 10px 0 0 0;
  }

  .diagram-card {
    background: linear-gradient(180deg, #fafdff 0%, #eef7ff 100%);
  }

  .mini-note {
    font-size: 18px;
    color: var(--muted);
    margin-top: 10px;
    line-height: 1.4;
  }

  .builder-area {
    display: grid;
    gap: 16px;
  }

  .slots {
    display: grid;
    gap: 10px;
  }

  .slot {
    min-height: 72px;
    border: 2px dashed #b8cee4;
    border-radius: 18px;
    background: #f9fcff;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    font-size: 20px;
    font-weight: 700;
    color: #35506b;
    width: 100%;
    cursor: pointer;
  }

  .slot.filled {
    border-style: solid;
    background: #eef6ff;
    color: var(--ink);
  }

  .bank {
    display: grid;
    gap: 10px;
  }

  .chip {
    border: 2px solid #cfe0ef;
    background: #fff;
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 21px;
    font-weight: 700;
    cursor: pointer;
  }

  .chip.used {
    opacity: 0.45;
    pointer-events: none;
  }

  .check-btn {
    border: 0;
    background: #145bba;
    color: white;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    align-self: start;
  }

  .hint {
    font-size: 18px;
    color: var(--muted);
    line-height: 1.4;
  }

  .sentence {
    font-size: 26px;
    line-height: 1.6;
    font-weight: 700;
  }

  .blank {
    display: inline-flex;
    min-width: 124px;
    min-height: 54px;
    border-radius: 14px;
    border: 2px dashed #abc3da;
    background: #f9fcff;
    padding: 6px 12px;
    margin: 0 4px 8px 4px;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    cursor: pointer;
  }

  .blank.filled {
    border-style: solid;
    background: #eef6ff;
  }

  .fill-bank {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .field-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input.word-input {
    font-size: 26px;
    padding: 14px 16px;
    border-radius: 16px;
    border: 2px solid #b9cee3;
    width: 100%;
  }

  .ghost-word {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 12px;
    background: #eef6ff;
    border: 2px solid #d2e1f0;
    font-size: 24px;
    font-weight: 800;
    margin: 0 4px;
  }

  .diagram {
    width: 100%;
    max-width: 460px;
    margin: 0 auto;
    display: block;
  }

  .svg-label {
    font-size: 18px;
    font-weight: 700;
    fill: #1f4368;
  }

  .pulse { animation: pulse 1.8s infinite ease-in-out; }
  .float { animation: float 2.8s infinite ease-in-out; }
  .heat { animation: rise 2.2s infinite linear; }
  .vapour-dot { animation: fadeup 2.4s infinite ease-in-out; }

  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  @keyframes rise {
    0% { transform: translateY(6px); opacity: 0.2; }
    50% { opacity: 1; }
    100% { transform: translateY(-14px); opacity: 0.2; }
  }

  @keyframes fadeup {
    0% { transform: translateY(8px); opacity: 0; }
    40% { opacity: 0.9; }
    100% { transform: translateY(-14px); opacity: 0; }
  }

  .game-over {
    text-align: center;
    padding: 12px 4px 6px;
    font-size: 22px;
    font-weight: 800;
    color: #8d2d2d;
  }

  .complete {
    text-align: center;
    padding: 12px;
  }

  .complete h2 {
    font-size: 34px;
    margin-bottom: 10px;
  }

  .complete p {
    font-size: 22px;
    line-height: 1.45;
    margin: 10px auto;
    max-width: 760px;
  }

  .review-box {
    background: #f8fcff;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 16px;
    font-size: 24px;
    line-height: 1.55;
    font-weight: 700;
    margin: 14px auto;
    max-width: 840px;
  }

  .action-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .action-row button {
    border: 0;
    border-radius: 16px;
    padding: 14px 18px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
  }

  .replay {
    background: var(--accent);
    color: white;
  }

  .review {
    background: #ddeaf7;
    color: var(--ink);
  }

  @media (max-width: 850px) {
    .content-grid { grid-template-columns: 1fr; }
    .instruction { font-size: clamp(24px, 6vw, 32px); }
    .question-card, .option, .feedback, .sentence { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="toprow">
      <div>
        <div class="title">Question 10(b) Interactive</div>
        <div class="subtitle">Why did the mist disappear after a short time?</div>
      </div>
      <div class="controls">
        <label class="toggle"><input type="checkbox" id="readAloudToggle" /> Read aloud</label>
        <button class="speak-btn" id="speakBtn" type="button">🔊 Read this screen</button>
      </div>
    </div>
    <div class="demerits-wrap">
      <div class="demerits-label">Demerits</div>
      <div class="demerits" id="demeritsBar"></div>
      <div id="demeritText" class="mini-note"></div>
    </div>
    <div id="gameOverMsg" class="game-over" style="display:none;"></div>
  </div>

  <div class="screen" id="app"></div>
</div>

const TOTAL_DEMERITS = 4;
const DEDUCTIBLE_SCREENS = [1,2,3,4,5,6,7]; // zero-based indexes for screens 2-8
const app = document.getElementById('app');
const readAloudToggle = document.getElementById('readAloudToggle');
const speakBtn = document.getElementById('speakBtn');
const gameOverMsg = document.getElementById('gameOverMsg');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const state = {
  screen: 0,
  demeritsUsed: 0,
  showSupport: false,
  currentBlankLabel: 'heat',
  screens: []
};

function createScreenState() {
  return [
    { completed:false },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false, placed:[], feedback:"", feedbackType:"", attempts:0, bank:null },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false, placed:{}, feedback:"", feedbackType:"", attempts:0, bank:null },
    { completed:false, targetIndex:0, revealIndex:1, current:"", feedback:"", feedbackType:"", fullShown:false },
    { completed:false, selected:null, feedback:"", feedbackType:"", shuffled:null },
    { completed:false }
  ];
}

function resetAll(showRestartMessage=false) {
  state.screen = 0;
  state.demeritsUsed = 0;
  state.showSupport = false;
  state.currentBlankLabel = 'heat';
  state.screens = createScreenState();
  if (showRestartMessage) {
    gameOverMsg.style.display = 'block';
    gameOverMsg.textContent = "All demerits used. The interactive has restarted from Screen 1.";
    setTimeout(() => { gameOverMsg.style.display = 'none'; }, 2600);
  } else {
    gameOverMsg.style.display = 'none';
  }
  render();
}

function useDemeritIfNeeded() {
  if (!DEDUCTIBLE_SCREENS.includes(state.screen)) return;
  state.demeritsUsed += 1;
  if (state.demeritsUsed >= TOTAL_DEMERITS) {
    resetAll(true);
  } else {
    renderTop();
  }
}

function renderTop() {
  const bar = document.getElementById('demeritsBar');
  bar.innerHTML = '';
  for (let i = 0; i < TOTAL_DEMERITS; i++) {
    const life = document.createElement('div');
    life.className = 'life' + (i < state.demeritsUsed ? ' used' : '');
    bar.appendChild(life);
  }
  const left = TOTAL_DEMERITS - state.demeritsUsed;
  document.getElementById('demeritText').textContent = left === 1 ? "1 chance left before restart." : `${left} chances left before restart.`;
}

function maybeSpeak(text) {
  if (!readAloudToggle.checked) return;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim());
  utter.rate = 0.95;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}

function speakCurrentScreen() {
  const screenTexts = [
    "Read the question. Tap when you know what changed.",
    "Tap what your answer must explain.",
    "Tap what the mist is made of.",
    "The droplets disappeared. What happened to them?",
    "Tap what the droplets got from the surroundings.",
    "Build what happened in the correct order.",
    "Tap the better science word.",
    "Complete the answer frame.",
    "Type the missing science words.",
    "Choose the best reason.",
    "Great job. You finished this interactive."
  ];
  maybeSpeak(screenTexts[state.screen]);
}

speakBtn.addEventListener('click', speakCurrentScreen);

function questionSupport() {
  return `
    <div class="support-toggle">
      <button class="support-btn" type="button" onclick="toggleSupport()">${state.showSupport ? 'Hide' : 'Show'} question and original image</button>
      ${state.showSupport ? `
        <div class="support-panel">
          <img src="${originalImage}" alt="Original question image" />
          <p><strong>Question (b):</strong> The mist disappeared after a short time. Give a reason for this observation.</p>
        </div>` : ``}
    </div>
  `;
}

function toggleSupport() {
  state.showSupport = !state.showSupport;
  render();
}

  return `

    <rect x="360" y="104" width="72" height="62" rx="10" fill="#8ab8eb" stroke="#477fbc" stroke-width="3"/>
    <rect x="375" y="86" width="46" height="28" rx="8" fill="#dbeaf7" stroke="#477fbc" stroke-width="3"/>
    <circle cx="265" cy="184" r="24" fill="#293f55"/>
    <circle cx="394" cy="184" r="24" fill="#293f55"/>
    <circle cx="265" cy="184" r="12" fill="#dbe7f2"/>
    <circle cx="394" cy="184" r="12" fill="#dbe7f2"/>
    <rect x="198" y="86" width="18" height="76" fill="#eef7ff" stroke="#477fbc" stroke-width="3"/>
    <rect x="230" y="104" width="42" height="28" fill="#eff7ff" stroke="#477fbc" stroke-width="3"/>
    <text x="250" y="62" class="svg-label">freezer truck</text>
    <text x="68" y="207" class="svg-label">mist</text>
    <path d="M206 114 C181 118, 170 118, 152 123" stroke="#79c2ff" stroke-width="7" fill="none" stroke-linecap="round" class="pulse"/>
    <path d="M205 136 C181 142, 164 145, 145 149" stroke="#79c2ff" stroke-width="7" fill="none" stroke-linecap="round" class="pulse"/>
    <path d="M205 156 C181 164, 164 170, 142 176" stroke="#79c2ff" stroke-width="7" fill="none" stroke-linecap="round" class="pulse"/>

    ${droplets}
  </svg>`;
}

function getScreenState(idx) {
  return state.screens[idx];
}

function setFeedback(idx, text, type='') {
  const s = getScreenState(idx);
  s.feedback = text;
  s.feedbackType = type;
}

function ensureShuffled(idx, items) {
  const s = getScreenState(idx);
  if (!s.shuffled) s.shuffled = shuffle(items);
  return s.shuffled;
}

function renderOptions(idx, options, correctValue, onCorrect, wrongMsg) {
  const s = getScreenState(idx);
  const shuffled = ensureShuffled(idx, options);
  const safe = (value) => JSON.stringify(value).replace(/'/g, '&#39;');
  return `
    <div class="choice-grid">
      ${shuffled.map(opt => {
        const cls = [
          'option',
          s.selected === opt ? 'selected' : '',
          s.feedbackType === 'good' && opt === correctValue ? 'correct' : '',
          s.feedbackType === 'bad' && s.selected === opt ? 'wrong' : ''
        ].join(' ');
        return `<button class="${cls}" type="button" onclick='pickOption(${idx}, ${safe(correctValue)}, ${safe(opt)}, ${safe(onCorrect)}, ${safe(wrongMsg)})'>${opt}</button>`;
      }).join('')}
    </div>
  `;
}

function pickOption(idx, correctValue, picked, goodMsg, badMsg) {
  const s = getScreenState(idx);
  s.selected = picked;
  if (picked === correctValue) {
    s.completed = true;
    setFeedback(idx, goodMsg, 'good');
  } else {
    s.completed = false;
    setFeedback(idx, badMsg, 'bad');
    if (state.screen === idx) useDemeritIfNeeded();
  }
  render();
}

function renderFeedback(idx) {
  const s = getScreenState(idx);
  return `<div class="feedback ${s.feedbackType || ''}">${s.feedback || '&nbsp;'}</div>`;
}

function renderScreen() {
  renderTop();
  const idx = state.screen;
  const s = getScreenState(idx);
  let html = '';

  switch(idx) {
    case 0:
      html = `
        <div class="screen-count">Screen 1 of 11</div>
        <div class="instruction">Read the question. Tap when you know what changed.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="question-card">
              <div><strong>10.</strong> A worker used a freezer truck to deliver some ice cream. A mist was seen when the ice cream was taken out of the truck as shown below.</div>
              <div style="margin-top:14px;"><strong>(b)</strong> The <span class="highlight">mist disappeared after a short time</span>. <span class="highlight">Give a reason</span> for this observation.</div>
            </div>
            <div class="mini-note">We are only focusing on Question (b).</div>
            <div style="margin-top:16px;">
              <button class="option correct" type="button" onclick="completeIntro()">I must explain why the mist disappeared.</button>
            </div>
            <div class="feedback good">${s.completed ? 'Good. We are explaining the disappearance of the mist.' : '&nbsp;'}</div>
          </div>
          <div class="panel diagram-card">
            <h3>Original question</h3>
            <img src="${originalImage}" alt="Original exam question" style="width:100%; border-radius:16px; border:2px solid #d7e4f1;" />
          </div>
        </div>
      `;
      break;

    case 1:
      html = `
        <div class="screen-count">Screen 2 of 11</div>
        <div class="instruction">Tap what your answer must explain.</div>
        <div class="content-grid">
          <div class="panel">
            ${renderOptions(1,
              ['why the mist disappeared','how the mist was formed','why the ice cream was cold','why the truck door was opened'],
              'why the mist disappeared',
              'Yes. Focus on why the mist disappeared.',
              "Look at the words 'disappeared' and 'Give a reason'."
            )}
            ${renderFeedback(1)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('mist')}
            <div class="mini-note">The mist is the thing that changed over time.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 2:
      html = `
        <div class="screen-count">Screen 3 of 11</div>
        <div class="instruction">Tap what the mist is made of.</div>
        <div class="content-grid">
          <div class="panel">
            ${renderOptions(2,
              ['tiny water droplets','smoke','cold air','ice dust'],
              'tiny water droplets',
              'Yes. The mist is made of tiny water droplets.',
              'Mist is water droplets, not smoke or just cold air.'
            )}
            ${renderFeedback(2)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('mist')}
            <div class="mini-note">Mist is made of very tiny droplets of liquid water.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 3:
      html = `
        <div class="screen-count">Screen 4 of 11</div>
        <div class="instruction">The droplets disappeared. What happened to them?</div>
        <div class="content-grid">
          <div class="panel">
            ${renderOptions(3,
              ['they evaporated','they condensed','they froze','they broke apart into dust'],
              'they evaporated',
              'Yes. When water droplets disappear, they evaporate.',
              'Think about a puddle disappearing over time.'
            )}
            ${renderFeedback(3)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">As droplets disappear, they change from liquid water into water vapour.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 4:
      html = `
        <div class="screen-count">Screen 5 of 11</div>
        <div class="instruction">Tap what the droplets got from the surroundings.</div>
        <div class="content-grid">
          <div class="panel">
            ${renderOptions(4,
              ['heat','coldness','smoke','ice'],
              'heat',
              'Yes. The droplets gained heat from the surroundings.',
              'Evaporation happens when water gains heat.'
            )}
            ${renderFeedback(4)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">The surroundings give heat to the droplets. Then the droplets can evaporate.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 5:
      if (!s.bank) s.bank = shuffle([
        'tiny water droplets in the mist',
        'gain heat from the surroundings',
        'evaporate to form water vapour'
      ]);
      html = `
        <div class="screen-count">Screen 6 of 11</div>
        <div class="instruction">Build what happened in the correct order.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="builder-area">
              <div class="slots">
                ${[0,1,2].map(i => `<button type="button" class="slot ${s.placed[i] ? 'filled' : ''}" onclick="removeFromOrder(${i})">${s.placed[i] || 'Tap a card below to place it here'}</button>`).join('')}
              </div>
              <div class="hint">Tap a card to place it in the next empty slot. Tap a filled slot to remove it.</div>
              <div class="bank">
                ${s.bank.map((item, i) => `<button type="button" class="chip ${s.placed.includes(item) ? 'used' : ''}" onclick="addToOrder(${i})">${item}</button>`).join('')}
              </div>
              <button class="check-btn" type="button" onclick="checkOrder()">Check my order</button>
              ${renderFeedback(5)}
            </div>
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">Follow the change from visible droplets to invisible water vapour.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 6:
      html = `
        <div class="screen-count">Screen 7 of 11</div>
        <div class="instruction">Tap the better science word.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="sentence">The water droplets in the mist <strong>______</strong> to form water vapour.</div>
            <div style="margin-top:16px;">
              ${renderOptions(6,
                ['evaporated','condensed','melted','dissolved'],
                'evaporated',
                'Yes. Evaporation changes liquid water into water vapour.',
                'This is about droplets disappearing, not forming.'
              )}
            </div>
            ${renderFeedback(6)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">Use the process word that matches droplets disappearing.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 7:
      if (!s.bank) s.bank = shuffle(['heat','evaporated','vapour','coldness','condensed','mist','ice']);
      html = `
        <div class="screen-count">Screen 8 of 11</div>
        <div class="instruction">Complete the answer frame.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="sentence">
              The mist was made of tiny water droplets. The droplets gained
              <button type="button" class="blank ${s.placed.heat ? 'filled' : ''}" onclick="clearBlank('heat')">${s.placed.heat || ''}</button>
              from the surroundings and
              <button type="button" class="blank ${s.placed.evaporated ? 'filled' : ''}" onclick="clearBlank('evaporated')">${s.placed.evaporated || ''}</button>
              to form water
              <button type="button" class="blank ${s.placed.vapour ? 'filled' : ''}" onclick="clearBlank('vapour')">${s.placed.vapour || ''}</button>.
            </div>
            <div class="hint">Tap a blank to choose it. Then tap a word below.</div>
            <div class="fill-bank">
              ${s.bank.map((item, i) => `<button type="button" class="chip ${Object.values(s.placed).includes(item) ? 'used' : ''}" onclick="fillWord(${i})">${item}</button>`).join('')}
            </div>
            <div style="margin-top:12px;" class="hint">Current blank: <strong>${state.currentBlankLabel}</strong></div>
            <button class="check-btn" type="button" onclick="checkFill()">Check my answer</button>
            ${renderFeedback(7)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">Build the sentence with the science ideas in the correct places.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 8:
      const targets = ['heat','evaporated','vapour'];
      const currentTarget = targets[s.targetIndex];
      let sentenceHtml = 'The mist was made of tiny water droplets. The droplets gained ';
      sentenceHtml += `<span class="ghost-word">${s.targetIndex > 0 ? 'heat' : revealWord('heat', s.revealIndex, s.current)}</span>`;
      sentenceHtml += ' from the surroundings and ';
      sentenceHtml += `<span class="ghost-word">${s.targetIndex > 1 ? 'evaporated' : (s.targetIndex === 1 ? revealWord('evaporated', s.revealIndex, s.current) : '__________')}</span>`;
      sentenceHtml += ' to form water ';
      sentenceHtml += `<span class="ghost-word">${s.targetIndex > 2 ? 'vapour' : (s.targetIndex === 2 ? revealWord('vapour', s.revealIndex, s.current) : '______')}</span>.`;

      html = `
        <div class="screen-count">Screen 9 of 11</div>
        <div class="instruction">Type the missing science words.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="sentence">${sentenceHtml}</div>
            ${s.targetIndex < targets.length ? `
              <div class="field-wrap" style="margin-top:18px;">
                <label style="font-size:20px;font-weight:800;">Type the hidden word:</label>
                <input class="word-input" id="wordInput" type="text" value="${s.current || ''}" autocomplete="off" autocapitalize="none" />
                <button class="check-btn" type="button" onclick="checkWord()">Check word</button>
              </div>
            ` : `
              <div class="feedback good" style="margin-top:18px;">The mist was made of tiny water droplets. The droplets gained heat from the surroundings and evaporated to form water vapour.</div>
            `}
            ${renderFeedback(8)}
            <div class="mini-note">Guess-the-word is penalty-free. More letters will appear after each wrong try.</div>
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">Now retrieve the key science words without penalty.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 9:
      html = `
        <div class="screen-count">Screen 10 of 11</div>
        <div class="instruction">Choose the best reason.</div>
        <div class="content-grid">
          <div class="panel">
            <div class="question-card" style="margin-bottom:14px;">
              A small puddle on the ground disappears after some time.
            </div>
            ${renderOptions(9,
              [
                'The water gained heat and evaporated into water vapour.',
                'The water condensed into a bigger puddle.',
                'The ground turned the water into ice.',
                'The water stopped existing.'
              ],
              'The water gained heat and evaporated into water vapour.',
              'Yes. Same idea: liquid water gained heat and evaporated.',
              'Think about heat, evaporation, and water vapour.'
            )}
            ${renderFeedback(9)}
          </div>
          <div class="panel diagram-card">
            ${cleanerDiagram('evaporation')}
            <div class="mini-note">Same science idea, different object.</div>
          </div>
        </div>
        ${questionSupport()}
      `;
      break;

    case 10:
      html = `
        <div class="screen-count">Complete</div>
        <div class="complete">
          <h2>Great job!</h2>
          <p>You explained why the mist disappeared.</p>
          <div class="review-box">
            The mist was made of tiny water droplets. The droplets gained heat from the surroundings and evaporated to form water vapour.
          </div>
          <div class="action-row">
            <button class="replay" type="button" onclick="resetAll(false)">Play again</button>
            <button class="review" type="button" onclick="jumpToReview()">Review key sentence</button>
          </div>
        </div>
      `;
      break;
  }

  app.innerHTML = html + renderNav();

  if (idx === 8) {
    const input = document.getElementById('wordInput');
    if (input) {
      input.focus();
      input.addEventListener('input', (e) => {
        getScreenState(8).current = e.target.value;
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') checkWord();
      });
    }
  }

  const instr = document.querySelector('.instruction');
  maybeSpeak(instr ? instr.textContent : '');
}

function renderNav() {
  const idx = state.screen;
  if (idx === 10) return '';
  const completed = getScreenState(idx).completed;
  return `
    <div class="nav">
      <button class="prev-btn" type="button" onclick="prevScreen()" ${idx === 0 ? 'disabled' : ''}>← Back</button>
      <button class="next-btn" type="button" onclick="nextScreen()" ${completed ? '' : 'disabled'}>Next →</button>
    </div>
  `;
}

function completeIntro() {
  getScreenState(0).completed = true;
  render();
}

function prevScreen() {
  if (state.screen > 0) {
    state.screen -= 1;
    render();
  }
}

function nextScreen() {
  if (getScreenState(state.screen).completed && state.screen < state.screens.length - 1) {
    state.screen += 1;
    render();
  }
}

function addToOrder(bankIndex) {
  const s = getScreenState(5);
  const item = s.bank[bankIndex];
  if (s.placed.includes(item)) return;
  if (s.placed.length < 3) {
    s.placed.push(item);
    setFeedback(5, '', '');
    render();
  }
}

function removeFromOrder(slotIndex) {
  const s = getScreenState(5);
  if (s.placed[slotIndex]) {
    s.placed.splice(slotIndex, 1);
    setFeedback(5, '', '');
    render();
  }
}

function checkOrder() {
  const s = getScreenState(5);
  const correct = [
    'tiny water droplets in the mist',
    'gain heat from the surroundings',
    'evaporate to form water vapour'
  ];
  if (s.placed.length < 3) {
    setFeedback(5, 'Complete all 3 slots first.', 'bad');
    render();
    return;
  }
  const ok = correct.every((item, i) => s.placed[i] === item);
  if (ok) {
    s.completed = true;
    setFeedback(5, 'Yes. The droplets gained heat, then evaporated into water vapour.', 'good');
  } else {
    s.attempts += 1;
    s.completed = false;
    if (s.attempts === 1) {
      setFeedback(5, 'Start with what the mist is made of.', 'bad');
    } else {
      setFeedback(5, 'Check the order again: droplets first, then heat gain, then evaporation.', 'bad');
    }
    useDemeritIfNeeded();
  }
  render();
}

function clearBlank(name) {
  const s = getScreenState(7);
  if (s.placed[name]) {
    delete s.placed[name];
  }
  state.currentBlankLabel = name;
  setFeedback(7, '', '');
  render();
}

function fillWord(bankIndex) {
  const s = getScreenState(7);
  const word = s.bank[bankIndex];
  const currentBlank = state.currentBlankLabel || 'heat';
  if (Object.values(s.placed).includes(word)) return;
  s.placed[currentBlank] = word;
  const order = ['heat','evaporated','vapour'];
  const currentPos = order.indexOf(currentBlank);
  state.currentBlankLabel = order[Math.min(currentPos + 1, order.length - 1)];
  setFeedback(7, '', '');
  render();
}

function checkFill() {
  const s = getScreenState(7);
  const target = { heat:'heat', evaporated:'evaporated', vapour:'vapour' };
  const allDone = ['heat','evaporated','vapour'].every(k => s.placed[k]);
  if (!allDone) {
    setFeedback(7, 'Fill every blank first.', 'bad');
    render();
    return;
  }
  const ok = Object.keys(target).every(k => s.placed[k] === target[k]);
  if (ok) {
    s.completed = true;
    setFeedback(7, 'Good. This has the key science ideas.', 'good');
  } else {
    s.attempts += 1;
    s.completed = false;
    setFeedback(7, s.attempts === 1 ? 'Check the process word and what was formed.' : 'Use heat, evaporated, and vapour in the matching blanks.', 'bad');
    useDemeritIfNeeded();
  }
  render();
}

function revealWord(word, revealIndex, currentValue='') {
  const base = word.slice(0, Math.min(revealIndex, word.length));
  const rest = '_'.repeat(Math.max(word.length - base.length, 0));
  return currentValue && currentValue.length ? currentValue : base + rest;
}

function normalize(text) {
  return (text || '').toLowerCase().trim().replace(/[^a-z]/g,'');
}

function checkWord() {
  const s = getScreenState(8);
  const targets = ['heat','evaporated','vapour'];
  const target = targets[s.targetIndex];
  if (!target) return;
  const answer = normalize(s.current);
  if (answer === normalize(target)) {
    s.feedback = `Yes. "${target}" is correct.`;
    s.feedbackType = 'good';
    s.targetIndex += 1;
    s.revealIndex = 1;
    s.current = '';
    if (s.targetIndex >= targets.length) {
      s.completed = true;
      s.feedback = 'Great. You rebuilt the key sentence.';
      s.feedbackType = 'good';
    }
  } else {
    s.feedback = 'Try again. One more letter is now shown.';
    s.feedbackType = 'bad';
    s.revealIndex = Math.min(s.revealIndex + 1, target.length);
  }
  render();
}

function jumpToReview() {
  state.screen = 10;
  render();
}

function render() {
  renderScreen();
}

resetAll(false);
</script>

</html>
