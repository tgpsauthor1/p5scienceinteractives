<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt2s2_7a</title>
<style>
  :root{
    --bg:#f7f8f2;
    --panel:#ffffff;
    --ink:#163021;
    --muted:#5e6d63;
    --line:#d8dfd7;
    --green:#2d7a46;
    --green-2:#e9f5ec;
    --green-3:#cfe8d6;
    --gold:#b88725;
    --gold-2:#fff4d8;
    --red:#b33a3a;
    --red-2:#fdeaea;
    --blue:#1d5f8f;
    --blue-2:#eaf4fb;
    --shadow:0 12px 32px rgba(20,48,33,.08);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at top left, #eef8ef 0, transparent 30%),
      radial-gradient(circle at top right, #fff8e9 0, transparent 22%),
      var(--bg);
    color:var(--ink);
  }
  .app{
    max-width:980px;
    margin:0 auto;
    padding:18px 16px 26px;
  }
  .topbar{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:14px;
  }
  .title-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  h1{
    font-size:1.15rem;
    margin:0;
    letter-spacing:.02em;
  }
  .progress{
    font-size:.95rem;
    color:var(--muted);
    font-weight:700;
  }

  .demerit-strip{
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:18px;
    padding:10px 14px;
    box-shadow:var(--shadow);
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:10px 14px;
  }
  .demerit-left{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  .demerit-label{
    font-weight:800;
    color:var(--green);
  }
  .seed-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .seed-pill{
    min-width:68px;
    padding:6px 10px;
    border-radius:999px;
    border:2px solid var(--green-3);
    background:var(--green-2);
    font-weight:700;
    text-align:center;
    color:var(--green);
  }
  .seed-pill.lost{
    border-color:#e7d8b2;
    background:var(--gold-2);
    color:#8a6720;
  }
  .demerit-note{
    font-size:.92rem;
    color:var(--muted);
  }

  .controls{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .control-btn,
  .nav-btn,
  .action-btn,
  .option-btn,
  .chip-btn,
  .toggle-btn{
    border:none;
    border-radius:16px;
    cursor:pointer;
    font:inherit;
    transition:transform .08s ease, box-shadow .12s ease, background .12s ease;
  }
  button:active{transform:translateY(1px)}
  .control-btn, .toggle-btn{
    padding:11px 14px;
    background:var(--panel);
    color:var(--ink);
    border:2px solid var(--line);
    box-shadow:var(--shadow);
    font-weight:700;
  }
  .control-btn[aria-pressed="true"], .toggle-btn[aria-pressed="true"]{
    background:var(--blue-2);
    border-color:#b8d7ea;
    color:var(--blue);
  }
  .control-btn[disabled]{
    opacity:.5;
    cursor:not-allowed;
  }

  .card{
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:20px;
  }
  .instruction{
    font-size:1.55rem;
    line-height:1.2;
    font-weight:900;
    margin:0 0 14px;
    color:var(--ink);
  }
  .subtext{
    font-size:1rem;
    color:var(--muted);
    margin:0 0 14px;
  }
  .question-image-wrap{
    border:2px solid var(--line);
    border-radius:18px;
    background:#fdfdfd;
    padding:10px;
  }
  .question-image-wrap img{
    max-width:100%;
    display:block;
    margin:0 auto;
    border-radius:12px;
  }
  .highlight-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }
  .highlight-chip{
    background:var(--gold-2);
    border:2px solid #efd78a;
    color:#6e5214;
    border-radius:999px;
    padding:10px 14px;
    font-weight:700;
  }

  .diagram-wrap{
    background:#fbfcf7;
    border:2px solid #dde6d9;
    border-radius:22px;
    padding:14px;
    margin-bottom:12px;
  }
  .diagram-wrap svg{
    width:100%;
    height:auto;
    display:block;
  }

  .options-grid{
    display:grid;
    gap:12px;
    grid-template-columns:repeat(2, minmax(0,1fr));
    margin-top:14px;
  }
  .options-grid.one-col{
    grid-template-columns:1fr;
  }
  .option-btn{
    min-height:68px;
    padding:14px 16px;
    text-align:left;
    background:#fff;
    border:2px solid var(--line);
    color:var(--ink);
    font-weight:700;
    font-size:1rem;
    box-shadow:0 6px 16px rgba(20,48,33,.05);
  }
  .option-btn:hover{background:#fbfdfb}
  .option-btn.selected{
    background:var(--blue-2);
    border-color:#8bc1e6;
    color:var(--blue);
  }
  .option-btn.correct{
    background:var(--green-2);
    border-color:#93c8a3;
    color:var(--green);
  }
  .option-btn.wrong{
    background:var(--red-2);
    border-color:#e1a5a5;
    color:var(--red);
  }
  .option-note{
    display:block;
    font-weight:400;
    color:var(--muted);
    margin-top:4px;
    font-size:.95rem;
  }

  .row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    align-items:flex-start;
  }
  .grow{flex:1 1 280px}
  .sentence-box{
    background:#f8fbf8;
    border:2px dashed #b9cdbd;
    border-radius:20px;
    padding:16px;
    font-size:1.15rem;
    line-height:1.5;
    font-weight:700;
    margin-bottom:12px;
  }
  .blank{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:140px;
    min-height:44px;
    padding:8px 12px;
    margin:4px 3px;
    border-radius:14px;
    border:2px dashed #9ab3a1;
    background:#fff;
    color:var(--muted);
    vertical-align:middle;
  }
  .blank.filled{
    border-style:solid;
    background:var(--green-2);
    color:var(--green);
    border-color:#93c8a3;
  }
  .bank-label{
    font-size:.96rem;
    font-weight:800;
    color:var(--muted);
    margin-bottom:8px;
  }
  .chip-bank, .chosen-bank{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .chip-btn{
    padding:12px 14px;
    background:#fff;
    border:2px solid var(--line);
    font-weight:700;
    min-height:54px;
  }
  .chip-btn.selected{
    background:var(--blue-2);
    border-color:#8bc1e6;
    color:var(--blue);
  }
  .chip-btn.used{
    background:#edf2ed;
    border-color:#d6ddd6;
    color:#94a198;
    cursor:not-allowed;
  }
  .chip-btn.correct{
    background:var(--green-2);
    border-color:#93c8a3;
    color:var(--green);
  }
  .chip-btn.wrong{
    background:var(--red-2);
    border-color:#e1a5a5;
    color:var(--red);
  }

  .feedback{
    min-height:52px;
    border-radius:16px;
    padding:12px 14px;
    margin-top:14px;
    font-weight:700;
    line-height:1.35;
    display:flex;
    align-items:center;
  }
  .feedback.neutral{
    background:#f3f6f3;
    border:2px solid #d8dfd7;
    color:var(--muted);
  }
  .feedback.good{
    background:var(--green-2);
    border:2px solid #93c8a3;
    color:var(--green);
  }
  .feedback.bad{
    background:var(--red-2);
    border:2px solid #e1a5a5;
    color:var(--red);
  }

  .button-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:10px;
    margin-top:16px;
  }
  .nav-row{
    display:flex;
    gap:10px;
    justify-content:space-between;
    margin-top:18px;
  }
  .nav-left, .nav-right{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .nav-btn, .action-btn{
    padding:13px 18px;
    font-weight:800;
    min-height:54px;
  }
  .nav-btn{
    background:#eef3ef;
    color:var(--ink);
    border:2px solid #d1dbd2;
  }
  .nav-btn.primary, .action-btn.primary{
    background:var(--green);
    color:#fff;
    border:2px solid var(--green);
  }
  .action-btn{
    background:#f2f7f3;
    color:var(--ink);
    border:2px solid #d1dbd2;
  }
  .nav-btn[disabled], .action-btn[disabled]{
    opacity:.42;
    cursor:not-allowed;
  }

  .question-panel{
    margin-top:14px;
  }
  .question-toggle{
    width:100%;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .question-panel-body{
    margin-top:10px;
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:22px;
    padding:16px;
    box-shadow:var(--shadow);
  }
  .question-panel-body p{
    margin:.25rem 0 .65rem;
    line-height:1.5;
  }

  .guess-frame{
    font-size:1.2rem;
    font-weight:800;
    line-height:1.55;
    background:#fbfcf7;
    border:2px solid #dde6d9;
    border-radius:20px;
    padding:16px;
    margin-bottom:12px;
  }
  .guess-word{
    color:var(--blue);
    letter-spacing:.04em;
  }
  .guess-input-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .guess-input{
    flex:1 1 240px;
    min-height:54px;
    border-radius:16px;
    border:2px solid var(--line);
    padding:12px 14px;
    font:inherit;
    font-weight:700;
    font-size:1.05rem;
  }
  .guess-hint{
    font-size:1rem;
    color:var(--muted);
    margin-top:8px;
  }

  .complete-box{
    border-radius:22px;
    background:linear-gradient(180deg, #f4fbf5 0%, #ffffff 100%);
    border:2px solid #bdddbe;
    padding:18px;
  }
  .complete-box h2{
    margin:0 0 8px;
    font-size:1.35rem;
  }
  .completion-message{
    margin-top:14px;
    padding:16px;
    border-radius:18px;
    border:2px solid #bdddbe;
    background:#f4fbf5;
    font-weight:700;
    line-height:1.45;
  }

  .overlay{
    position:fixed;
    inset:0;
    background:rgba(22,48,33,.44);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:20;
  }
  .overlay-card{
    max-width:460px;
    width:100%;
    background:#fff;
    border-radius:24px;
    padding:22px;
    border:2px solid #ead9a8;
    box-shadow:0 18px 50px rgba(0,0,0,.18);
    text-align:center;
  }
  .overlay-card h2{
    margin:0 0 10px;
    color:#8a6720;
  }
  .overlay-card p{
    margin:0;
    line-height:1.5;
    font-weight:700;
  }

  @media (max-width:760px){
    .instruction{font-size:1.35rem}
    .options-grid{grid-template-columns:1fr}
    .button-row, .nav-row{flex-direction:column}
    .nav-left, .nav-right{width:100%}
    .nav-left .nav-btn, .nav-right .nav-btn, .nav-right .action-btn{width:100%}
  }
</style>
</head>

function getScreenState(id){
  if(!state.screens[id]){
    state.screens[id] = {

      feedback:"",
      feedbackType:"neutral",
      order:null,
      selected:[],
      selectedOne:null,

      fillOne:null,

}
function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getOrderedChoices(screen){
  const s = getScreenState(screen.id);
  if(!s.order){
    let ids = screen.choices.map(c => c.id);
    ids = shuffleArray(ids);
    s.order = ids;
  }
  return s.order.map(id => screen.choices.find(c => c.id === id));
}
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
function seedStatusHtml(){
  const used = state.maxDemerits - state.demeritsLeft;
  let html = "";
  for(let i=0;i<state.maxDemerits;i++){
    const lost = i < used;
    html += `<div class="seed-pill ${lost ? 'lost' : ''}">${lost ? '🌰 Lost' : '🌱 Safe'}</div>`;
  }
  return html;
}
function demeritApplies(screenId){
  return ["taskDemand","processName","conditions","wording","buildProcess","buildConditions"].includes(screenId);
}
function conditionsScreenFeedback(selectedIds){
  const picked = new Set(selectedIds || []);
  const notes = [];
  if(picked.has("c_light")){
    notes.push("Light is not needed for germination because the young plant uses food stored in its seed leaves at first.");
  }
  if(picked.has("c_soil")){
    notes.push("Soil is not needed for germination. A seed can still germinate on wet cotton wool if it has water, oxygen and a suitable temperature.");
  }
  if(picked.has("c_warmth")){
    notes.push("“Warmth” is too vague here. Use the accepted wording “suitable temperature”.");
  }
  if(!picked.has("c_water")){
    notes.push("Water is one needed condition, so add water.");
  }
  if(!picked.has("c_oxygen")){
    notes.push("Oxygen is one needed condition, so add oxygen.");
  }
  if(!picked.has("c_temp")){
    notes.push("The third needed condition is a suitable temperature.");
  }
  return notes.join(" ");
}
function spendDemerit(){
  state.demeritsLeft -= 1;
  if(state.demeritsLeft <= 0){
    state.demeritsLeft = 0;
    triggerRestart();
  }
}
function triggerRestart(){
  state.gameOver = true;
  render();
  if(state.restarting) return;
  state.restarting = true;
  setTimeout(() => {
    resetAll();
  }, 1700);
}
function toggleQuestionPanel(force){
  if(typeof force === "boolean"){
    state.questionPanelOpen = force;
  }else{
    state.questionPanelOpen = !state.questionPanelOpen;
  }
  render();
}
function speakCurrent(){
  if(!state.readAloudOn || !("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const screen = currentScreenObj();
  const s = getScreenState(screen.id);
  const parts = [];
  parts.push(screen.title);
  parts.push(screen.instruction);
  if(screen.prompt) parts.push(screen.prompt);
  if(screen.kind === "entry"){
    parts.push(TYPED_QUESTION_LINES.join(" "));
  }
  if(["single","singleFinal","multi","fillOne","fillMany"].includes(screen.kind)){
    if(screen.choices) parts.push(screen.choices.map(c => c.text).join(". "));
  }
  if(screen.kind === "guess"){
    const gw = screen.words[s.currentGuessIndex];
    if(gw){
      parts.push(gw.hintLabel);
      parts.push(formatGuessFrame(screen, s));
    }
  }
  if(s.feedback) parts.push(s.feedback);
  const utter = new SpeechSynthesisUtterance(parts.join(". "));
  utter.rate = .95;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
}

      <path d="M222 178 C221 205, 211 216, 213 231 C214 244, 220 248, 217 258" stroke="url(#rootFill)" stroke-width="9" stroke-linecap="round" fill="none"></path>
      <path d="M218 234 C232 242, 239 248, 242 259" stroke="url(#rootFill)" stroke-width="7" stroke-linecap="round" fill="none"></path>
      <path d="M230 130 C243 118, 252 106, 254 92 C255 78, 246 66, 249 57" stroke="url(#shootFill)" stroke-width="8" stroke-linecap="round" fill="none"></path>
      <path d="M249 58 C262 60, 270 55, 279 46" stroke="url(#shootFill)" stroke-width="7" stroke-linecap="round" fill="none"></path>
      <path d="M248 57 C242 46, 237 41, 228 36" stroke="url(#shootFill)" stroke-width="7" stroke-linecap="round" fill="none"></path>
    </g>

    <path d="M290 140 L350 140" stroke="#6f7d73" stroke-width="8" stroke-linecap="round"></path>
    <path d="M346 124 L372 140 L346 156" fill="none" stroke="#6f7d73" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>

    <path d="M575 140 L635 140" stroke="#6f7d73" stroke-width="8" stroke-linecap="round"></path>
    <path d="M631 124 L657 140 L631 156" fill="none" stroke="#6f7d73" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"></path>
  </svg>`;
}
function feedbackClass(type){
  return type === "good" ? "good" : type === "bad" ? "bad" : "neutral";
}
function renderFeedback(screenState){
  const text = screenState.feedback || " ";
  return `<div class="feedback ${feedbackClass(screenState.feedbackType)}">${escapeHtml(text)}</div>`;
}
function renderQuestionPanel(){
  const label = state.questionPanelOpen ? "Hide full question" : "Show full question";
  return `
    <div class="question-panel">
      <button class="toggle-btn question-toggle" id="question-toggle" aria-pressed="${state.questionPanelOpen ? 'true':'false'}">
        <span>${label}</span>
        <span>${state.questionPanelOpen ? "▲" : "▼"}</span>
      </button>
      ${state.questionPanelOpen ? `
        <div class="question-panel-body">
          <p><strong>Original question</strong></p>
          <p>${escapeHtml(TYPED_QUESTION_LINES[0])}</p>
          <p>${escapeHtml(TYPED_QUESTION_LINES[1])}</p>
          <div class="question-image-wrap" style="margin-top:8px;">
            <img src="${QUESTION_IMAGE}" alt="Original worksheet question about seed germination">
          </div>
        </div>
      ` : ""}
    </div>
  `;
}
function canGoNext(){
  const screen = currentScreenObj();
  const s = getScreenState(screen.id);
  if(screen.kind === "singleFinal") return false;
  return !!s.solved;
}
function formatGuessFrame(screen, s){
  const currentWordData = screen.words[s.currentGuessIndex];
  if(!currentWordData) return "";
  const word = currentWordData.word;
  const reveal = Math.min(Math.max(1, s.revealCount), word.length);
  const partial = word.slice(0, reveal) + "_".repeat(Math.max(0, word.length - reveal));
  return `${currentWordData.lead}${partial}${currentWordData.trail}`;
}
function renderEntry(screen, s){
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      <p class="subtext">Start by reading the original question carefully.</p>
      <div class="question-image-wrap">
        <img src="${QUESTION_IMAGE}" alt="Original worksheet question about a seed process">
      </div>
      ${highlightText()}
      <div class="button-row">
        <button class="action-btn primary" id="entry-read">I have read it</button>
      </div>
      ${renderFeedback(s)}
    </div>
  `;
}
function renderMulti(screen, s){
  const ordered = getOrderedChoices(screen);
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      <p class="subtext">${escapeHtml(screen.prompt)}</p>
      <div class="options-grid">
        ${ordered.map(choice => {
          const selected = s.selected.includes(choice.id);
          let cls = "option-btn";
          if(selected) cls += " selected";
          if(s.checked && selected && choice.correct) cls += " correct";
          if(s.checked && selected && !choice.correct) cls += " wrong";
          if(s.checked && !selected && choice.correct && s.solved) cls += " correct";
          return `<button class="${cls}" data-role="multi-choice" data-id="${choice.id}">${escapeHtml(choice.text)}</button>`;
        }).join("")}
      </div>
      <div class="button-row">
        <button class="action-btn" id="check-multi">Check</button>
      </div>
      ${renderFeedback(s)}
    </div>
  `;
}
function renderSingle(screen, s, isFinal=false){
  const ordered = getOrderedChoices(screen);
  const extra = screen.id === "processName"
    ? `<div class="diagram-wrap">${cleanDiagramSvg()}</div>`
    : "";
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      ${screen.prompt ? `<p class="subtext">${escapeHtml(screen.prompt)}</p>` : ""}
      ${extra}
      <div class="options-grid ${screen.choices.length <= 3 ? 'one-col' : ''}">
        ${ordered.map(choice => {
          const selected = s.selectedOne === choice.id;
          let cls = "option-btn";
          if(selected) cls += " selected";
          if(selected && s.checked && choice.correct) cls += " correct";
          if(selected && s.checked && !choice.correct) cls += " wrong";
          if(s.solved && choice.correct) cls += " correct";
          return `<button class="${cls}" data-role="single-choice" data-id="${choice.id}">${escapeHtml(choice.text)}</button>`;
        }).join("")}
      </div>
      ${renderFeedback(s)}
      ${isFinal && s.solved ? `<div class="completion-message">Well done. Missing one needed condition stops germination. You identified the process, used the accepted wording, and checked the needed conditions.</div>` : ""}
    </div>
  `;
}
function renderFillOne(screen, s){
  const ordered = getOrderedChoices(screen);
  const selectedChoice = screen.choices.find(c => c.id === s.fillOne);
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      <div class="sentence-box">
        ${escapeHtml(screen.sentencePrefix)} <span class="blank ${selectedChoice ? 'filled' : ''}" id="fillone-blank">${selectedChoice ? escapeHtml(selectedChoice.text) : "tap a word"}</span>${escapeHtml(screen.sentenceSuffix)}
      </div>
      <div class="bank-label">Word bank</div>
      <div class="chip-bank">
        ${ordered.map(choice => {
          const selected = s.fillOne === choice.id;
          let cls = "chip-btn";
          if(selected) cls += " selected";
          if(selected && s.checked && choice.correct) cls += " correct";
          if(selected && s.checked && !choice.correct) cls += " wrong";
          if(s.solved && choice.correct) cls += " correct";
          return `<button class="${cls}" data-role="fillone-choice" data-id="${choice.id}">${escapeHtml(choice.text)}</button>`;
        }).join("")}
      </div>
      <div class="button-row">
        <button class="action-btn" id="check-fillone">Check</button>
        <button class="action-btn" id="clear-fillone">Clear</button>
      </div>
      ${renderFeedback(s)}
    </div>
  `;
}
function renderFillMany(screen, s){
  const ordered = getOrderedChoices(screen);
  const chosen = s.fillMany.map(id => screen.choices.find(c => c.id === id)).filter(Boolean);
  const boxes = [0,1,2].map(i => {
    const choice = chosen[i];
    return `<button class="blank ${choice ? 'filled' : ''}" data-role="remove-fillmany" data-index="${i}">${choice ? escapeHtml(choice.text) : "tap a choice"}</button>`;
  }).join("");
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      <p class="subtext">${escapeHtml(screen.prompt)}</p>
      <div class="sentence-box">
        Needed conditions:<br>${boxes}
      </div>
      <div class="bank-label">Condition bank</div>
      <div class="chip-bank">
        ${ordered.map(choice => {
          const used = s.fillMany.includes(choice.id);
          let cls = "chip-btn";
          if(used) cls += " used";
          if(used && s.checked && choice.correct) cls += " correct";
          if(used && s.checked && !choice.correct) cls += " wrong";
          if(s.solved && choice.correct && s.fillMany.includes(choice.id)) cls += " correct";
          return `<button class="${cls}" data-role="fillmany-choice" data-id="${choice.id}" ${used ? 'disabled' : ''}>${escapeHtml(choice.text)}</button>`;
        }).join("")}
      </div>
      <div class="button-row">
        <button class="action-btn" id="check-fillmany">Check</button>
        <button class="action-btn" id="clear-fillmany">Clear all</button>
      </div>
      ${renderFeedback(s)}
    </div>
  `;
}
function renderGuess(screen, s){
  const allDone = s.currentGuessIndex >= screen.words.length;
  if(allDone){
    return `
      <div class="card">
        <p class="instruction">${escapeHtml(screen.instruction)}</p>
        <div class="complete-box">
          <h2>You rebuilt the full answer.</h2>
          <p><strong>The process is germination.</strong></p>
          <p><strong>Seeds need water, oxygen and a suitable temperature.</strong></p>
        </div>
        <div class="feedback good" style="margin-top:14px;">Good. Now use the idea once more in a new question.</div>
      </div>
    `;
  }
  const wordData = screen.words[s.currentGuessIndex];
  const word = wordData.word;
  const reveal = Math.min(Math.max(1, s.revealCount), word.length);
  const shown = word.slice(0, reveal) + "_".repeat(Math.max(0, word.length - reveal));
  return `
    <div class="card">
      <p class="instruction">${escapeHtml(screen.instruction)}</p>
      <div class="guess-frame">
        ${escapeHtml(wordData.lead)}<span class="guess-word">${escapeHtml(shown)}</span>${escapeHtml(wordData.trail)}
      </div>
      <p class="subtext">${escapeHtml(wordData.hintLabel)}</p>
      <div class="guess-input-row">
        <input class="guess-input" id="guess-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" value="${escapeHtml(s.guessInput)}" placeholder="Type the whole word">
        <button class="action-btn primary" id="submit-guess">Check word</button>
      </div>
      <div class="guess-hint">Wrong tries here do not use any demerits. One more letter will appear each time.</div>
      ${renderFeedback(s)}
    </div>
  `;
}
function renderMainCard(){
  const screen = currentScreenObj();
  const s = getScreenState(screen.id);
  if(screen.kind === "entry") return renderEntry(screen, s);
  if(screen.kind === "multi") return renderMulti(screen, s);
  if(screen.kind === "single") return renderSingle(screen, s, false);
  if(screen.kind === "fillOne") return renderFillOne(screen, s);
  if(screen.kind === "fillMany") return renderFillMany(screen, s);
  if(screen.kind === "guess") return renderGuess(screen, s);
  if(screen.kind === "singleFinal") return renderSingle(screen, s, true);
  return "";
}
function renderNav(){
  const isFirst = state.currentScreen === 0;
  const isLast = state.currentScreen === SCREENS.length - 1;
  const nextDisabled = !canGoNext();
  return `
    <div class="nav-row">
      <div class="nav-left">
        <button class="nav-btn" id="back-btn" ${isFirst ? "disabled" : ""}>Back</button>
      </div>
      <div class="nav-right">
        ${!isLast ? `<button class="nav-btn primary" id="next-btn" ${nextDisabled ? "disabled" : ""}>Next</button>` : `<button class="nav-btn" id="restart-btn">Start again</button>`}
      </div>
    </div>
  `;
}
function render(){
  const root = document.getElementById("app");
  const screen = currentScreenObj();
  const s = getScreenState(screen.id);
  if(screen.id !== "entry" && !state.screens["entry"]?.solved && state.currentScreen > 0){
    state.questionPanelOpen = false;
  }
  if(state.currentScreen > 0 && state.questionPanelOpen === true && !state.screens["questionOpenedByUser"]){
    // leave as current user choice once toggled; auto-collapse after entry
    state.questionPanelOpen = false;
  }
  root.innerHTML = `
    <div class="topbar">
      <div class="title-row">
        <h1>ppt2s2_7a · Germination interactive</h1>
        <div class="progress">Screen ${state.currentScreen + 1} of ${SCREENS.length}</div>
      </div>

      <div class="demerit-strip">
        <div class="demerit-left">
          <div class="demerit-label">Seed tray chances</div>
          <div class="seed-row">${seedStatusHtml()}</div>
        </div>
        <div class="demerit-note">You have 5 chances. Wrong checked attempts in the teaching screens use 1 chance. Guess-the-word and the final transfer check do not.</div>
      </div>

      <div class="controls">
        <button class="control-btn" id="toggle-read" aria-pressed="${state.readAloudOn ? 'true' : 'false'}">
          ${state.readAloudOn ? '🔊 Read-aloud is ON' : '🔈 Read-aloud is OFF'}
        </button>
        <button class="control-btn" id="speak-btn" ${state.readAloudOn ? '' : 'disabled'}>Read this screen</button>
      </div>
    </div>

    ${renderMainCard()}
    ${screen.id !== "entry" ? renderQuestionPanel() : ""}
    ${renderNav()}
    ${state.gameOver ? `
      <div class="overlay">
        <div class="overlay-card">
          <h2>Seed tray empty</h2>
          <p>All chances were used up. The whole interactive is restarting now so you can try again carefully.</p>
        </div>
      </div>
    ` : ""}
  `;
  bindEvents();
}
function markQuestionUserToggled(){
  state.screens["questionOpenedByUser"] = {solved:true};
}
function bindEvents(){
  const screen = currentScreenObj();
  const s = getScreenState(screen.id);

  document.getElementById("toggle-read")?.addEventListener("click", () => {
    state.readAloudOn = !state.readAloudOn;
    if(!state.readAloudOn) window.speechSynthesis?.cancel();
    render();
  });
  document.getElementById("speak-btn")?.addEventListener("click", speakCurrent);

  document.getElementById("question-toggle")?.addEventListener("click", () => {
    markQuestionUserToggled();
    toggleQuestionPanel();
  });

  document.getElementById("back-btn")?.addEventListener("click", () => {
    if(state.currentScreen > 0){
      state.currentScreen -= 1;
      render();
    }
  });
  document.getElementById("next-btn")?.addEventListener("click", () => {
    if(canGoNext() && state.currentScreen < SCREENS.length - 1){
      state.currentScreen += 1;
      render();
    }
  });
  document.getElementById("restart-btn")?.addEventListener("click", resetAll);

  if(screen.kind === "entry"){
    document.getElementById("entry-read")?.addEventListener("click", () => {
      s.solved = true;
      s.feedback = "Good. Now find what the question wants.";
      s.feedbackType = "good";
      render();
    });
  }

  document.querySelectorAll('[data-role="multi-choice"]').forEach(btn => {
    btn.addEventListener("click", () => {
      if(s.solved) return;
      const id = btn.dataset.id;
      if(s.selected.includes(id)){
        s.selected = s.selected.filter(x => x !== id);
      }else{
        s.selected = [...s.selected, id];
      }
      s.checked = false;
      s.feedback = "";
      s.feedbackType = "neutral";
      render();
    });
  });
  document.getElementById("check-multi")?.addEventListener("click", () => {
    const correctIds = screen.choices.filter(c => c.correct).map(c => c.id).sort();
    const picked = [...s.selected].sort();
    s.checked = true;
    s.attemptCount += 1;
    const correct = picked.length === correctIds.length && picked.every((id, i) => id === correctIds[i]);
    if(correct){
      s.solved = true;
      if(screen.id === "taskDemand"){
        s.feedback = "Yes. You need the process name and the needed conditions.";
      }else{
        s.feedback = "Yes. The seed needs water, oxygen and a suitable temperature.";
      }
      s.feedbackType = "good";
    }else{
      if(demeritApplies(screen.id)) spendDemerit();
      if(screen.id === "taskDemand"){
        s.feedback = "This question has 2 jobs. Look again at the words in the question.";
      }else{
        s.feedback = conditionsScreenFeedback(s.selected);
      }
      s.feedbackType = "bad";
    }
    render();
  });

  document.querySelectorAll('[data-role="single-choice"]').forEach(btn => {
    btn.addEventListener("click", () => {
      if(s.solved) return;
      const choice = screen.choices.find(c => c.id === btn.dataset.id);
      s.selectedOne = choice.id;
      s.checked = true;
      if(choice.correct){
        s.solved = true;
        s.feedbackType = "good";
        if(screen.id === "processName"){
          s.feedback = "Yes. A seed starting to grow is germination.";
        }else if(screen.id === "wording"){
          s.feedback = "Yes. Use suitable temperature.";
        }else{
          s.feedback = "Yes. Missing one needed condition stops germination.";
        }
      }else{
        s.attemptCount += 1;
        if(demeritApplies(screen.id)) spendDemerit();
        s.feedbackType = "bad";
        if(screen.id === "processName"){
          s.feedback = "These flower processes happen earlier. This diagram shows a seed starting to grow.";
        }else if(screen.id === "wording"){
          s.feedback = "Warmth sounds close, but the accepted science wording here is suitable temperature.";
        }else{
          s.feedback = "Check which needed condition is missing.";
        }
      }
      render();
    });
  });

  document.querySelectorAll('[data-role="fillone-choice"]').forEach(btn => {
    btn.addEventListener("click", () => {
      if(s.solved) return;
      s.fillOne = btn.dataset.id;
      s.checked = false;
      s.feedback = "";
      s.feedbackType = "neutral";
      render();
    });
  });
  document.getElementById("clear-fillone")?.addEventListener("click", () => {
    if(s.solved) return;
    s.fillOne = null;
    s.checked = false;
    s.feedback = "";
    s.feedbackType = "neutral";
    render();
  });
  document.getElementById("check-fillone")?.addEventListener("click", () => {
    s.checked = true;
    s.attemptCount += 1;
    const choice = screen.choices.find(c => c.id === s.fillOne);
    if(choice && choice.correct){
      s.solved = true;
      s.feedback = "Yes. That is the process name.";
      s.feedbackType = "good";
    }else{
      spendDemerit();
      s.feedback = "Use the exact name of the process.";
      s.feedbackType = "bad";
    }
    render();
  });

  document.querySelectorAll('[data-role="fillmany-choice"]').forEach(btn => {
    btn.addEventListener("click", () => {
      if(s.solved) return;
      if(s.fillMany.length >= 3) return;
      const id = btn.dataset.id;
      if(!s.fillMany.includes(id)){
        s.fillMany = [...s.fillMany, id];
      }
      s.checked = false;
      s.feedback = "";
      s.feedbackType = "neutral";
      render();
    });
  });
  document.querySelectorAll('[data-role="remove-fillmany"]').forEach(btn => {
    btn.addEventListener("click", () => {
      if(s.solved) return;
      const index = Number(btn.dataset.index);
      if(Number.isInteger(index) && s.fillMany[index]){
        s.fillMany.splice(index, 1);
      }
      s.checked = false;
      s.feedback = "";
      s.feedbackType = "neutral";
      render();
    });
  });
  document.getElementById("clear-fillmany")?.addEventListener("click", () => {
    if(s.solved) return;
    s.fillMany = [];
    s.checked = false;
    s.feedback = "";
    s.feedbackType = "neutral";
    render();
  });
  document.getElementById("check-fillmany")?.addEventListener("click", () => {
    s.checked = true;
    s.attemptCount += 1;
    const correctSet = screen.choices.filter(c => c.correct).map(c => c.id).sort();
    const selectedSet = [...s.fillMany].sort();
    const correct = selectedSet.length === correctSet.length && selectedSet.every((id, i) => id === correctSet[i]);
    if(correct){
      s.solved = true;
      s.feedback = "Good. Those are the 3 needed conditions.";
      s.feedbackType = "good";
    }else{
      spendDemerit();
      s.feedback = s.attemptCount >= 2
        ? "The correct set is water, oxygen and a suitable temperature."
        : "You need all 3 needed conditions only.";
      s.feedbackType = "bad";
    }
    render();
  });

  document.getElementById("guess-input")?.addEventListener("input", (e) => {
    s.guessInput = e.target.value;
  });
  document.getElementById("guess-input")?.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      document.getElementById("submit-guess")?.click();
    }
  });
  document.getElementById("submit-guess")?.addEventListener("click", () => {
    const wordData = screen.words[s.currentGuessIndex];
    if(!wordData) return;
    const cleaned = (s.guessInput || "").trim().toLowerCase();
    if(cleaned === wordData.word.toLowerCase()){
      s.completedWords.push(wordData.word);
      s.guessInput = "";
      s.feedback = "Good. That word is correct.";
      s.feedbackType = "good";
      s.currentGuessIndex += 1;
      s.revealCount = 1;
      if(s.currentGuessIndex >= screen.words.length){
        s.solved = true;
        s.feedback = "Good. Now use the idea once more in a new question.";
        s.feedbackType = "good";
      }
    }else{
      s.feedback = "Try again. One more letter is showing now.";
      s.feedbackType = "bad";
      s.revealCount = Math.min(wordData.word.length, s.revealCount + 1);
    }
    render();
    document.getElementById("guess-input")?.focus();
  });
}
render();
</script>
</body>
</html>
