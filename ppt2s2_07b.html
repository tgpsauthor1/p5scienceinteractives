
<!DOCTYPE html>

<style>

  @keyframes toShore{

<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-row">
      <div class="progress" id="progressText">Screen 1 of 9</div>
      <div class="controls">
        <div class="audio-toggle" aria-label="Read-aloud setting">
          <span>Read-aloud</span>
          <button id="audioToggle" class="toggle-btn" type="button" aria-pressed="false">Off</button>
        </div>
      </div>
    </div>
    <div class="demerit-bar">
      <div class="demerit-title">Demerit chances</div>
      <div class="lives" id="livesRow" aria-label="Remaining demerit chances"></div>
    </div>
  </div>
  <main id="app"></main>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  const TOTAL_LIVES = 3;
  const TEACHING_SCREENS_WITH_DEMERITS = new Set([1,2,3,4]); // zero-based indexes for screens 2-5
  const app = document.getElementById('app');
  const progressText = document.getElementById('progressText');
  const audioToggleBtn = document.getElementById('audioToggle');
  const livesRow = document.getElementById('livesRow');
  const toast = document.getElementById('toast');

  const state = {
    screenIndex: 0,
    lives: TOTAL_LIVES,
    autoRead: false,
    panelOpen: false,
    perScreen: {},
    restarting: false
  };

  const screenCount = 6;

  function screenState(idx){
    if(!state.perScreen[idx]) state.perScreen[idx] = {};
    return state.perScreen[idx];
  }

  function updateTopbar(){
    progressText.textContent = `Screen ${state.screenIndex + 1} of ${screenCount}`;
    audioToggleBtn.textContent = state.autoRead ? 'On' : 'Off';
    audioToggleBtn.classList.toggle('on', state.autoRead);
    audioToggleBtn.setAttribute('aria-pressed', String(state.autoRead));
    livesRow.innerHTML = '';
    for(let i=0;i<TOTAL_LIVES;i++){
      const span = document.createElement('div');
      span.className = 'life' + (i >= state.lives ? ' lost' : '');
      span.textContent = '⭐';
      span.setAttribute('aria-hidden','true');
      livesRow.appendChild(span);
    }
  }

  function showToast(msg, ms=1600){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => toast.classList.remove('show'), ms);
  }

  function stopSpeaking(){
    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
    }
  }

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    stopSpeaking();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.pitch = 1;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
  }

  function maybeAutoRead(text){
    if(state.autoRead){
      setTimeout(() => speak(text), 120);
    }
  }

  function shuffle(arr){
    const copy = arr.slice();
    for(let i = copy.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function nextScreen(){
    stopSpeaking();
    state.screenIndex = Math.min(screenCount - 1, state.screenIndex + 1);
    render();
  }

  function restartInteractive(message){
    if(state.restarting) return;
    state.restarting = true;
    stopSpeaking();
    showToast(message || 'Restarting…');
    setTimeout(() => {
      state.screenIndex = 0;
      state.lives = TOTAL_LIVES;
      state.perScreen = {};
      state.panelOpen = false;
      state.restarting = false;
      render();
    }, 1500);
  }

  function deductLife(){
    state.lives -= 1;
    updateTopbar();
    if(state.lives <= 0){
      restartInteractive('All your chances are used up. Restarting the whole interactive…');
      return true;
    }
    return false;
  }

  function renderSeedIcon(kind, animated=false){
    const klass = animated ? `seed-svg ${animated}` : 'seed-svg';
    if(kind === 'explosive'){
      return `
      <svg class="${klass}" viewBox="0 0 160 120" aria-hidden="true">
        <g class="${animated ? 'pod-core' : ''}">
          <path d="M80 52 C64 26, 34 28, 22 54 C44 54, 57 63, 67 86 C69 67, 72 59, 80 52 Z" fill="#85624b" stroke="#5f4230" stroke-width="4"/>
          <path d="M80 52 C96 26, 126 28, 138 54 C116 54, 103 63, 93 86 C91 67, 88 59, 80 52 Z" fill="#9a7358" stroke="#5f4230" stroke-width="4"/>
          <path d="M80 52 C58 50, 46 76, 54 98 C65 82, 76 76, 80 52 Z" fill="#7b5a44" stroke="#5f4230" stroke-width="4"/>
          <path d="M80 52 C102 50, 114 76, 106 98 C95 82, 84 76, 80 52 Z" fill="#7b5a44" stroke="#5f4230" stroke-width="4"/>
          <circle cx="80" cy="58" r="6" fill="#fff2d2" stroke="#5f4230" stroke-width="3"/>
        </g>
        ${animated ? `
          <circle class="burst1" cx="80" cy="58" r="6" fill="#d8b277" />
          <circle class="burst2" cx="80" cy="58" r="6" fill="#d8b277" />
          <circle class="burst3" cx="80" cy="58" r="6" fill="#d8b277" />
        ` : ''}
      </svg>`;
    }
    if(kind === 'animal'){
      return `
      <svg class="${klass}" viewBox="0 0 160 120" aria-hidden="true">
        <g class="${animated ? 'fur-mark' : ''}">
          ${animated ? `<path d="M112 66 q12 -20 24 0 q12 -16 20 2 q-6 12 -18 18 q-15 8 -34 3 z" fill="#d7c3a6" opacity=".85"/>` : ''}
        </g>
        <g class="${animated ? 'spike-move' : ''}">
          <ellipse cx="72" cy="62" rx="28" ry="22" fill="#d9c27d" stroke="#7f5f2f" stroke-width="4"/>
          ${Array.from({length:14}).map((_,i)=>{
            const angle = i * (360/14);
            const x1 = 72 + Math.cos(angle*Math.PI/180)*22;
            const y1 = 62 + Math.sin(angle*Math.PI/180)*18;
            const x2 = 72 + Math.cos(angle*Math.PI/180)*34;

      const next = document.createElement('button');
      next.type = 'button';
      next.className = 'btn next';
      next.textContent = 'Next';
      next.addEventListener('click', nextScreen);
      actions.appendChild(next);
    }
    screen.appendChild(actions);
    screen.appendChild(renderQuestionPanel());
    maybeAutoRead(readText);
  }


  function buildReasonScene(kind){
    const k = kind || 'water';
    if(k === 'explosive'){
      return `
        <div class="reason-wrap">
          <div class="reason-scene">
            <svg viewBox="0 0 520 240" aria-hidden="true">
              <rect x="0" y="0" width="520" height="240" fill="#f8fcff"/>
              <rect x="0" y="132" width="520" height="108" fill="#edf1d6"/>
              <path d="M0 130 H520" stroke="#879279" stroke-width="3"/>
              <text x="24" y="28" font-size="18" font-weight="800" fill="#14324a">Seeds burst on land.</text>
              <text x="24" y="54" font-size="16" font-weight="700" fill="#5b7287">They are thrown away from the parent plant.</text>
              <circle class="burst-dot-1" cx="178" cy="154" r="9" fill="#d8b277"/>
              <circle class="burst-dot-2" cx="178" cy="154" r="9" fill="#d8b277"/>
              <circle class="burst-dot-3" cx="178" cy="154" r="9" fill="#d8b277"/>
              <text x="332" y="180" font-size="18" font-weight="800" fill="#8c4b1f">Not a shoreline clue</text>
            </svg>
            <div class="scene-seed explosive-seed">${renderSeedIcon('explosive','animated')}</div>
            <div class="scene-label start">parent plant on land</div>
            <div class="scene-label end">scattered on land</div>
          </div>
          <div class="reason-title">A bursting pod does not best explain the shoreline pattern.</div>
          <div class="reason-note">Explosive action throws seeds away from the parent plant on land. In the diagram, many young plant U plants are found along the shore beside the sea.</div>
        </div>
      `;
    }
    if(k === 'animal'){
      return `
        <div class="reason-wrap">
          <div class="reason-scene">
            <svg viewBox="0 0 520 240" aria-hidden="true">
              <rect x="0" y="0" width="520" height="240" fill="#f8fcff"/>
              <rect x="0" y="118" width="520" height="122" fill="#edf1d6"/>
              <path d="M0 118 H520" stroke="#879279" stroke-width="3"/>
              <path d="M38 164 C110 144, 168 146, 232 160 C300 174, 360 166, 468 148" fill="none" stroke="#b48b66" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 10"/>
              <text x="24" y="30" font-size="18" font-weight="800" fill="#14324a">Hooks move when animals move.</text>
              <text x="24" y="56" font-size="16" font-weight="700" fill="#5b7287">That does not specifically explain why the young plants are near the sea.</text>
              <g fill="#8a6a4f">
                <circle class="paw1" cx="312" cy="138" r="7"/><circle class="paw1" cx="302" cy="126" r="4"/><circle class="paw1" cx="314" cy="122" r="4"/><circle class="paw1" cx="324" cy="130" r="4"/>
                <circle class="paw2" cx="364" cy="160" r="7"/><circle class="paw2" cx="354" cy="148" r="4"/><circle class="paw2" cx="366" cy="144" r="4"/><circle class="paw2" cx="376" cy="152" r="4"/>
                <circle class="paw3" cx="420" cy="144" r="7"/><circle class="paw3" cx="410" cy="132" r="4"/><circle class="paw3" cx="422" cy="128" r="4"/><circle class="paw3" cx="432" cy="136" r="4"/>
              </g>
            </svg>
            <div class="scene-seed animal-seed">${renderSeedIcon('animal','animated')}</div>
            <div class="scene-label start">sticks to an animal</div>
            <div class="scene-label end">moves where the animal goes</div>
          </div>
          <div class="reason-title">This method depends on animal movement, not on the sea.</div>
          <div class="reason-note">A hooked or spiky fruit can travel when it catches on fur. The question gives a shoreline pattern, so this is not the best match.</div>
        </div>
      `;
    }
    if(k === 'wind'){
      return `
        <div class="reason-wrap">
          <div class="reason-scene">
            <svg viewBox="0 0 520 240" aria-hidden="true">
              <rect x="0" y="0" width="520" height="240" fill="#f8fcff"/>
              <rect x="0" y="150" width="520" height="90" fill="#edf1d6"/>
              <path d="M0 150 H520" stroke="#879279" stroke-width="3"/>
              <text x="24" y="30" font-size="18" font-weight="800" fill="#14324a">Winged seeds drift in air.</text>
              <text x="24" y="56" font-size="16" font-weight="700" fill="#5b7287">The wind arrow is not the strongest clue in this question.</text>
              <path class="wind-line-1" d="M42 94 H168" stroke="#7dc9f2" stroke-width="6" stroke-linecap="round"/>
              <path class="wind-line-2" d="M72 122 H222" stroke="#7dc9f2" stroke-width="6" stroke-linecap="round"/>
              <path class="wind-line-3" d="M98 70 H260" stroke="#7dc9f2" stroke-width="6" stroke-linecap="round"/>
              <text x="308" y="188" font-size="18" font-weight="800" fill="#8c4b1f">We still need a seed that reaches the shore by water.</text>
            </svg>
            <div class="scene-seed wind-seed">${renderSeedIcon('wind','animated')}</div>
            <div class="scene-label start">drifts in air</div>
            <div class="scene-label end">not the best shoreline clue</div>
          </div>
          <div class="reason-title">A winged seed matches wind dispersal, not the shoreline pattern.</div>
          <div class="reason-note">Students may notice the wind arrow first, but the stronger clue is where the young plants are found: along the shore beside the sea.</div>
        </div>
      `;
    }
    return `
      <div class="reason-wrap">
        <div class="reason-scene">
          <svg viewBox="0 0 520 240" aria-hidden="true">
            <rect x="0" y="0" width="520" height="240" fill="#f8fcff"/>
            <path d="M0 170 C78 174, 130 154, 176 120 C198 104, 214 96, 228 82 L228 240 L0 240 Z" fill="#edf1d6"/>
            <path d="M520 0 L520 240 L362 240 C352 194, 346 172, 338 148 C330 124, 324 92, 332 66 C338 44, 352 24, 376 0 Z" fill="#edf1d6"/>
            <rect x="0" y="0" width="520" height="240" fill="none" stroke="#d7e5f3" stroke-width="3"/>
            <path class="scene-wave-1" d="M236 164 h54" stroke="#67b7df" stroke-width="4" stroke-linecap="round"/>
            <path class="scene-wave-2" d="M296 118 h48" stroke="#67b7df" stroke-width="4" stroke-linecap="round"/>
            <path class="scene-wave-1" d="M280 72 h42" stroke="#67b7df" stroke-width="4" stroke-linecap="round"/>
            <text x="244" y="42" font-size="22" font-weight="800" fill="#14324a">Sea</text>
            <text x="350" y="208" font-size="18" font-weight="800" fill="#14324a">shoreline</text>
          </svg>
          <div class="scene-seed water-seed">${renderSeedIcon('coconut','animated')}</div>
          <div class="scene-label start">fruit floating in water</div>
          <div class="scene-label end">washed to the shore</div>
        </div>
        <div class="reason-title">This is the pattern we need.</div>
        <div class="reason-note">A fruit that floats can be carried by water and end up near the shoreline. That explains why many young plant U plants are beside the sea.</div>
      </div>
    `;
  }

  function renderScreen5(screen){
    const readText = 'Tap a seed card to watch how it usually travels. Then choose the one that best explains why the young plants are near the shoreline.';
    screen.appendChild(makeToolbar(readText));

    const title = document.createElement('h1');
    title.className = 'instruction';
    title.textContent = 'Which seed best explains the shoreline pattern for plant U?';
    screen.appendChild(title);

    const sub = document.createElement('p');
    sub.className = 'subtext';
    sub.textContent = 'Watch what each fruit usually does, then decide which one fits the diagram best.';
    screen.appendChild(sub);

    const ss = screenState(4);
    const opts = getOrderedOptions('order', [
      {id:'explosive', label:seedLabel('explosive')},
      {id:'animal', label:seedLabel('animal')},
      {id:'coconut', label:seedLabel('coconut')},
      {id:'wind', label:seedLabel('wind')}
    ]);

    const preview = document.createElement('div');
    preview.className = 'preview';
    preview.innerHTML = buildReasonScene(ss.previewKind || ss.selected || 'water');
    screen.appendChild(preview);

    const hint = document.createElement('div');
    hint.className = 'shoreline-hint';
    hint.textContent = 'Key idea: the correct seed must help the fruit reach the shoreline by water.';
    screen.appendChild(hint);

    const grid = document.createElement('div');
    grid.className = 'grid-4';
    opts.forEach(opt => {
      const c = cardButton(`${renderSeedIcon(opt.id)}<div>${opt.label}</div><div class="small-note">Tap to preview</div>`, () => {
        if(ss.correct) return;
        ss.selected = opt.id;
        ss.previewKind = opt.id;
        render();
      }, ss.selected === opt.id ? 'selected' : '');
      grid.appendChild(c);
    });
    screen.appendChild(grid);

    const feedback = document.createElement('div');
    setFeedback(feedback, 'Tap any seed to preview it. Then tap Check.', '');
    if(ss.feedback) setFeedback(feedback, ss.feedback.msg, ss.feedback.type);
    screen.appendChild(feedback);

    const actions = document.createElement('div');
    actions.className = 'action-row';
    const check = document.createElement('button');
    check.type = 'button';
    check.className = 'btn check';
    check.textContent = 'Check';
    check.addEventListener('click', () => {
      if(!ss.selected){
        setFeedback(feedback, 'Tap one seed card first.', 'bad');
        return;
      }
      if(ss.selected === 'coconut'){
        ss.correct = true;
        ss.previewKind = 'coconut';
        ss.feedback = {msg:'Yes. The coconut can float on water and be washed to the shoreline.', type:'good'};
        render();
      }else{
        ss.previewKind = ss.selected;
        let msg = 'That seed does not best explain the shoreline pattern.';
        if(ss.selected === 'explosive') msg = 'That seed is scattered on land by explosive action, not carried to the shoreline by water.';
        if(ss.selected === 'animal') msg = 'That seed travels with animals. The diagram’s clue is the shoreline beside the sea.';
        if(ss.selected === 'wind') msg = 'That seed matches wind dispersal. The wind arrow is not the strongest clue here.';
        ss.feedback = {msg, type:'bad'};
        if(TEACHING_SCREENS_WITH_DEMERITS.has(state.screenIndex) && deductLife()) return;
        render();
      }
    });
    actions.appendChild(check);
    if(ss.correct){
      const next = document.createElement('button');
      next.type = 'button';
      next.className = 'btn next';
      next.textContent = 'Next';
      next.addEventListener('click', nextScreen);
      actions.appendChild(next);
    }
    screen.appendChild(actions);
    screen.appendChild(renderQuestionPanel());
    maybeAutoRead(readText);
  }

  function renderScreen6(screen){
    const readText = 'Quick transfer. A fruit floats down a river and is later found on the river bank. Choose the best method.';
    screen.appendChild(makeToolbar(readText));

    const title = document.createElement('h1');
    title.className = 'instruction';
    title.textContent = 'Quick transfer: which method fits this new clue?';
    screen.appendChild(title);

    const sub = document.createElement('p');
    sub.className = 'subtext';
    sub.textContent = 'A fruit floats down a river and is later found on the river bank.';
    screen.appendChild(sub);

    const ss = screenState(5);
    const opts = getOrderedOptions('order', [
      {id:'water', text:'Water'},
      {id:'wind', text:'Wind'},
      {id:'animals', text:'Animals'},
      {id:'explosive', text:'Explosive action'}
    ]);

    const preview = document.createElement('div');
    preview.className = 'preview';
    preview.innerHTML = buildReasonScene(ss.selected === 'water' || ss.correct ? 'water' : 'water');
    screen.appendChild(preview);

    const grid = document.createElement('div');
    grid.className = 'grid-2';
    opts.forEach(opt => {
      const c = cardButton(`<div style="font-size:1.15rem">${opt.text}</div>`, () => {
        if(ss.correct) return;
        ss.selected = opt.id;
        render();
      }, ss.selected === opt.id ? 'selected' : '');
      grid.appendChild(c);
    });
    screen.appendChild(grid);

    const feedback = document.createElement('div');
    setFeedback(feedback, 'Choose one method, then tap Check.', '');
    if(ss.feedback) setFeedback(feedback, ss.feedback.msg, ss.feedback.type);
    screen.appendChild(feedback);

    const actions = document.createElement('div');
    actions.className = 'action-row';
    const check = document.createElement('button');
    check.type = 'button';
    check.className = 'btn check';
    check.textContent = 'Check';
    check.addEventListener('click', () => {
      if(!ss.selected){
        setFeedback(feedback, 'Choose one method first.', 'bad');
        return;
      }
      if(ss.selected === 'water'){
        ss.correct = true;
        ss.feedback = {msg:'Yes. A floating fruit is dispersed by water.', type:'good'};
        render();
      }else{
        ss.feedback = {msg:'Think about the clue: the fruit floats and is later found on the river bank.', type:'bad'};
        render();
      }
    });
    actions.appendChild(check);

    if(ss.correct){
      const replay = document.createElement('button');
      replay.type = 'button';
      replay.className = 'btn next';
      replay.textContent = 'Replay';
      replay.addEventListener('click', () => restartInteractive('Starting again…'));
      actions.appendChild(replay);

      const restart = document.createElement('button');
      restart.type = 'button';
      restart.className = 'btn secondary';
      restart.textContent = 'Restart now';
      restart.addEventListener('click', () => {
        state.screenIndex = 0;
        state.lives = TOTAL_LIVES;
        state.perScreen = {};
        state.panelOpen = false;
        render();
      });
      actions.appendChild(restart);

      const wrap = document.createElement('div');
      wrap.className = 'panel center visually-tight';
      wrap.innerHTML = `
        <div class="big-emoji">🌊</div>
        <p style="font-size:1.2rem;font-weight:900">Nice work. Use the distribution pattern before you choose the seed.</p>
        <div class="summary-list top-space">
          <div class="summary-item">1. Find the correct plant in the legend.</div>
          <div class="summary-item">2. Notice where the young plants are found.</div>
          <div class="summary-item">3. Ask what method could bring the seed there.</div>
          <div class="summary-item">4. Choose the seed that matches that method.</div>
        </div>
        <div class="footnote">For this question: young plants near the shoreline → water dispersal → coconut.</div>
      `;
      screen.appendChild(wrap);
    }

    screen.appendChild(actions);
    maybeAutoRead(readText);
  }

  function renderScreen7(screen){
    const readText = 'Well done. Use the distribution pattern to explain the seed choice.';
    screen.appendChild(makeToolbar(readText));

    const title = document.createElement('h1');

    wrap.className = 'panel center visually-tight';

      <div class="big-emoji">🌊🥥</div>
      <p style="font-size:1.2rem;font-weight:900">Use the pattern before you choose the seed.</p>
      <div class="summary-list top-space">
        <div class="summary-item">1. Find the correct plant in the legend.</div>
        <div class="summary-item">2. Notice where the young plants are found.</div>
        <div class="summary-item">3. Ask what method could bring the seed there.</div>
        <div class="summary-item">4. Choose the seed that matches that method.</div>
      </div>
      <div class="footnote">For this question: young plants near the shoreline → water dispersal → coconut.</div>
    `;
    screen.appendChild(wrap);

    const actions = document.createElement('div');
    actions.className = 'action-row';
    const replay = document.createElement('button');
    replay.type = 'button';
    replay.className = 'btn next';
    replay.textContent = 'Replay';
    replay.addEventListener('click', () => restartInteractive('Starting again…'));
    actions.appendChild(replay);

    const retry = document.createElement('button');
    retry.type = 'button';
    retry.className = 'btn secondary';
    retry.textContent = 'Restart now';
    retry.addEventListener('click', () => {
      state.screenIndex = 0;
      state.lives = TOTAL_LIVES;
      state.perScreen = {};
      state.panelOpen = false;
      render();
    });
    actions.appendChild(retry);
    screen.appendChild(actions);

    maybeAutoRead(readText);
  }

  audioToggleBtn.addEventListener('click', () => {
    state.autoRead = !state.autoRead;
    updateTopbar();
    if(state.autoRead){
      showToast('Read-aloud is on.');
      render();
    }else{
      stopSpeaking();
      showToast('Read-aloud is off.');
    }
  });

  render();
})();
</script>
