<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ppt2s2_1</title>
<style>
  :root {
    --bg: #f5fbf7;
    --card: #ffffff;
    --ink: #183028;
    --muted: #5d736a;
    --line: #d7e7dd;
    --accent: #2d8a58;
    --accent-2: #f4b73f;
    --danger: #c85353;

  * { box-sizing: border-box; }
  body {
    margin: 0;

    color: var(--ink);
    background:

      radial-gradient(circle at top right, #fff3d8 0, transparent 28%),
      linear-gradient(180deg, #f6fbf7 0%, #edf7ef 100%);
  }
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 18px 16px 28px;
  }
  .top-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }
  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 220px;
    flex: 1 1 320px;
  }
  .progress-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-weight: 700;
  }
  .progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: #e7f1ea;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #56b87b);
    width: 0%;
    transition: width .25s ease;
  }
  .demerit-wrap {
    flex: 0 1 320px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .demerit-title {
    font-weight: 700;
  }
  .leaf-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .leaf {
    min-width: 36px;
    height: 36px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: #e8f6ee;
    border: 2px solid #c3e7d0;
    transition: transform .18s ease, opacity .18s ease, background .18s ease;
  }
  .leaf.lost {
    opacity: 0.35;
    background: #f2ece1;
    border-color: #e5dac8;
    transform: scale(.94);
  }
  .controls-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toggle-btn, .small-btn {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .toggle-btn.active {
    background: #e7f7ee;
    border-color: #b9e7cb;
  }
  .small-btn[disabled] {
    cursor: not-allowed;
    opacity: 0.55;
  }
  .screen-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 26px;
    box-shadow: var(--shadow);
    padding: 18px 18px 16px;
  }
  .title-row {
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: start;
    flex-wrap: wrap;
  }
  .eyebrow {
    font-size: 0.92rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: .02em;
  }
  h1 {
    margin: 4px 0 0;
    font-size: clamp(1.5rem, 2.6vw, 2rem);
    line-height: 1.15;
  }
  .instruction {
    margin-top: 14px;
    background: #eff8f2;
    border: 1px solid #d3eadc;
    border-radius: 18px;
    padding: 14px 16px;
    font-size: clamp(1.18rem, 2.4vw, 1.45rem);
    font-weight: 800;
    line-height: 1.25;
  }
  .key-text {
    margin: 12px 2px 0;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.45;
  }
  .main-area {
    margin-top: 16px;
    display: grid;
    gap: 16px;
  }
  .single-grid {
    display: grid;
    gap: 12px;
  }
  .option-btn {
    width: 100%;
    text-align: left;
    border: 2px solid #cfe4d6;
    background: #fff;
    color: var(--ink);
    border-radius: 18px;
    padding: 16px 18px;
    font-size: 1.08rem;
    line-height: 1.35;
    font-weight: 700;
    cursor: pointer;
    transition: transform .1s ease, border-color .1s ease, background .12s ease;
  }
  .option-btn:hover { transform: translateY(-1px); }
  .option-btn.selected {
    border-color: var(--accent);
    background: #edf9f1;
  }
  .option-btn.correct {
    border-color: var(--good);
    background: #e9f8ef;
  }
  .option-btn.wrong {
    border-color: var(--danger);
    background: #fff1f1;
  }
  .feedback {
    min-height: 32px;
    margin-top: 10px;
    padding: 0 2px;
    font-size: 1rem;
    line-height: 1.45;
    font-weight: 700;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--danger); }
  .nav-row {
    margin-top: 14px;
    display: flex;
    gap: 12px;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  .nav-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .nav-btn {
    border: none;
    border-radius: 16px;
    padding: 13px 18px;
    min-width: 112px;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
  }
  .nav-btn.primary {
    background: linear-gradient(180deg, #2d8a58 0%, #27754b 100%);
    color: #fff;
  }
  .nav-btn.secondary {
    background: #eef5f0;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .nav-btn[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
  }
  details.panel {
    margin-top: 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: #fbfdfb;
    overflow: hidden;
  }
  details.panel > summary {
    list-style: none;
    cursor: pointer;
    padding: 13px 16px;
    font-weight: 800;
    background: #f4faf6;
  }
  details.panel > summary::-webkit-details-marker {
    display: none;
  }
  .panel-body {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--line);
  }
  .question-block {
    display: grid;
    gap: 12px;
  }
  .prompt-box {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px;
  }
  .prompt-box p {
    margin: 0 0 10px;
    line-height: 1.45;
  }
  .highlight {
    background: linear-gradient(transparent 45%, #fff1b8 45%, #fff1b8 88%, transparent 88%);
    font-weight: 800;
  }
  .obs-table, .option-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 14px;
    overflow: hidden;
  }
  .obs-table th, .obs-table td, .option-table th, .option-table td {
    border: 1px solid #cfe1d6;
    padding: 10px 12px;
    text-align: left;
  }
  .obs-table th, .option-table th {
    background: #eff7f2;
  }
  .image-wrap {
    border: 1px solid var(--line);
    border-radius: 18px;
    background: white;
    padding: 12px;
  }
  .source-img {
    width: 100%;
    border-radius: 12px;
    display: block;
  }
  .diagram-wrap {
    border: 1px solid var(--line);
    background: linear-gradient(180deg, #fff 0%, #f7fcf8 100%);
    border-radius: 22px;
    padding: 12px;
  }
  .diagram-note {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.96rem;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .hotspot {
    fill: rgba(255,255,255,0.01);
    stroke: rgba(45,138,88,0.35);
    stroke-width: 2;
    cursor: pointer;
    transition: fill .12s ease, stroke .12s ease;
  }
  .hotspot:hover {
    fill: rgba(45,138,88,0.09);
  }
  .hotspot.selected {
    fill: rgba(244,183,63,0.2);
    stroke: #d28b00;
    stroke-width: 3;
  }
  .hotspot.correct {
    fill: rgba(45,138,88,0.18);
    stroke: var(--good);
    stroke-width: 3;
  }
  .hotspot.wrong {
    fill: rgba(200,83,83,0.15);
    stroke: var(--danger);
    stroke-width: 3;
  }
  .pair-builder {
    display: grid;
    gap: 14px;
  }
  .slot-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  .slot {
    border: 2px dashed #c5ddd0;
    border-radius: 18px;
    padding: 14px;
    background: #fff;
    cursor: pointer;
    min-height: 92px;
  }
  .slot.active {
    border-style: solid;
    border-color: var(--accent);
    background: #eff8f2;
    box-shadow: 0 0 0 4px rgba(45,138,88,0.08);
  }
  .slot-title {
    font-weight: 800;
    margin-bottom: 8px;
  }
  .slot-value {
    font-size: 1.1rem;
    font-weight: 800;
  }
  .choice-bank {
    display: grid;
    gap: 10px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .choice-chip {
    border: 2px solid #cfe4d6;
    border-radius: 16px;
    padding: 14px 12px;
    background: #fff;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    text-align: center;
  }
  .choice-chip.selected {
    border-color: var(--accent);
    background: #edf9f1;
  }
  .check-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .helper-grid {
    display: grid;
    gap: 10px;
  }
  .helper-line {
    font-size: 0.98rem;
    color: var(--ink);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f7fbf8;
    border: 1px solid var(--line);
    padding: 7px 12px;
    border-radius: 999px;
    font-weight: 700;
    color: var(--muted);
  }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(18,33,27,0.68);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 99;
  }
  .overlay.show { display: flex; }
  .overlay-card {
    width: min(92vw, 520px);
    background: #fff;
    border-radius: 24px;
    padding: 24px 22px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.18);
  }
  .overlay-card h2 {
    margin: 0 0 10px;
    font-size: 1.8rem;
  }
  .overlay-card p {
    margin: 8px 0 0;
    font-size: 1.05rem;
    line-height: 1.5;
  }
  .flower-keys {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .chip {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 0.96rem;
    background: #f7fbf8;
    border: 1px solid var(--line);
  }
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
  @media (max-width: 760px) {
    .page { padding: 12px; }
    .screen-card { padding: 16px 14px; }
    .slot-row, .choice-bank {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

function shuffle(arr) {
  const copy = arr.slice();
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

const screenOptionOrders = {};
screens.forEach(screen => {
  if (screen.options) {
    screenOptionOrders[screen.id] = shuffle(screen.options.map(opt => opt.id));
  }
  if (screen.type === "buildPair") {
    screenOptionOrders[screen.id] = shuffle(screen.choices.slice());
  }
});

function currentScreen() {
  return screens[state.current];
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function updateTopStrip() {
  const index = state.current + 1;
  progressText.textContent = `Screen ${index} of ${screens.length}`;
  screenTitleMini.textContent = currentScreen().title;
  progressFill.style.width = `${(index / screens.length) * 100}%`;
  leafRow.innerHTML = "";
  for (let i = 0; i < DEMERIT_TOTAL; i++) {
    const span = document.createElement("span");
    span.className = "leaf" + (i >= state.demeritsLeft ? " lost" : "");
    span.textContent = i < state.demeritsLeft ? "🌿" : "🍂";
    span.setAttribute("aria-hidden", "true");
    leafRow.appendChild(span);
  }
  toggleAudio.classList.toggle("active", state.audioOn);
  toggleAudio.textContent = state.audioOn ? "Read-aloud: On" : "Read-aloud: Off";
  toggleAudio.setAttribute("aria-pressed", state.audioOn ? "true" : "false");
  speakBtn.disabled = !state.audioOn;
}

function questionPanelHtml(showHighlights = false) {
  const p1 = `Lina performed an experiment on two different flowers, A and B, from the <span class="${showHighlights ? 'highlight' : ''}">${showHighlights ? 'same plant' : ''}</span>${showHighlights ? '' : 'same plant'}. A cross-section of the flower is shown in the diagram below.`;
  const p2 = `Lina removed <span class="${showHighlights ? 'highlight' : ''}">${showHighlights ? 'one part' : ''}</span>${showHighlights ? '' : 'one part'} from flower A and one part from flower B.`;
  return `
    <div class="question-block">
      <div class="prompt-box">
        <p>${p1}</p>
        <div class="image-wrap">${cleanDiagramHtml(false, false, false, false, true)}</div>

      <path d="M180 162 Q178 122 177 103" fill="none" stroke="#89b96c" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="177" cy="96" rx="10" ry="16" fill="#ead7ab" stroke="#b39a67" stroke-width="2"/>

      <path d="M240 162 Q242 122 243 103" fill="none" stroke="#89b96c" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="243" cy="96" rx="10" ry="16" fill="#ead7ab" stroke="#b39a67" stroke-width="2"/>

      <path d="M265 175 Q265 126 267 99" fill="none" stroke="#89b96c" stroke-width="4" stroke-linecap="round"/>
      <ellipse cx="267" cy="92" rx="10" ry="16" fill="#ead7ab" stroke="#b39a67" stroke-width="2"/>

      <text x="55" y="96" font-size="${labelSize}" font-weight="800" fill="#183028">P</text>
      <line x1="74" y1="92" x2="143" y2="92" stroke="#183028" stroke-width="2"/>
      <line x1="143" y1="92" x2="143" y2="92" stroke="#183028" stroke-width="2"/>

      <text x="70" y="190" font-size="${labelSize}" font-weight="800" fill="#183028">Q</text>
      <line x1="88" y1="185" x2="138" y2="170" stroke="#183028" stroke-width="2"/>

      <text x="330" y="220" font-size="${labelSize}" font-weight="800" fill="#183028">R</text>
      <line x1="320" y1="216" x2="280" y2="216" stroke="#183028" stroke-width="2"/>
      <line x1="280" y1="216" x2="274" y2="214" stroke="#183028" stroke-width="2"/>

      <text x="330" y="100" font-size="${labelSize}" font-weight="800" fill="#183028">S</text>
      <line x1="318" y1="96" x2="240" y2="78" stroke="#183028" stroke-width="2"/>

      ${interactive ? `
        <ellipse class="${hotspotClass("petal")}" data-hotspot="petal" cx="120" cy="116" rx="56" ry="82" transform="rotate(-20 120 116)"></ellipse>
        <path class="${hotspotClass("sepal")}" data-hotspot="sepal" d="M128 217 Q142 194 163 190 Q149 212 154 240 Z"></path>
        <ellipse class="${hotspotClass("anther")}" data-hotspot="anther" cx="153" cy="92" rx="20" ry="26"></ellipse>
        <circle class="${hotspotClass("stigma")}" data-hotspot="stigma" cx="210" cy="76" r="22"></circle>
      ` : ``}
    </svg>
    <div class="diagram-note">Cleaner study diagram for the interactive</div>
  </div>`;
}

function buildReadableText(screen) {
  let text = `${screen.title}. ${screen.instruction}`;
  if (screen.keyText) text += ` ${screen.keyText}`;
  if (screen.type === "single" && screen.options) {
    const ordered = orderedOptions(screen).map(opt => opt.text).join(". ");
    text += ` Options: ${ordered}.`;
  }
  if (screen.type === "buildPair") {
    text += " Choose a part for flower A and a part for flower B. The choices are anther, stigma, petal, and sepal.";
  }
  const feedback = state.feedback[screen.id];
  if (feedback && feedback.message) {
    text += ` Feedback: ${feedback.message}`;
  }
  return text;
}

function speakScreen() {
  if (!state.audioOn || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(buildReadableText(currentScreen()));
  utterance.rate = 0.95;
  utterance.pitch = 1;
  state.speaking = true;
  utterance.onend = () => state.speaking = false;
  window.speechSynthesis.speak(utterance);
}

function orderedOptions(screen) {
  const order = screenOptionOrders[screen.id] || [];
  return order.map(id => screen.options.find(opt => opt.id === id)).filter(Boolean);
}

function setFeedback(screenId, status, message) {
  state.feedback[screenId] = { status, message };
  render();
  if (state.audioOn) speakScreen();
}

function spendDemeritIfNeeded(screen) {
  if (!screen.penalty) return;
  state.demeritsLeft -= 1;
  if (state.demeritsLeft < 0) state.demeritsLeft = 0;
  if (state.demeritsLeft === 0) {
    updateTopStrip();
    overlay.classList.add("show");
    setTimeout(() => {
      overlay.classList.remove("show");
      restartAll();
    }, 1800);
  }
}

function markCompleted(screenId) {
  state.completed[screenId] = true;
}

function goNext() {
  if (state.current < screens.length - 1) {
    state.current += 1;
    render();
  }
}

function goBack() {
  if (state.current > 0) {
    state.current -= 1;
    render();
  }
}

function restartAll() {
  state.current = 0;
  state.demeritsLeft = DEMERIT_TOTAL;
  state.questionOpen = false;
  state.sourceOpen = false;
  state.reminderOpen = false;
  state.completed = {};
  state.answers = {};
  state.feedback = {};
  state.pairActiveSlot = "A";
  state.pairSelection = { A: "", B: "" };
  render();
}

function renderIntro(screen) {
  return `
    <div class="main-area">
      <div class="badge">Question-first start</div>
      ${questionPanelHtml(true)}
    </div>
    <div class="feedback"></div>
    <div class="nav-row">
      <div></div>
      <div class="nav-buttons">
        <button class="nav-btn primary" id="startBtn">Start</button>
      </div>
    </div>
  `;
}

function renderSingle(screen) {
  const fb = state.feedback[screen.id] || {};
  const selected = state.answers[screen.id] || "";
  const optionsHtml = orderedOptions(screen).map(opt => {
    let cls = "option-btn";
    if (selected === opt.id) cls += " selected";
    if (state.completed[screen.id] && opt.correct) cls += " correct";
    if (fb.status === "bad" && selected === opt.id && !opt.correct) cls += " wrong";
    return `<button class="${cls}" data-option="${opt.id}">${escapeHtml(opt.text)}</button>`;
  }).join("");
  return `
    <div class="main-area">
      <div class="single-grid">${optionsHtml}</div>
    </div>
    <div class="feedback ${fb.status === 'good' ? 'good' : fb.status === 'bad' ? 'bad' : ''}">${fb.message || ''}</div>
    ${fb.status === 'bad' && !state.completed[screen.id] ? `
      <div class="check-row">
        <button class="nav-btn secondary" id="resetAnswerBtn">Try again</button>
      </div>
    ` : ``}
    ${renderCommonPanels(screen)}
    <div class="nav-row">
      <div class="nav-buttons">
        <button class="nav-btn secondary" id="backBtn" ${state.current === 0 ? 'disabled' : ''}>Back</button>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn primary" id="nextBtn" ${!state.completed[screen.id] ? 'disabled' : ''}>Next</button>
      </div>
    </div>
  `;
}

function renderHotspot(screen) {
  const fb = state.feedback[screen.id] || {};
  const selected = state.answers[screen.id] || "";
  return `
    <div class="main-area">
      ${cleanDiagramHtml(true, selected, Boolean(fb.status), fb.status === "good", false)}
    </div>
    <div class="feedback ${fb.status === 'good' ? 'good' : fb.status === 'bad' ? 'bad' : ''}">${fb.message || ''}</div>
    ${renderCommonPanels(screen)}
    <div class="nav-row">
      <div class="nav-buttons">
        <button class="nav-btn secondary" id="backBtn">Back</button>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn primary" id="nextBtn" ${!state.completed[screen.id] ? 'disabled' : ''}>Next</button>
      </div>
    </div>
  `;
}

function renderBuildPair(screen) {
  const fb = state.feedback[screen.id] || {};
  const choices = screenOptionOrders[screen.id];
  const bankHtml = choices.map(choice => {
    const inA = state.pairSelection.A === choice;
    const inB = state.pairSelection.B === choice;
    const cls = "choice-chip" + ((inA || inB) ? " selected" : "");
    return `<button class="${cls}" data-choice="${choice}">${escapeHtml(choice)}</button>`;
  }).join("");
  const slot = (name) => {
    const active = state.pairActiveSlot === name ? " active" : "";
    const value = state.pairSelection[name] ? escapeHtml(state.pairSelection[name]) : "Tap this box, then tap a choice below.";
    return `
      <button class="slot${active}" data-slot="${name}">
        <div class="slot-title">Flower ${name}</div>
        <div class="slot-value">${value}</div>
      </button>
    `;
  };
  return `
    <div class="main-area">
      <div class="pair-builder">
        <div class="slot-row">
          ${slot("A")}
          ${slot("B")}
        </div>
        <div class="choice-bank">${bankHtml}</div>
        <div class="check-row">
          <button class="nav-btn primary" id="checkPairBtn">Check</button>
          <button class="nav-btn secondary" id="clearPairBtn">Clear</button>
        </div>
      </div>
    </div>
    <div class="feedback ${fb.status === 'good' ? 'good' : fb.status === 'bad' ? 'bad' : ''}">${fb.message || ''}</div>
    ${fb.status === 'bad' && !state.completed[screen.id] ? `
      <div class="check-row">
        <button class="nav-btn secondary" id="resetAnswerBtn">Try again</button>
      </div>
    ` : ``}
    ${renderCommonPanels(screen)}
    <div class="nav-row">
      <div class="nav-buttons">
        <button class="nav-btn secondary" id="backBtn">Back</button>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn primary" id="nextBtn" ${!state.completed[screen.id] ? 'disabled' : ''}>Next</button>
      </div>
    </div>
  `;
}

function renderCompletion(screen) {
  return `
    <div class="main-area">
      <div class="prompt-box">
        <p>${escapeHtml(screen.keyText)}</p>
        <div class="flower-keys">
          <span class="chip">Key clue: same plant</span>
          <span class="chip">A formed fruit → stigma still available</span>
          <span class="chip">B did not form fruit → stigma removed</span>
        </div>
      </div>
      <details class="panel" ${state.questionOpen ? "open" : ""} id="questionDetails">
        <summary>Show question again</summary>
        <div class="panel-body">${questionPanelHtml(false)}</div>
      </details>
    </div>
    <div class="feedback"></div>
    <div class="nav-row">
      <div class="nav-buttons">
        <button class="nav-btn secondary" id="backBtn">Back</button>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn primary" id="restartBtn">Restart</button>
      </div>
    </div>
  `;
}

function renderCommonPanels(screen) {
  const showReminder = ["flower-b", "build-pair", "final-choice"].includes(screen.id);
  return `
    <details class="panel" ${state.questionOpen ? "open" : ""} id="questionDetails">
      <summary>Show question and source</summary>
      <div class="panel-body">
        ${questionPanelHtml(false)}
      </div>
    </details>
    ${showReminder ? helperPopupHtml() : ''}
  `;
}

function render() {
  updateTopStrip();
  const screen = currentScreen();
  const eyebrow = `Flower investigation • ${screen.type === "completion" ? "Complete" : "Interactive practice"}`;
  const html = `
    <div class="title-row">
      <div>
        <div class="eyebrow">${eyebrow}</div>
        <h1>${escapeHtml(screen.title)}</h1>
      </div>
    </div>
    <div class="instruction">${escapeHtml(screen.instruction)}</div>
    <div class="key-text">${escapeHtml(screen.keyText || "")}</div>
    ${
      screen.type === "intro" ? renderIntro(screen) :
      screen.type === "single" ? renderSingle(screen) :
      screen.type === "hotspot" ? renderHotspot(screen) :
      screen.type === "buildPair" ? renderBuildPair(screen) :
      screen.type === "completion" ? renderCompletion(screen) :
      `<p>Screen type not supported.</p>`
    }
  `;
  app.innerHTML = html;
  wireScreenEvents(screen);
  updateDetailState();
}

function updateDetailState() {
  const qDetails = document.getElementById("questionDetails");
  if (qDetails) {
    qDetails.open = state.questionOpen;
    qDetails.addEventListener("toggle", () => {
      state.questionOpen = qDetails.open;
    });
  }
  const sDetails = document.getElementById("sourceDetails");
  if (sDetails) {
    sDetails.open = state.sourceOpen;
    sDetails.addEventListener("toggle", () => {
      state.sourceOpen = sDetails.open;
    });
  }
  const rDetails = document.getElementById("reminderDetails");
  if (rDetails) {
    rDetails.open = state.reminderOpen;
    rDetails.addEventListener("toggle", () => {
      state.reminderOpen = rDetails.open;
    });
  }
}

function handleSingleChoice(screen, optionId) {
  state.answers[screen.id] = optionId;
  const choice = screen.options.find(opt => opt.id === optionId);
  if (!choice) return;
  if (choice.correct) {
    markCompleted(screen.id);
    setFeedback(screen.id, "good", screen.feedbackCorrect);
  } else {
    spendDemeritIfNeeded(screen);
    setFeedback(screen.id, "bad", screen.feedbackWrong);
  }
}

function handleHotspot(screen, part) {
  state.answers[screen.id] = part;
  if (part === screen.target) {
    markCompleted(screen.id);
    setFeedback(screen.id, "good", screen.feedbackCorrect);
  } else {
    spendDemeritIfNeeded(screen);
    setFeedback(screen.id, "bad", screen.feedbackWrong);
  }
}


function resetAnswer(screenId) {
  delete state.answers[screenId];
  delete state.feedback[screenId];
  delete state.completed[screenId];
  render();
}

function handlePairCheck(screen) {
  const a = state.pairSelection.A;
  const b = state.pairSelection.B;
  if (!a || !b) {
    setFeedback(screen.id, "bad", "Choose one part for each flower before you check.");
    return;
  }
  if (a === screen.correct.A && b === screen.correct.B) {
    markCompleted(screen.id);
    setFeedback(screen.id, "good", screen.feedbackCorrect);
  } else {
    spendDemeritIfNeeded(screen);
    setFeedback(screen.id, "bad", screen.feedbackWrong);
  }
}

function wireScreenEvents(screen) {
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", goBack);

  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", goNext);

  const startBtn = document.getElementById("startBtn");
  if (startBtn) startBtn.addEventListener("click", goNext);

  const restartBtn = document.getElementById("restartBtn");
  if (restartBtn) restartBtn.addEventListener("click", restartAll);

  if (screen.type === "single") {
    app.querySelectorAll("[data-option]").forEach(btn => {
      btn.addEventListener("click", () => handleSingleChoice(screen, btn.dataset.option));
    });
  }

  const resetAnswerBtn = document.getElementById("resetAnswerBtn");
  if (resetAnswerBtn) {
    resetAnswerBtn.addEventListener("click", () => resetAnswer(screen.id));
  }

  if (screen.type === "hotspot") {
    app.querySelectorAll("[data-hotspot]").forEach(el => {
      el.addEventListener("click", () => handleHotspot(screen, el.dataset.hotspot));
    });
  }

  if (screen.type === "buildPair") {
    app.querySelectorAll("[data-slot]").forEach(slot => {
      slot.addEventListener("click", () => {
        state.pairActiveSlot = slot.dataset.slot;
        render();
      });
    });
    app.querySelectorAll("[data-choice]").forEach(choiceBtn => {
      choiceBtn.addEventListener("click", () => {
        const value = choiceBtn.dataset.choice;
        state.pairSelection[state.pairActiveSlot] = value;
        render();
      });
    });
    const checkPairBtn = document.getElementById("checkPairBtn");
    if (checkPairBtn) {
      checkPairBtn.addEventListener("click", () => handlePairCheck(screen));
    }
    const clearPairBtn = document.getElementById("clearPairBtn");
    if (clearPairBtn) {
      clearPairBtn.addEventListener("click", () => {
        state.pairSelection = { A: "", B: "" };
        state.pairActiveSlot = "A";
        state.feedback[screen.id] = { status: "", message: "" };
        render();
      });
    }
  }
}

toggleAudio.addEventListener("click", () => {
  state.audioOn = !state.audioOn;
  if (!state.audioOn && 'speechSynthesis' in window) window.speechSynthesis.cancel();
  updateTopStrip();
});

speakBtn.addEventListener("click", speakScreen);

window.addEventListener("beforeunload", () => {
  if ('speechSynthesis' in window) window.speechSynthesis.cancel();
});

render();
</script>
</body>
</html>
