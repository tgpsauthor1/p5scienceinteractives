
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>ppt2s2_7c</title>
<style>
  :root{
    --bg:#eef7fb;
    --panel:#ffffff;
    --ink:#17324d;
    --muted:#5b7288;
    --sea:#8fd3ff;
    --sea-dark:#4ba9e2;

    --accent:#2e7d5a;

  body{
    margin:0;

      radial-gradient(circle at top left, #f9fffd 0, #f1fbff 32%, #ebf4fb 100%);

    max-width: 1000px;

  .topbar{
    display:grid;

  .progress{

  .demerits{
    display:flex;
    align-items:center;
    gap:10px;

    flex-wrap:wrap;
  }
  .demerits .label{
    font-size:14px;

    font-weight:700;
  }
  .pods{
    display:flex;

  }
  .pod{
    width:24px;height:24px;
    border-radius:999px;
    display:grid;
    place-items:center;
    font-size:16px;
    background:#f1f9ef;
    border:2px solid #bfe1bb;
    transition:transform .2s ease, opacity .2s ease, filter .2s ease;

  .pod.lost{
    opacity:.3;
    filter:grayscale(1);

  }
  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  button{
    font:inherit;
    border:none;
    border-radius:16px;
    padding:12px 16px;
    cursor:pointer;
    min-height:48px;
  }
  .ghost{
    background:#f2f8fd;
    color:var(--ink);
    border:1px solid var(--line);
  }
  .primary{
    background:linear-gradient(180deg, #2f8d6a, #22664f);
    color:#fff;
    font-weight:800;
    box-shadow:0 10px 16px rgba(34,102,79,.22);
  }
  .primary[disabled], .check-btn[disabled], .choice-btn[disabled]{
    opacity:.45;
    cursor:not-allowed;
    box-shadow:none;
  }
  .screen{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:18px;
    min-height:560px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .title{
    font-size:20px;
    color:var(--muted);
    font-weight:700;
  }
  .instruction{
    background:linear-gradient(180deg, #e9f8ff, #dff2ff);
    border:2px solid #c8e8fb;
    border-radius:22px;
    padding:16px 18px;
    font-size:clamp(24px, 3vw, 32px);
    line-height:1.18;
    font-weight:900;
    letter-spacing:.2px;
  }
  .content{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .card{
    background:#fbfdff;
    border:1px solid var(--line);
    border-radius:22px;
    padding:14px;
  }
  .question-box{
    font-size:20px;
    line-height:1.45;
  }
  .highlight{
    background:#fff2b8;
    padding:2px 4px;
    border-radius:8px;
  }
  .inline-hex{
    display:inline-block;
    width:18px;height:18px;
    vertical-align:-3px;
    background:#7cb0e1;
    border:2px solid #285c8a;
    clip-path:polygon(25% 6%,75% 6%,100% 50%,75% 94%,25% 94%,0 50%);
    margin:0 3px;
  }
  .option-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap:12px;
  }
  .choice-btn, .card-option{
    background:#fff;
    border:2px solid #c7d9e6;
    color:var(--ink);
    font-weight:700;
    text-align:left;
    padding:16px;
    border-radius:18px;
    min-height:72px;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .choice-btn:hover, .card-option:hover{transform:translateY(-1px)}
  .selected{
    border-color:#317eb6 !important;
    background:#eaf5ff !important;
  }
  .correct{
    border-color:var(--good) !important;
    background:#edf9f0 !important;
  }
  .wrong{
    border-color:var(--danger) !important;
    background:#fff2f2 !important;
  }
  .feedback{
    min-height:62px;
    border-radius:18px;
    padding:14px 16px;

    border:2px solid transparent;

  }
  .feedback.good{background:#edf9f0;border-color:#c9e9d1}
  .feedback.bad{background:#fff2f2;border-color:#f1c8c8}
  .feedback.neutral{background:#f5f8fb;border-color:#d5e2ee}
  .nav{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding-top:4px;
  }
  .map-wrap{
    background:linear-gradient(180deg,#fff,#f6fbff);
    border:1px solid var(--line);
    border-radius:22px;
    padding:10px;
  }
  .question-toggle{
    margin-top:4px;
    display:flex;
    justify-content:flex-start;
  }
  details.qpanel{
    border:1px solid var(--line);
    border-radius:18px;
    background:#fbfdff;
    overflow:hidden;
  }
  details.qpanel summary{
    list-style:none;
    cursor:pointer;
    padding:14px 16px;
    font-weight:800;
    user-select:none;
  }
  details.qpanel summary::-webkit-details-marker{display:none}
  details.qpanel .inner{
    padding:0 16px 16px 16px;
    border-top:1px solid var(--line);
  }
  .method-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap:12px;
  }
  .method-card{
    border:2px solid #c8d9e8;
    border-radius:20px;
    padding:12px;
    background:#fff;
  }
  .method-demo{
    height:88px;
    border-radius:16px;
    background:linear-gradient(180deg,#eef9ff,#f7fcff);
    border:1px solid #d7eaf7;
    margin-bottom:10px;
    position:relative;
    overflow:hidden;
  }
  .method-title{font-weight:900;margin-bottom:6px}
  .mini-note{color:var(--muted);font-size:15px}
  .seed, .seed2, .seed3, .bird, .wave, .pod-burst, .short-seed{
    position:absolute;
  }
  .seed, .seed2, .seed3, .short-seed{
    width:10px;height:10px;border-radius:50%;
    background:#5b4a34;
  }
  .wind-line{
    position:absolute; left:8px; top:24px; right:8px; height:2px;
    background:linear-gradient(90deg, transparent, #7bb9e8 18%, #7bb9e8 82%, transparent);
  }
  .seed{ top:28px; left:12px; animation:drift 4s linear infinite;}
  .seed2{ top:48px; left:28px; animation:drift2 4.5s linear infinite;}
  .wave{
    left:0; right:0; bottom:14px; height:22px;
    background:repeating-linear-gradient(90deg, #8ad3ff 0 24px, #6ec0f5 24px 48px);
    clip-path:polygon(0 50%,10% 38%,20% 54%,30% 40%,40% 56%,50% 42%,60% 55%,70% 39%,80% 58%,90% 42%,100% 55%,100% 100%,0 100%);
  }
  .seed3{ top:44px; left:16px; animation:floatAcross 4.2s linear infinite;}
  .bird{
    font-size:26px; top:18px; left:10px;
    animation:flyAcross 4.8s linear infinite;
  }
  .pod-burst{
    width:32px;height:22px; left:18px; bottom:18px;
    background:#7aa55a; border-radius:18px 18px 6px 6px;
  }
  .short-seed.one{ left:40px; bottom:44px; animation:pop1 1.7s ease-in-out infinite;}
  .short-seed.two{ left:46px; bottom:30px; animation:pop2 1.7s ease-in-out infinite;}
  .short-seed.three{ left:54px; bottom:20px; animation:pop3 1.7s ease-in-out infinite;}
  @keyframes drift{0%{transform:translateX(0)}100%{transform:translateX(130px)}}
  @keyframes drift2{0%{transform:translateX(0)}100%{transform:translateX(118px) translateY(-8px)}}
  @keyframes floatAcross{0%{transform:translateX(0)}100%{transform:translateX(135px)}}
  @keyframes flyAcross{0%{transform:translateX(0)}100%{transform:translateX(132px)}}
  @keyframes pop1{0%,100%{transform:translate(0,0)}50%{transform:translate(22px,-26px)}}
  @keyframes pop2{0%,100%{transform:translate(0,0)}50%{transform:translate(26px,-14px)}}
  @keyframes pop3{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-4px)}}
  .check-area{
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:flex-start;
    flex-wrap:wrap;
  }
  .check-btn{
    background:#245e8c;
    color:#fff;
    font-weight:800;
  }
  .sequence-board{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(170px,1fr));
    gap:10px;
  }
  .slot{
    min-height:92px;
    border:2px dashed #b5cbe0;
    border-radius:18px;
    padding:12px;
    background:#f7fbff;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:700;
  }
  .slot.filled{
    border-style:solid;
    background:#eaf5ff;
    cursor:pointer;
  }
  .bank{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(190px, 1fr));
    gap:10px;
  }
  .bank .card-option{
    min-height:88px;
  }
  .sentence{
    font-size:clamp(24px, 2.7vw, 32px);
    line-height:1.45;
    font-weight:800;
    background:#fffdf6;
    border:2px solid #f0e4b6;
    border-radius:20px;
    padding:16px;
  }
  .blank{
    display:inline-block;
    min-width:120px;
    padding:8px 12px;
    margin:0 6px;
    border-radius:14px;
    border:2px dashed #caa95b;
    background:#fff;
    vertical-align:middle;
    text-align:center;
    cursor:pointer;
  }
  .blank.active{
    box-shadow:0 0 0 4px rgba(231,157,47,.18);
    border-color:#d48a00;
  }
  .guess-wrap{
    display:flex;
    flex-direction:column;
    gap:12px;
    max-width:560px;
  }
  .guess-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  input[type="text"]{
    font:inherit;
    border:2px solid #c7d9e6;
    border-radius:16px;
    padding:14px 16px;

    min-width:180px;

  }
  .transfer-box{
    display:grid;

  }
  .finish{

  }
  .finish .big{
    font-size:clamp(34px, 5vw, 46px);
    font-weight:900;
  }
  .finish .tip{
    max-width:620px;
    font-size:24px;
    line-height:1.35;
    background:#fffdf6;
    border:2px solid #f0e4b6;
    border-radius:24px;
    padding:18px 22px;
  }
  .overlay{
    position:fixed; inset:0;
    background:rgba(13,28,43,.62);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:999;
  }
  .overlay.show{display:flex}
  .overlay-card{
    background:#fff;
    border-radius:28px;
    padding:26px 24px;
    max-width:500px;
    width:min(92vw, 500px);
    text-align:center;
    box-shadow:0 24px 48px rgba(0,0,0,.28);
  }
  .overlay-card h2{margin-top:0;font-size:34px}
  .small{
    font-size:14px;
    color:var(--muted);
  }
  .legend-note{
    font-size:15px;
    color:var(--muted);
  }
  @media (max-width: 720px){
    .topbar{grid-template-columns:1fr;justify-items:flex-start}
    .controls{justify-content:flex-start}

    .instruction{font-size:26px}
    .question-box{font-size:18px}
    .sentence{font-size:24px}
  }
</style>

<body>
<div class="app">
  <div class="topbar" id="topbar"></div>
  <div class="screen" id="screen"></div>
</div>
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <h2>Out of seed chances!</h2>
    <p style="font-size:22px;line-height:1.35;margin:8px 0 0 0;">Starting the whole interactive again…</p>
  </div>
</div>

<script>
(() => {
  const FULL_QUESTION = 'Give a reason why plant ⬡ can only be found on land X but not land Y.';
  const DEMERIT_SCREENS = new Set([1,2,3,4,5,6]); // 0-based teaching/building screens
  const TOTAL_CHECKABLE = 6;
  const DEMERITS_MAX = Math.max(1, Math.floor(TOTAL_CHECKABLE / 2)); // auto-calculated
  const VOICES = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  let restartTimer = null;

  function shuffle(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function shuffledNotSameOrder(items, key='id'){
    let tries = 0;
    let a = shuffle(items);
    while (tries < 20 && a.every((x,i) => x[key] === items[i][key])) {
      a = shuffle(items);
      tries++;
    }
    return a;
  }

  function makeMapSVG(){
    return `
    <svg viewBox="0 0 820 430" width="100%" aria-label="Clean map showing Land X, Sea and Land Y">
      <defs>
        <linearGradient id="seaFill" x1="0" x2="1">
          <stop offset="0%" stop-color="#8fd3ff"/>
          <stop offset="100%" stop-color="#67b9ef"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="820" height="430" rx="22" fill="#fff"/>
      <rect x="14" y="14" width="806" height="402" rx="18" fill="#fff"/>
      <rect x="14" y="14" width="806" height="402" rx="18" fill="#fff8"/>
      <path d="M235 14 L585 14
               C530 70 530 130 575 200
               C610 255 615 330 595 416
               L225 416
               C260 330 245 255 205 200
               C165 140 170 65 235 14 Z"
            fill="url(#seaFill)" stroke="#4ba9e2" stroke-width="3"/>
      <text x="62" y="42" font-size="28" font-weight="900" fill="#223a4e">Land X</text>
      <text x="640" y="315" font-size="28" font-weight="900" fill="#223a4e">Land Y</text>
      <text x="390" y="250" font-size="30" font-weight="900" fill="#17324d">Sea</text>

      ${makeShortLines(252, 48, 12, 130, 24)}
      ${makeShortLines(605, 62, 10, 128, 25)}

      <!-- Parent plant T -->
      ${hex(145,95,18,'#7cb0e1','#285c8a')}
      <!-- Young plant T near parent -->
      ${smallHex(92,92,7)} ${smallHex(115,64,7)} ${smallHex(112,116,7)} ${smallHex(160,58,7)} ${smallHex(176,112,7)} ${smallHex(186,82,7)}
      ${smallHex(194,66,7)} ${smallHex(132,52,7)} ${smallHex(204,94,7)}
      <!-- Parent/young U -->
      ${tri(45,185,18,'#5f95d6','#295887')}
      ${smallTri(88,186,9)} ${smallTri(120,176,9)}
      ${tri(320,28,18,'#5f95d6','#295887')}
      ${smallTri(300,56,9)}
      ${tri(570,122,18,'#5f95d6','#295887')}
      ${smallTri(528,168,9)}
      ${tri(640,108,18,'#5f95d6','#295887')}
      ${smallTri(624,78,9)}
      ${tri(700,110,18,'#5f95d6','#295887')}
      ${tri(584,220,18,'#5f95d6','#295887')}
      ${smallTri(598,338,9)}

      <!-- Wind arrow -->
      <text x="32" y="360" font-size="22" font-weight="700" fill="#17324d">Wind direction</text>
      <line x1="40" y1="386" x2="145" y2="386" stroke="#17324d" stroke-width="4" />
      <polygon points="145,386 128,377 128,395" fill="#17324d"></polygon>

      <!-- Legend -->
      <rect x="720" y="58" width="84" height="178" rx="14" fill="#f8fbff" stroke="#b8d0e2" stroke-width="2"/>
      <text x="735" y="86" font-size="18" font-weight="900" fill="#17324d">Legend</text>
      ${hex(739,112,13,'#7cb0e1','#285c8a')} <text x="760" y="118" font-size="16" font-weight="700" fill="#17324d">Parent T</text>
      ${smallHex(739,146,6)} <text x="760" y="151" font-size="16" font-weight="700" fill="#17324d">Young T</text>
      ${tri(739,178,14,'#5f95d6','#295887')} <text x="760" y="184" font-size="16" font-weight="700" fill="#17324d">Parent U</text>
      ${smallTri(739,212,7)} <text x="760" y="216" font-size="16" font-weight="700" fill="#17324d">Young U</text>
    </svg>`;
  }

  function makeShortLines(startX, startY, cols, spreadX, spreadY){
    let out = '';
    for(let i=0;i<cols;i++){
      const x = startX + (i%3)*spreadX/3 + ((i*37)%18);
      const y = startY + Math.floor(i/3)*spreadY + ((i*19)%12);
      out += `<line x1="${x}" y1="${y}" x2="${x+38}" y2="${y}" stroke="#2e5e82" stroke-width="3"/>`;
    }
    return out;
  }
  function hex(cx, cy, r, fill, stroke){
    const pts = [];
    for(let i=0;i<6;i++){
      const a = Math.PI / 3 * i - Math.PI / 6;
      pts.push(`${cx + r*Math.cos(a)},${cy + r*Math.sin(a)}`);
    }
    return `<polygon points="${pts.join(' ')}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>`;
  }
  function smallHex(cx, cy, r){
    return hex(cx, cy, r, '#d9e9fb', '#285c8a');
  }
  function tri(cx, cy, s, fill, stroke){
    return `<polygon points="${cx},${cy-s} ${cx-s*0.9},${cy+s*0.7} ${cx+s*0.9},${cy+s*0.7}" fill="${fill}" stroke="${stroke}" stroke-width="3"/>`;
  }
  function smallTri(cx, cy, s){
    return tri(cx, cy, s, '#f4fbff', '#295887');
  }

  function makeTransferMap(){
    return `
    <svg viewBox="0 0 700 260" width="100%" aria-label="New transfer map">
      <rect x="0" y="0" width="700" height="260" rx="20" fill="#fff"/>
      <rect x="8" y="8" width="684" height="244" rx="16" fill="#fffaf4" stroke="#d9e7f1"/>
      <rect x="292" y="8" width="116" height="244" rx="20" fill="#9bd7fb" stroke="#58ace4" stroke-width="3"/>
      <text x="334" y="134" text-anchor="middle" font-size="30" font-weight="900" fill="#17324d">River</text>
      <text x="40" y="38" font-size="26" font-weight="900" fill="#223a4e">Land A</text>
      <text x="515" y="38" font-size="26" font-weight="900" fill="#223a4e">Land B</text>
      ${hex(160,110,18,'#7cb0e1','#285c8a')}
      ${smallHex(112,88,7)} ${smallHex(128,144,7)} ${smallHex(188,88,7)} ${smallHex(203,132,7)} ${smallHex(145,66,7)}
      <text x="80" y="210" font-size="20" font-weight="700" fill="#17324d">Young plants stay near the parent.</text>
      <text x="80" y="235" font-size="20" font-weight="700" fill="#17324d">None are found on Land B.</text>
    </svg>`;
  }

  const initialScreens = () => ({
    current: 0,
    questionOpen: false,
    autoRead: false,
    demeritsMax: DEMERITS_MAX,
    demeritsLeft: DEMERITS_MAX,
    s2: {selected: new Set(), solved:false, checked:false, status:'neutral', msg:'Tap the clues about plant T, then tap Check.', penalizedSignature:null},
    s3: {solved:false, selected:null, status:'neutral', msg:'Pick the pattern that matters most.'},
    s4: {selected: new Set(), solved:false, checked:false, status:'neutral', msg:'Choose every method that could carry seeds across the sea.', penalizedSignature:null},
    s5: {solved:false, selected:null, status:'neutral', msg:'Choose the one method that fits all the clues best.'},
    s6: {order: [], solved:false, status:'neutral', msg:'Build the chain, then tap Check.', penalizedSignature:null},
    s7: {blank1:'', blank2:'', active:1, solved:false, status:'neutral', msg:'Fill both blanks, then tap Check.', penalizedSignature:null},
    s8: {phase:0, reveal:1, solved:false, status:'neutral', msg:'Type the missing word.', input:''},
    s9: {solved:false, selected:null, status:'neutral', msg:'Use the same idea on a new map.'}
  });

  let state = initialScreens();

  const screenEl = document.getElementById('screen');
  const topbarEl = document.getElementById('topbar');
  const overlayEl = document.getElementById('overlay');

  const singleChoices = {
    s3: shuffledNotSameOrder([
      {id:'correct', text:'Young plant T stays near the parent on land X, and plant T is not found on land Y.'},
      {id:'bothlands', text:'Plant T grows on both lands, but only the parent plant is shown on land X.'},
      {id:'farther', text:'Plant T grows farther from the parent than plant U.'},
      {id:'windmoved', text:'The wind moved all the seeds of plant T to land Y.'},
    ]),
    s5: shuffledNotSameOrder([
      {id:'split', text:'Splitting or explosive action'},
      {id:'wind', text:'Wind'},
      {id:'water', text:'Water'},
      {id:'animals', text:'Animals'},
    ]),
    s9: shuffledNotSameOrder([
      {id:'split', text:'Splitting or explosive action'},
      {id:'animals', text:'Animals'},
      {id:'water', text:'Water'},
      {id:'wind', text:'Wind'},
    ])
  };

  const s6Bank = shuffledNotSameOrder([

      case 4: return state.s5.solved;

  function speak(text){
    if(!window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text.replace(/\s+/g,' ').trim());
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => /en/i.test(v.lang)) || voices[0];
    if(preferred) utter.voice = preferred;
    utter.rate = 0.95;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }

  function getSpeechText(){
    const base = [];
    const title = document.querySelector('.title');
    const instruction = document.querySelector('.instruction');
    const speechText = document.querySelector('[data-speech]');
    const feedback = document.querySelector('.feedback');
    if(title) base.push(title.innerText);
    if(instruction) base.push(instruction.innerText);
    if(speechText) base.push(speechText.innerText);
    if(feedback) base.push('Feedback. ' + feedback.innerText);
    return base.join(' ');
  }

  function maybeAutoSpeak(){
    if(state.autoRead){

  }

  function loseDemerit(){
    if(!DEMERIT_SCREENS.has(state.current)) return;
    state.demeritsLeft = Math.max(0, state.demeritsLeft - 1);
    if(state.demeritsLeft <= 0){
      overlayEl.classList.add('show');
      restartTimer = setTimeout(() => {
        overlayEl.classList.remove('show');
        resetWholeInteractive();
      }, 1700);
    }
  }

  function resetWholeInteractive(){

  function attachHandlers(){

    if(nextBtn){
      nextBtn.onclick = () => {
        if(state.current === 9){
          resetWholeInteractive();

          state.current += 1;
          render();
        }
      };
    }

    // Screen 2
    screenEl.querySelectorAll('[data-id]').forEach(btn => {
      if(state.current === 1){
        btn.onclick = () => {

          else state.s2.selected.add(id);
          state.s2.checked = false;
          state.s2.status = 'neutral';
          state.s2.msg = 'Tap the clues about plant T, then tap Check.';
          render();
        };
      }
    });
    const checkS2 = document.getElementById('checkS2');
    if(checkS2 && state.current === 1){
      checkS2.onclick = () => {
        const correct = ['parentX','youngNear','notY'].sort().join('|');
        const chosen = [...state.s2.selected].sort().join('|');
        state.s2.checked = true;
        if(chosen === correct){
          state.s2.solved = true;
          state.s2.status = 'good';
          state.s2.msg = 'Yes. These are the clues about plant T that matter here.';
        } else {
          if(state.s2.penalizedSignature !== chosen){
            state.s2.penalizedSignature = chosen;
            loseDemerit();
          }
          state.s2.status = 'bad';
          state.s2.msg = 'Choose the clues about plant T. The other plant is not the key clue here.';
        }
        render();

          else state.s7.blank2 = id;
          state.s7.status = 'neutral';
          state.s7.msg = 'Fill both blanks, then tap Check.';
          render();
        };
      });
      const clearS7 = document.getElementById('clearS7');
      if(clearS7){
        clearS7.onclick = () => {
          state.s7.blank1 = '';
          state.s7.blank2 = '';
          state.s7.active = 1;
          state.s7.status = 'neutral';
          state.s7.msg = 'Fill both blanks, then tap Check.';
          render();
        };
      }
      const checkS7 = document.getElementById('checkS7');
      if(checkS7){
        checkS7.onclick = () => {
          const chosen = `${state.s7.blank1}|${state.s7.blank2}`;
          const reverse = `${state.s7.blank2}|${state.s7.blank1}`;
          const correctA = 'splitting|explosive';
          if(chosen === correctA || reverse === correctA){
            state.s7.solved = true;
            state.s7.status = 'good';
            state.s7.msg = 'Yes. That is the accepted wording.';
          } else {
            if(state.s7.penalizedSignature !== chosen){
              state.s7.penalizedSignature = chosen;
              loseDemerit();
            }
            state.s7.status = 'bad';
            state.s7.msg = 'Think about the method that keeps the seeds near the parent plant.';
          }
          render();
        };
      }
    }

    // Screen 8
    if(state.current === 7){
      const input = document.getElementById('guessInput');
      if(input){
        input.focus();
        input.oninput = () => state.s8.input = input.value;
        input.onkeydown = (e) => {
          if(e.key === 'Enter') document.getElementById('checkGuess').click();
        };
      }
      const checkGuess = document.getElementById('checkGuess');
      if(checkGuess){
        checkGuess.onclick = () => {
          const targets = ['splitting', 'explosive'];
          const target = targets[state.s8.phase];
          const answer = (state.s8.input || '').trim().toLowerCase();
          if(answer === target){
            if(state.s8.phase === 0){
              state.s8.phase = 1;
              state.s8.reveal = 1;
              state.s8.input = '';
              state.s8.status = 'good';
              state.s8.msg = 'Good. Now type the next word.';
            } else {
              state.s8.solved = true;
              state.s8.status = 'good';
              state.s8.msg = 'Great. You retrieved both key words.';
            }
          } else {
            state.s8.reveal = Math.min(target.length, state.s8.reveal + 1);
            state.s8.status = 'bad';
            state.s8.msg = 'Try again. One more letter is now shown.';
          }
          render();
        };
      }
    }

    // Screen 9
    if(state.current === 8){
      screenEl.querySelectorAll('[data-id]').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.id;
          state.s9.selected = id;
          if(id === 'split'){
            state.s9.solved = true;
            state.s9.status = 'good';
            state.s9.msg = 'Yes. The young plants stay near the parent, so splitting or explosive action fits best.';
          } else {
            state.s9.status = 'bad';
            state.s9.msg = 'Try the method that keeps the seeds close to the parent plant.';
          }
          render();
        };
      });
    }
  }

  window.addEventListener('beforeunload', () => {
    if(window.speechSynthesis) window.speechSynthesis.cancel();
  });

  if(window.speechSynthesis){
    window.speechSynthesis.onvoiceschanged = () => {};
  }

  render();
})();
</script>
</body>
</html>
